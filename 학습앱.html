c", "term": "통신의 3개 에이전트", "def": "애플리케이션(전자메일·파일 다운로드 등), 컴퓨터, 네트워크.", "sub": ""}, {"t": "c", "term": "네트워크 프로토콜", "def": "2대 이상의 컴퓨터 통신을 위한 통신 규약. 대표적으로 ISO에서 개발한 OSI(Open System Interconnection) 모델.", "sub": ""}, {"t": "c", "term": "응용 계층(application)", "def": "사용자가 OSI 환경에 접근하여 상호작용. 통신에 사용할 프로토콜 타입을 결정하고 파일 전송·DB 접근·전자메일 등 프로토콜 제공.", "sub": "OSI 7 계층"}, {"t": "c", "term": "표현 계층(presentation)", "def": "데이터 타입을 전송 형식과 무관한 구문(syntax)으로 변환하고 암호화 수행.", "sub": "OSI 7 계층"}, {"t": "c", "term": "세션 계층(session)", "def": "애플리케이션·프로세스 간 접속 설정·관리·종료 제어.", "sub": "OSI 7 계층"}, {"t": "c", "term": "전송 계층(transport)", "def": "종단 간(end-to-end) 데이터 전송에 신뢰성을 제공. 에러 복구·흐름 제어.", "sub": "OSI 7 계층"}, {"t": "c", "term": "네트워크 계층(network)", "def": "경로 선택·중계 기능 수행, 데이터 크기를 적절히 분할(하나의 전송 링크 관리).", "sub": "OSI 7 계층"}, {"t": "c", "term": "데이터 링크 계층(data link)", "def": "물리적 링크 간 신뢰성 있는 정보 제공. 프레임 단위 전송, 순차 번호로 에러 검사·순서화.", "sub": "OSI 7 계층"}, {"t": "c", "term": "물리 계층(physical)", "def": "비트 레벨 통신. 전송 매체 간 인터페이스의 기계적·전기적 기능 정의.", "sub": "OSI 7 계층"}]}, {"title": "네트워크의 종류 (규모·전송 거리에 따라)", "items": [{"t": "c", "term": "근거리 통신망(LAN)", "def": "한 건물 또는 수 km 이내, 100Mbps 이내. 단일 기관 소유로 고속·저에러율. (이더넷-CSMA/CD, 토큰링, FDDI-광섬유 등)", "sub": ""}, {"t": "c", "term": "도시 간 통신망(MAN)", "def": "LAN들을 연결한 LAN보다 크고 WAN보다 작은 도시 규모 네트워크.", "sub": ""}, {"t": "c", "term": "광대역 통신망(WAN)", "def": "국가·대륙 등 넓은 지역을 연결하는 원거리 통신망.", "sub": ""}, {"t": "c", "term": "개인 통신망(PAN)", "def": "10m 범위의 개인 영역 IT 장치 간 네트워크.", "sub": ""}, {"t": "c", "term": "부가 가치 통신망(VAN)", "def": "정보에 부가 가치를 첨가하여 불특정 다수에게 제공하는 네트워크.", "sub": ""}]}, {"title": "네트워크 보안 솔루션 종류와 개념", "items": [{"t": "c", "term": "네트워크 보안 솔루션 종류와 개념", "def": "네트워크상의 데이터·기기에 대한 기밀성·무결성·가용성을 향상하기 위한 솔루션.", "sub": ""}, {"t": "c", "term": "방화벽(Firewall)", "def": "외부→내부 접근 시 반드시 방화벽을 통과하도록 하여 내부 자원·정보를 보호하는 시스템. 관리자가 허용하는 패킷만 통과. 구성 요소: 네트워크 정책, 사용자 인증 시스템, 패킷 필터링, 응용 계층 게이트웨이.", "sub": ""}, {"t": "c", "term": "스크리닝 라우터", "def": "프로토콜 형태·송수신지 주소·포트 번호를 분석해 진입을 허가/거절하는 라우터. OSI 3·4계층(IP·TCP·UDP 헤더)에서 동작.", "sub": ""}, {"t": "c", "term": "베스천 호스트", "def": "보호된 네트워크에서 유일하게 외부 공격에 노출된 시스템. 내·외부 네트워크 간 게이트웨이 역할로 철저한 감시 필요.", "sub": ""}, {"t": "c", "term": "가상 사설 네트워크(VPN)", "def": "정보를 암호화하여 공중망으로 전송, 가로채기를 당해도 데이터 유출을 차단하는 솔루션.", "sub": ""}, {"t": "c", "term": "침입 탐지 시스템(IDS)", "def": "공격 형태를 분석해 사전 규칙(signature)을 만들고, 이상 패킷 유입 시 실시간 탐지·대응.", "sub": ""}, {"t": "c", "term": "기초 자료 종류에 따른 분류", "def": "단일 호스트 기반, 다중 호스트 기반, 네트워크 기반.", "sub": ""}, {"t": "c", "term": "침입 행위 기준에 따른 분류", "def": "정상적인 행위의 탐지(프로파일 기준 이탈 탐지), 잘못된 행위의 탐지(알려진 취약점 공격 프로파일 탐지).", "sub": ""}, {"t": "c", "term": "침입 방지 시스템(IPS)", "def": "IDS에 방지 기능까지 자동 수행. 트래픽 모니터링으로 유해 트래픽 차단·세션 종료 등 능동적으로 네트워크를 보호.", "sub": ""}]}]}]}, {"title": "학습 2. 네트워크 보안 솔루션 운영 개선하기", "sections": [{"title": "2-1. 네트워크 보안 솔루션 운영 개선 방안 수립", "groups": [{"title": "네트워크 보안 솔루션 개선 계획 절차", "items": [{"t": "c", "term": "네트워크 보안 솔루션 개선 계획 절차", "def": "다양한 보안 솔루션 운영 시 운영 인력 전문성 결여 등으로 취약점이 존재하므로 이를 보완할 개선 계획이 필요.", "sub": ""}, {"t": "c", "term": "절차", "def": "① 네트워크 구성 분석(구성 요소·운영 중 솔루션 도출) → ② 보안 위협 도출(위협 타깃 설정, 위협 분석 모델링) → ③ 보안 취약점 진단(점검 항목 개발·진단) → ④ 개선 방안 수립(솔루션 패치 적용 등 조치·계획).", "sub": ""}]}]}, {"title": "2-2. 네트워크 보안 솔루션 운영 개선", "groups": [{"title": "네트워크 보안 취약점 분석 절차 (7단계)", "items": [{"t": "c", "term": "대상 시스템 결정", "def": "목표 시스템의 IP를 확인.", "sub": ""}, {"t": "c", "term": "가동 시스템 탐색", "def": "핑거프린팅 기술로 살아 있는 호스트를 탐색.", "sub": ""}, {"t": "c", "term": "서비스 목록 탐색", "def": "살아 있는 호스트에 포트 스캐닝 수행(취약 포트·서비스 식별, 가장 중요한 단계).", "sub": ""}, {"t": "c", "term": "서비스 인식", "def": "열린 포트의 서비스를 시그니처 응답값 분석으로 확인.", "sub": ""}, {"t": "c", "term": "애플리케이션 확인", "def": "서비스의 유형·벤더를 정확히 파악(취약점 진단 시 타 앱 영향·충돌 확인).", "sub": ""}, {"t": "c", "term": "네트워크 취약점 확인", "def": "액티브 구성 조사 후 취약점 진단 및 커스텀 공격 실행.", "sub": ""}, {"t": "c", "term": "발견된 취약점 보고", "def": "위험도 여부와 보안 대책을 기술한 보고서 작성.", "sub": ""}]}]}]}, {"title": "학습 3. 네트워크 보안 신규 위협 대응하기", "sections": [{"title": "3-1. 네트워크 보안 위협 차단", "groups": [{"title": "네트워크 공격 유형", "items": [{"t": "c", "term": "서비스 거부(DoS)", "def": "목표물을 장애 상태로 만들어 정상 서비스 요청을 거부하게 함(연결 시도 폭주 등).", "sub": ""}, {"t": "c", "term": "분산 서비스 거부(DDoS)", "def": "여러 장소에서 분산된 다수의 공격 컴퓨터로 목표물을 공격.", "sub": ""}, {"t": "c", "term": "SYN 플러드 공격", "def": "미완성 연결 요청(SYN 패킷)으로 가득 채워 정당한 연결을 처리하지 못하게 함(CPU·메모리·LAN 카드 이용률 급증).", "sub": ""}, {"t": "c", "term": "UDP 플러드 공격", "def": "UDP 패킷을 계속 보내 시스템 속도를 저하시키고 정당한 연결을 막음(포트 53 DNS 플러딩이 전형).", "sub": ""}, {"t": "c", "term": "포트 스캔 공격", "def": "이용 가능한 서비스 종류를 조사하기 위해 서로 다른 포트로 패킷을 보내 응답을 기다림.", "sub": ""}, {"t": "c", "term": "죽음의 핑(ping of death)", "def": "규정보다 긴 ICMP 패킷으로 DoS·시스템 파괴·고착·리부팅 유발.", "sub": ""}, {"t": "c", "term": "IP 스푸핑", "def": "유효한 클라이언트 IP·이메일·사용자 ID를 위조해 방화벽을 통과(컴퓨터 간 신뢰 관계 악용).", "sub": ""}, {"t": "c", "term": "랜드 공격(land attack)", "def": "SYN 공격+IP 스푸핑. 목적지·발신지 IP를 모두 희생자 IP로 위장한 SYN 패킷으로 빈 커넥션을 양산하여 DoS 유발.", "sub": ""}, {"t": "c", "term": "티어 드롭 공격(tear drop)", "def": "IP 패킷 재조립을 악용. 오프셋이 겹치도록 조작하여 재조립 시 문제 발생.", "sub": ""}, {"t": "c", "term": "핑 스캔(ping scan)", "def": "ICMP 에코 요청을 여러 목적지로 보내 응답을 기다려 목표 가능 IP를 탐색.", "sub": ""}]}]}, {"title": "3-2. 복구 및 문서화", "groups": [{"title": "네트워크 보안 솔루션 관리 및 보호", "items": [{"t": "c", "term": "보안 취약성 진단의 개념", "def": "정보시스템의 보안상 문제점을 파악하고 내·외부 침해로 발생 가능한 위험 수준을 진단하는 활동.", "sub": ""}, {"t": "c", "term": "보안 취약성 진단의 목적", "def": "안티바이러스(사후 조치)와 달리 사전에 침해사고를 예방하는 적극적 보안 행위. 가용성·무결성을 보장하는 보안 운영 기법.", "sub": ""}, {"t": "c", "term": "보안 취약성 진단 및 조치", "def": "운영 환경에 맞게 진단 주기를 적정 수준으로 조정해 지속 관리.", "sub": ""}, {"t": "c", "term": "위협 인지 및 대응", "def": "단순 공격 탐지가 아니라 취약성을 파악한 후 공격을 탐지하고 영향분석(impact analysis) 수행.", "sub": ""}, {"t": "c", "term": "최근 공격 경향 분석", "def": "최신 보안 취약성과 공격 여부를 분석하고, 자사 시스템 존재 여부·탐지·대응 방법을 파악.", "sub": ""}]}, {"title": "정보보호 관리체계", "items": [{"t": "c", "term": "정보보호 관리체계", "def": "일회성·단편적 정보보호에서 벗어나 조직적·종합적 정보보호 대책을 수립해 관리 수준 전반을 향상시키는 체계.", "sub": ""}, {"t": "c", "term": "ISO 27001", "def": "정보보호 관리를 경영 관리 시스템의 한 부분으로 인식하고, 위험관리 기반으로 정보보호의 수립·구현·운영·검토·개선을 하는 시스템. ISO27001:2022 기준 4개 도메인(조직 37·사람 8·물리적 14·기술적 34) 93개 통제 항목.", "sub": ""}, {"t": "c", "term": "ISMS-P 인증", "def": "인증 심사 필수 항목으로, 위협·취약성 변화에 대응하기 위해 지속 유지되는 순환주기 형태.", "sub": ""}, {"t": "c", "term": "정책 수립 단계", "def": "상위 수준 정보보호 정책 수립, 책임 설정, 법적·규제 요건과 위험 관리 기술.", "sub": ""}, {"t": "c", "term": "범위 설정 단계", "def": "ISMS 범위 내 정보 자산 식별·목록화(형태·소유자·관리자 등).", "sub": ""}, {"t": "c", "term": "위험 관리 단계", "def": "위험 관리 전략·계획 수립, 위협·취약성·위험 식별 및 영향 분석.", "sub": ""}, {"t": "c", "term": "구현 단계", "def": "정보보호 계획에 따라 대책을 구현하고 교육·훈련 진행.", "sub": ""}, {"t": "c", "term": "사후 관리 단계", "def": "상시 모니터링, 정기 내부 감사로 정책 준수 확인 및 개선.", "sub": ""}]}]}]}, {"title": "학습 4. 네트워크 보안 솔루션 업데이트 적용하기", "sections": [{"title": "4-1. 네트워크 보안 솔루션 업데이트 계획 수립", "groups": [{"title": "패치 관리 시스템(PMS: Patch Management System)", "items": [{"t": "c", "term": "패치 관리 시스템(PMS: Patch Management System)", "def": "서버 등 정보 자산에 설치되지 않은 윈도우 보안 패치 등을 검색하여 자동으로 설치하는 프로그램/솔루션.", "sub": ""}, {"t": "n", "text": "구성 :"}, {"t": "c", "term": "패치 프라이머리 서버", "def": "패치 파일·배포 정보를 보관·전달, 배포 서버로부터 로그 수집, 웹 기반 어드민 페이지 제공.", "sub": ""}, {"t": "c", "term": "패치 배포 서버", "def": "배포 대상 솔루션에 패치 파일·정보를 전달하고 로그를 수집.", "sub": ""}, {"t": "c", "term": "패치 관리 시스템 보안 가이드", "def": "APT 공격이 PMS 특징을 악용하므로(취약 시 연결된 다수 PC 감염), 초기 비밀번호 변경, 패스워드 복잡도, 중요정보 파일 미보관, 관리자 계정 최소화·임시계정 제거, 계정 공용 금지, 최소 IP·독립 네트워크 구성, 불필요 서비스·프로그램 제거, 로그 주기 확인, 공유 폴더 미사용, 이동식 매체 자동실행 차단, 최신 버전·백신 유지, 화면 보호기 10분 이내 설정 등.", "sub": ""}]}]}, {"title": "4-2. 네트워크 보안 솔루션 업데이트 적용", "groups": [{"title": "솔루션 업데이트 체계", "items": [{"t": "c", "term": "솔루션 업데이트 체계", "def": "솔루션 업데이트는 배포된 SW의 기능 개선·버그·보안 취약점 수정을 위해 개발사가 내놓는 프로그램. 업데이트 체계는 최신 버전을 검색·다운로드·설치하는 체계로, 업데이트 서버·업데이트 클라이언트·통신 채널로 구성.", "sub": ""}, {"t": "n", "text": "솔루션 업데이트 유형 :"}, {"t": "c", "term": "방식별", "def": "수동 업데이트(사용자가 직접 다운로드·설치), 자동 업데이트(정해진 일정에 검사·다운로드·설치). 최근에는 자동 업데이트가 일반적.", "sub": ""}, {"t": "c", "term": "중요도별", "def": "중요 업데이트(보안 취약점·개인정보보호·버그 수정 등 필수), 선택 업데이트(작업 환경 향상·드라이버·신규 SW 등 선택 설치).", "sub": ""}, {"t": "c", "term": "동작 구조", "def": "① 설정정보 다운로드(최신 버전 번호·파일 URL 목록) → ② 업데이트 파일 다운로드(최신이 아니면 URL 목록으로 다운로드) → ③ 업데이트 대상 파일 설치.", "sub": ""}]}]}]}], "count": 72}, {"id": "05", "title": "시스템 보안 운영", "notes": ["학습모듈: 시스템 보안 솔루션을 운영·개선하고, 신규 위협에 대응하며, 솔루션 업데이트를 적용한다."], "units": [{"title": "학습 1. 시스템 보안 솔루션 운영하기", "sections": [{"title": "1-1. 시스템 보안 솔루션 요구사항 분석", "groups": [{"title": "시스템 보안 운영의 범위", "items": [{"t": "c", "term": "서버 보안", "def": "정보·자원이 저장된 서버의 보안 운영(서버 보안, DB 보안, 세션 로깅 등).", "sub": ""}, {"t": "c", "term": "PC 보안", "def": "사용자 단말 PC에 대한 보안 운영(통합 PC 보안, 오피스 PC 보안, 시큐어 프린터 등).", "sub": ""}, {"t": "c", "term": "보안 관리", "def": "관리적 보안에 활용되는 보안 운영(스토리지 암호화, 디가우저 등).", "sub": ""}]}, {"title": "시스템 보안 운영의 요구사항 수집 대상 및 항목", "items": [{"t": "c", "term": "수집 대상", "def": "① 정보화 사업 관련 법령·훈령·지침·정책, ② 기업의 정보보호 규정 및 보안 정책, ③ 발주 기업 제안서 내 보안 요구사항.", "sub": ""}, {"t": "c", "term": "수집 항목", "def": "보안 운영 정책, 통제 영역·통제 항목, 통제 항목별 통제 수준, 정책·목적 달성을 위한 세부 지침.", "sub": ""}, {"t": "c", "term": "정보 보안 규정", "def": "외부 누출 금지 영업 비밀·내부 정보에 대해 준수해야 하는 규칙을 정한 문서. 보안 조직 구성·총책임자(대표자) 선정·부서별 담당자 채택으로 엄격한 보안 관리.", "sub": ""}]}, {"title": "시스템 보안 운영상 보안 솔루션의 개념 및 역할", "items": [{"t": "c", "term": "보안 솔루션의 개념", "def": "보안상 발생하는 기술적 위험 요소를 방어하기 위한 솔루션. 기술 레벨에 따라 구성 요소를 선별 적용.", "sub": ""}, {"t": "c", "term": "보안 솔루션의 역할", "def": "기업 내 보안 담당 인원이 1~2명으로 운영·보안 겸직 등 인력이 부족하여 보안 솔루션 의존도가 높음. 따라서 효율적 운영을 위해 솔루션에 대한 정확한 이해와 운영 노하우가 필요.", "sub": ""}]}]}, {"title": "1-2. 시스템 보안 솔루션 운영", "groups": [{"title": "시스템 보안 솔루션 운영 업무의 어려움", "items": [{"t": "c", "term": "시스템 보안 솔루션 운영 업무의 어려움", "def": "다양한 솔루션 운영으로 일관성·체계성·전문성 확보가 어려움. ① 복잡·비일관 정보 조치 어려움, ② 운영 정보의 체계적 관리 어려움, ③ 개별 평가로는 전체 통일된 보안 수준 평가 어려움, ④ 솔루션별 전문 인력 필요하나 인력 부족·비용 발생.", "sub": ""}]}, {"title": "시스템 보안 솔루션 안정적 운영 업무 프로세스 방법론", "items": [{"t": "c", "term": "정보보안 프레임워크의 정의", "def": "기업 업무 연속성을 위한 네트워크·시스템 등 주요 인프라의 위협 요인을 사전 분석·예방하고, 발생 시 적절히 대응하기 위한 정책·프로세스·기술적 요인의 관계를 나타낸 것.", "sub": ""}, {"t": "c", "term": "정보보안 프레임워크의 구성", "def": "기술적 보안(시스템 보안)에 관리적 보안·물리적 보안 요소를 함께 적용.", "sub": ""}, {"t": "c", "term": "프레임워크 필요성", "def": "관리적 측면(전사 일관 정책·이벤트 연관 관계 파악), 재무적 측면(중복 투입 방지·통합 운영 비용 절감), 성능적 측면(개별 솔루션의 딜레이·로드 한계 극복).", "sub": ""}, {"t": "c", "term": "정보 보안 운영 프로세스", "def": "① 정보보호 대상 현황 파악(우선순위 분석) → ② 예방 대응(예방 정량 지표 분석·조치) → ③ 탐지 대응(탐지 지표 책정·매뉴얼 대응) → ④ 업무 정량화(관리 지표 측정·지속 개선).", "sub": ""}]}, {"title": "정보 보안 관리 시스템 인증 (ISO 17799)", "items": [{"t": "c", "term": "정보 보안 관리 시스템 인증 (ISO 17799)", "def": "영국 BSI가 제정한 BS7799 기반의 국제 정보 보안 표준이자 인증 체계로 정보 보안 관리의 베스트 프랙티스를 정의.", "sub": ""}, {"t": "c", "term": "Part 1", "def": "정보 보안 관리 실행 지침(보안 정책·조직·인적 보안 등 10개 분야, 127개 통제 항목).", "sub": ""}, {"t": "c", "term": "Part 2", "def": "ISMS 규격(비즈니스 위험 접근 기반으로 정보 보안을 수립·구현·운영·검토·개선하는 시스템).", "sub": ""}]}]}]}, {"title": "학습 2. 시스템 보안 솔루션 운영 개선하기", "sections": [{"title": "2-1. 시스템 보안 솔루션 운영 개선 방안 수립", "groups": [{"title": "시스템 보안 솔루션 개선 방안 도출 프로세스", "items": [{"t": "c", "term": "시스템 보안 솔루션 개선 방안 도출 프로세스", "def": "보안 솔루션도 SW 기반이라 허점이 존재하고, 다수 운영 시 인력 전문성 결여로 취약점이 발생하므로 개선 방안 도출이 필요.", "sub": ""}, {"t": "c", "term": "절차", "def": "① 시스템 구성 분석 → ② 보안 위협 도출(STRIDE 등 위협 모델링) → ③ 보안 취약점 진단(점검 항목 개발·진단) → ④ 개선 방안 수립(패치 적용·윈백 등).", "sub": ""}, {"t": "c", "term": "STRIDE 위협 유형", "def": "Spoofing(위장), Tampering(변조), Repudiation(부인), Information disclosure(정보 노출), Denial of service(서비스 거부), Elevation of privilege(권한 상승).", "sub": ""}, {"t": "c", "term": "8단계 리스크 계산 — DREAD", "def": "취약성 5가지에 점수를 할당해 위협 우선순위를 결정.", "sub": ""}, {"t": "c", "term": "damage potential", "def": "악용 시 피해 정도를 수치화.", "sub": ""}, {"t": "c", "term": "reproducibility", "def": "공격 재현 난이도를 점수화.", "sub": ""}, {"t": "c", "term": "exploit-ability", "def": "실제 공격까지 요구되는 시간·노력을 수치화.", "sub": ""}, {"t": "c", "term": "affected users", "def": "예상 피해 사용자 수 비율을 수치화.", "sub": ""}, {"t": "c", "term": "discover-ability", "def": "약점 발견 난이도를 수치화.", "sub": ""}, {"t": "c", "term": "9단계 공격 보안 대책 수립 — 위협 트리(threat tree)", "def": "루트 노드가 최종 공격 목표, 하위 노드는 상위 공격 달성에 필요한 전제 조건. 우선순위 공격에 경감책을 수립해 이전 개발 단계에 반영.", "sub": ""}]}, {"title": "정보 자산의 식별 및 가치 평가", "items": [{"t": "c", "term": "자산 식별", "def": "전자 정보·SW·HW·종이 문서·부대설비 등 모든 정보 자산을 대상으로, 분류 기준을 정의해 중복·누락 최소화(정보·문서·인력·소프트웨어·설비·기타 5~6개로 분류).", "sub": ""}, {"t": "c", "term": "자산 평가", "def": "비밀성·무결성·가용성 3가지 측면을 고(3)·중(2)·저(1)로 평가하고, 합계를 3~5등급으로 세분화.", "sub": ""}]}]}, {"title": "2-2. 시스템 보안 솔루션 운영 개선", "groups": [{"title": "취약점 평가", "items": [{"t": "c", "term": "취약점 평가", "def": "위협과 마찬가지로 취약점도 평가하며, 정보 자산에 악영향을 끼치는 위험 평가에 활용.", "sub": ""}, {"t": "c", "term": "취약점 평가 기준(4단계)", "def": "매우 취약(VH, 복구 불가/피해 큼), 비교적 취약(H, 복구 가능하나 피해 큼), 보통(M, 보고 필요), 취약하지 않음(L, 보고 불필요).", "sub": ""}, {"t": "c", "term": "발생 가능도", "def": "취약성과 위협을 결합해 모호함·중복성을 제거한 취약점 평가 등급. 정보 자산 가치를 고려하며 높음·중간·낮음 세 등급으로 구분.", "sub": ""}]}, {"title": "보안 위험 분석 방법론", "items": [{"t": "c", "term": "베이스라인 접근법", "def": "모든 시스템에 보호 기본 수준을 정하고 보호 대책을 선택. 장점-시간·비용 절약, 단점-조직 특성 미반영·수준 초과/미달.", "sub": ""}, {"t": "c", "term": "비정형 접근법", "def": "전문가의 지식·경험으로 위험 분석. 장점-시간·비용 절약·소규모 적합, 단점-구조화 불가·합리적 도출 불가·사후 관리 제한.", "sub": ""}, {"t": "c", "term": "상세 위험 분석 접근법", "def": "자산 가치·위험·취약성을 분석해 위험 정도를 결정. 장점-적절한 보안 수준 마련, 단점-전문 지식 필요·시간·비용 소모 큼.", "sub": ""}, {"t": "c", "term": "복합 접근법", "def": "상세 위험 분석+베이스라인 복합 적용. 장점-빠른 전략 구축·효율적, 단점-적용 대상 설정 어려움·자원 낭비. 위험도 높은 대상은 상세 분석, 낮은 대상은 베이스라인 적용.", "sub": ""}]}]}]}, {"title": "학습 3. 시스템 보안 신규 위협 대응하기", "sections": [{"title": "3-1. 시스템 보안 위협 식별 및 차단", "groups": [{"title": "보안 솔루션 관리 및 보호", "items": [{"t": "c", "term": "보안 취약성 진단의 개념", "def": "정보 시스템의 보안상 문제점을 파악하고 내·외부 침해로 발생 가능한 위험 수준을 진단하는 작업.", "sub": ""}, {"t": "c", "term": "보안 취약성 진단의 목적", "def": "안티바이러스(사후 조치)와 달리 사전에 침해사고를 예방하는 적극적 보안 행위. 가용성·무결성을 보장하는 보안 운영 기법.", "sub": ""}, {"t": "c", "term": "보안 취약성 진단 및 조치", "def": "운영 환경에 맞게 진단 주기를 적정 수준으로 조정해 지속 관리.", "sub": ""}, {"t": "c", "term": "위협 인지 및 대응", "def": "단순 공격 탐지가 아니라 취약성 파악 후 공격을 탐지하고 임팩트 분석(impact analysis) 수행.", "sub": ""}, {"t": "c", "term": "최근 공격 경향 분석", "def": "최신 취약성·공격 여부를 분석하고 자사 존재 여부·탐지·대응 방법 파악.", "sub": ""}]}]}, {"title": "3-2. 복구 및 문서화", "groups": [{"title": "정보보호 침해 사고", "items": [{"t": "c", "term": "법적 정의", "def": "정보통신망법 제2조에 따라 해킹·컴퓨터 바이러스·논리 폭탄·메일 폭탄·서비스 거부·고출력 전자기파 등으로 정보 통신망·정보 시스템을 공격해 발생한 사태.", "sub": ""}, {"t": "c", "term": "실무 정의", "def": "해킹·바이러스에 한정하지 않고 모든 전자적 공격 행위와 그 피해를 포함.", "sub": ""}, {"t": "c", "term": "침해 행위에 따른 유형", "def": "비인가 시스템·파일 접근(바이러스·트로이잔·웜·백도어·악성코드), 비인가 네트워크 정보 접근, 비인가 서비스 이용, 서비스 방해·거부.", "sub": ""}, {"t": "c", "term": "피해 유형", "def": "기밀성 침해(고객·기밀 정보 유출), 가용성 침해(서비스 지연·중단), 무결성 침해(정보 변조).", "sub": ""}]}, {"title": "침해 사고 분석 절차 (7단계, KISA 침해사고분석절차서)", "items": [{"t": "c", "term": "사고 대응 전 준비", "def": "사고 전 대응팀·조직적 전략·대처 방안 개발.", "sub": ""}, {"t": "c", "term": "사고 탐지", "def": "정보보호·네트워크 장비로 이상 징후 탐지(미생성 계정 발견, 디폴트 계정 로그인, 비정상 시간 활동, 권한 상승, 로그 삭제, 성능 저하 등).", "sub": ""}, {"t": "c", "term": "초기 대응", "def": "대응팀 소집, 사고 정황 수집·기록(사건 유형 식별·영향 평가).", "sub": ""}, {"t": "c", "term": "대응 전략 수립", "def": "환경 고려 사항을 반영해 적절한 대응 전략 수립.", "sub": ""}, {"t": "c", "term": "사고 조사", "def": "호스트 기반·네트워크 기반 증거로 나누어 데이터 수집(디지털 포렌식)·분석(증거 훼손 방지).", "sub": ""}, {"t": "c", "term": "보고서 작성", "def": "육하원칙에 따라 원인·분석 보고서 작성.", "sub": ""}, {"t": "c", "term": "복구 및 해결 과정", "def": "위험 우선순위에 따라 복구 절차 마련·복구·사후 조치.", "sub": ""}]}]}]}, {"title": "학습 4. 시스템 보안 솔루션 업데이트 적용하기", "sections": [{"title": "4-1. 시스템 보안 솔루션 업데이트 계획 수립", "groups": [{"title": "패치 관리 시스템(PMS)", "items": [{"t": "c", "term": "패치 관리 시스템(PMS)", "def": "서버 등 정보 자산에 설치되지 않은 윈도우 보안 패치 등을 검색해 자동 설치하는 프로그램/솔루션.", "sub": ""}, {"t": "c", "term": "구성", "def": "패치 프라임 서버(패치 파일·배포 정보 보관·전달, 로그 수집, 웹 관리 페이지), 패치 배포 서버(배포 대상에 패치 전달, 로그 수집).", "sub": ""}, {"t": "n", "text": "패치 관리 시스템의 보안 위협 유형 :"}, {"t": "c", "term": "패치 업데이트 서버 장악", "def": "해킹으로 침투해 설정 정보·파일 위·변조(예: 7.7 DDoS 2009).", "sub": ""}, {"t": "c", "term": "패치 서버 악성 코드 업로드", "def": "서버 장악 없이 악성코드를 업로드해 단말로 유포(예: 3.20 전산망 대란 2013).", "sub": ""}, {"t": "c", "term": "중간자(MITM) 공격", "def": "서버-단말 통신 경로에서 설정 정보·파일 위·변조.", "sub": ""}, {"t": "c", "term": "위장 서버 접속", "def": "DNS 응답 위·변조로 위장 서버 접속을 유도해 악성코드 전송(예: SK컴즈 2011).", "sub": ""}, {"t": "c", "term": "대응 방안", "def": "패치 서버 보안(파일 변조 방지·보안 강화), 채널 보안(고윳값/PKI 상호 인증).", "sub": ""}]}]}, {"title": "4-2. 시스템 보안 솔루션 업데이트 적용", "groups": [{"title": "업데이트와 업그레이드의 비교", "items": [{"t": "c", "term": "업데이트(패치)", "def": "소프트웨어에 변화를 주는 것. 최신 버전으로 끌어올리거나 오류를 고쳐 기능을 향상. SW에만 사용.", "sub": ""}, {"t": "c", "term": "업그레이드", "def": "새로운 버전 또는 이전보다 나아진 완전히 새로운 것으로 교체. SW·HW 모두 사용(주로 하드웨어 교체).", "sub": ""}]}, {"title": "시스템 보안 솔루션의 보안 업데이트", "items": [{"t": "c", "term": "발생 원인", "def": "솔루션 설계상 결함·개발상 결함으로 취약점이 발생하며, 무결한 코드는 존재하기 어려워 주기적 확인·업데이트 필요(CVE 웹사이트에서 발견된 취약점 목록 확인).", "sub": ""}, {"t": "c", "term": "보안 업데이트 프로세스 CSF", "def": "영향받는 자산 파악, 서비스 중요도에 따른 단계적 업데이트, 업무 의존 시간 내 적용, 테스트 서버 선적용.", "sub": ""}, {"t": "c", "term": "솔루션 업데이트 체계 동작 구조", "def": "① 설정 정보 다운로드(최신 버전·URL 목록) → ② 업데이트 파일 다운로드 → ③ 대상 파일 설치.", "sub": ""}]}]}]}], "count": 63}, {"id": "06", "title": "애플리케이션 보안 운영", "notes": ["학습모듈: 애플리케이션 보안 솔루션을 운영·개선하고, 신규 위협에 대응하며, 솔루션 업데이트를 적용한다."], "units": [{"title": "학습 1. 애플리케이션 보안 솔루션 운영하기", "sections": [{"title": "1-1. 애플리케이션 보안 솔루션 요구사항 분석", "groups": [{"title": "정보보호 관리체계", "items": [{"t": "c", "term": "정보보호 관리체계", "def": "정보시스템·정보 통신망의 안정성·신뢰성 확보를 위해 관리적·기술적·물리적 보호를 포함하는 종합적 관리체계.", "sub": ""}, {"t": "c", "term": "ISO 27001", "def": "ISO 27000 시리즈 중 하나로 ISO/IEC JTC1 SC27 WG1에서 추진. 정보보호 요구사항을 4개 도메인, 93개 통제 항목으로 구성.", "sub": ""}, {"t": "c", "term": "ISMS-P", "def": "주요 정보 자산을 보호하기 위한 정보보호 관리체계가 인증 기준에 적합한지 심사·인증하는 제도. 102개 인증 기준으로 심사.", "sub": ""}, {"t": "c", "term": "관리체계 수립 및 운영", "def": "관리체계 운영 라이프사이클(메인 프레임). 4개 분야 16개 인증 항목.", "sub": ""}, {"t": "c", "term": "보호대책 요구사항", "def": "정책·조직·교육 등 관리적 부문과 개발·보안 통제·운영 통제 등 물리적·기술적 부문. 12개 분야 64개 인증 항목.", "sub": ""}, {"t": "c", "term": "개인정보 처리 단계별 요구사항", "def": "수집·이용 및 제공·저장 및 보관·파기의 개인정보 생명주기. 5개 분야 22개 인증 항목.", "sub": ""}]}, {"title": "정보보호 관련 법률과 기관의 규정·지침", "items": [{"t": "c", "term": "정보보호 관련 법률", "def": "정보통신망법, 정보통신기반보호법, 전자정부법, 전자서명법, 정보보호산업진흥법, 개인정보보호법. 산업 분야별로 금융(전자금융거래법·신용정보법), 의료(의료법·보건의료기본법), 제조(산업기술유출방지법) 등이 있음.", "sub": ""}, {"t": "c", "term": "기관의 규정 및 지침", "def": "각 기관별로 정보시스템 운영·보안 관련 규정, 개인정보 처리 규정 등 내부 운영 규정·지침.", "sub": ""}]}]}, {"title": "1-2. 애플리케이션 보안 솔루션 운영", "groups": [{"title": "애플리케이션 보안", "items": [{"t": "c", "term": "애플리케이션 보안", "def": "애플리케이션은 상용 SW 솔루션, 웹 애플리케이션을 포함하여 SI 구축 방식으로 개발된 모든 응용프로그램.", "sub": ""}, {"t": "n", "text": "애플리케이션 공격 유형 (대표 웹 공격, OWASP Top10 참고)"}, {"t": "c", "term": "XSS(Cross Site Scripting)", "def": "XSS 취약점을 이용해 악성 스크립트를 서버측·URL에 삽입하고, 피공격자의 브라우저에서 실행되게 하는 공격.", "sub": ""}, {"t": "c", "term": "SQL Injection", "def": "입력값·URL 파라미터에 악의적 시스템 명령·SQL 구문을 삽입(로그인·DB 열람·명령 권한 획득).", "sub": ""}, {"t": "c", "term": "CSRF(Cross Site Request Forgery)", "def": "사용자가 인지하지 못한 상황에서 사용자 의도와 무관하게 공격자가 의도한 행위(수정·삭제·등록)를 요청하게 하는 공격(특히 관리자 권한 악용 시 치명적).", "sub": ""}, {"t": "n", "text": "애플리케이션 보안 프로토콜 (OSI 7계층 중 응용 계층)"}, {"t": "c", "term": "SSH(Secure Shell)", "def": "원격 단말 접속·명령 실행·파일 전송을 안전하게 해 주는 프로토콜. 텔넷·rsh·rlogin을 대체, 암호화로 기밀성 유지.", "sub": ""}, {"t": "c", "term": "S/MIME", "def": "전자 우편 내용 보호를 위한 수단으로 SMTP를 대체. 디지털 서명과 메시지 암호화 기능 제공.", "sub": ""}]}]}]}, {"title": "학습 2. 애플리케이션 보안 솔루션 운영 개선하기", "sections": [{"title": "2-1. 애플리케이션 보안 솔루션 운영 개선 방안 수립", "groups": [{"title": "애플리케이션 보안 솔루션 (종류)", "items": [{"t": "c", "term": "방화벽(Firewall)", "def": "서로 다른 네트워크를 지나는 패킷을 허용/거부하는 HW 또는 SW.", "sub": ""}, {"t": "c", "term": "침입 차단 시스템(IPS)", "def": "외부→내부 유입 패킷 중 악의적 패킷을 찾아 제어하는 HW/SW.", "sub": ""}, {"t": "c", "term": "가상 사설망(VPN)", "def": "전용 회선을 조직 내부 사용자를 드러내지 않고 공유하기 위한 사설 통신망.", "sub": ""}, {"t": "c", "term": "네트워크 접근 통제(NAC)", "def": "내부망 호스트가 네트워크 접근 시 보안 정책에 따라 접속을 제어·통제하는 HW/SW.", "sub": ""}, {"t": "c", "term": "시스템 접근 제어", "def": "시스템(서버)에 접근 권한·경로·실시간 감시를 위한 HW/SW.", "sub": ""}, {"t": "c", "term": "DB 암호화", "def": "DB 저장 데이터의 기밀성 유지를 위해 암·복호화를 수행하는 HW/SW.", "sub": ""}, {"t": "c", "term": "자료 유출 방지(DLP)", "def": "내부 정보 유출을 차단하고 개인정보를 보호하는 HW/SW.", "sub": ""}, {"t": "c", "term": "안티바이러스", "def": "일반적으로 백신 프로그램으로 알려진 SW.", "sub": ""}]}, {"title": "보안 취약점", "items": [{"t": "c", "term": "보안 취약점", "def": "HW·SW의 결함이나 설계상 허점으로 권한 이상의 명령·정보 열람을 허용할 수 있는 약점.", "sub": ""}, {"t": "c", "term": "CVE(Common Vulnerabilities and Exposures)", "def": "알려진 보안 취약점 정보를 공유·대처하기 위해 미국 MITRE 재단이 제공하는 취약점 목록 체계.", "sub": ""}, {"t": "c", "term": "시큐어 코딩", "def": "개발 과정에서 휴먼 오류·논리적 오류로 발생 가능한 보안 취약점을 최소화하는 사전 예방 활동(국내 2012년 SW개발 보안 제도 도입, 공공부터 의무화).", "sub": ""}]}]}, {"title": "2-2. 애플리케이션 보안 솔루션 운영 개선", "groups": [{"title": "모의 해킹", "items": [{"t": "c", "term": "모의 해킹", "def": "보안 취약점 점검을 위해 보안 담당자의 승인 아래 내·외부에서 침투 테스트를 시도하고 대응 방안을 마련하는, 악의적이지 않은 사이버 공격.", "sub": ""}, {"t": "c", "term": "외부 모의 해킹", "def": "웹 애플리케이션의 인증·세션·암호화 전송·웹 보안·접근 제어 등을 외부에서 해커를 가장해 침투 테스트.", "sub": ""}, {"t": "c", "term": "내부 모의 해킹", "def": "악의적 내부 사용자를 가장하여 내부망에서 정보 유출·해킹을 시도(내부망·내부 사용자 권한 사용 점에서 외부와 차이).", "sub": ""}]}, {"title": "애플리케이션 운영 서버 보안", "items": [{"t": "c", "term": "애플리케이션 운영 서버 보안", "def": "애플리케이션은 서버에서 작동되므로 운영 서버 보안이 가장 기본. 물리적 보안과 함께 보안 설정·불필요 서비스 중지·포트 점검·모니터링 등을 수행.", "sub": ""}, {"t": "c", "term": "보안 서버 운영", "def": "인터넷 통신 시 개인정보 등 중요 정보를 암호화하여 송수신하도록 구축한 웹 서버. 운영 중인 웹 서비스에 SSL 인증서·암호화 SW를 설치해 송수신 암호화 제공.", "sub": ""}, {"t": "c", "term": "시큐어 코딩", "def": "서버 동작 애플리케이션 SW 개발 시 발생 가능한 보안 취약점을 제거해 해킹을 예방. 주기적 점검으로 소스 코드 취약점을 수시 개선.", "sub": ""}]}]}]}, {"title": "학습 3. 애플리케이션 보안 신규 위협 대응하기", "sections": [{"title": "3-1. 애플리케이션 보안 위협 식별 및 차단", "groups": [{"title": "애플리케이션 보안 취약점과 위협 식별", "items": [{"t": "c", "term": "구분", "def": "애플리케이션 보안 위협은 의도적 공격과 애플리케이션 자체에 내재된 보안 취약점으로 구분.", "sub": ""}, {"t": "c", "term": "애플리케이션 보안 취약점", "def": "개발 단계의 개발자 실수·구조적 결함 등에 의한 취약점.", "sub": ""}, {"t": "n", "text": "애플리케이션 관련 보안 위협(의도적 공격) :"}, {"t": "c", "term": "해킹", "def": "악성 프로그램·백도어 등 공격 기법이나 취약점을 이용해 정보시스템을 공격.", "sub": ""}, {"t": "c", "term": "피싱", "def": "전자우편·메신저 등으로 신뢰 대상으로 위장하는 사회 공학적 공격.", "sub": ""}, {"t": "c", "term": "스팸", "def": "불특정 다수에게 광고성 정보를 송신, 특정 사이트 접속을 유도해 악성코드 감염에도 이용.", "sub": ""}, {"t": "c", "term": "DoS/DDoS", "def": "좀비 PC로 정보시스템 자원을 고갈시켜 서비스 불가 상태로 만드는 공격.", "sub": ""}, {"t": "c", "term": "애플리케이션 보안 취약점 7대 유형", "def": "입력 데이터 검증 및 표현(SQL 인젝션·XSS), 보안 기능(부적절한 인가·취약한 암호화), 시간 및 상태(제어문 없는 재귀함수), 에러 처리(오류 메시지 통한 정보 노출), 코드 오류(타입 변환·자원 반환 오류, 널 포인터 역참조), 캡슐화(잘못된 세션에 의한 정보 노출), API 오용(DNS lookup 의존 보안 결정).", "sub": ""}]}]}, {"title": "3-2. 복구 및 문서화", "groups": [{"title": "애플리케이션 보안 취약점 확인 (취약점 정보 체계)", "items": [{"t": "c", "term": "CVE(Common Vulnerabilities and Exposures)", "def": "알려진 보안 취약점 목록 체계. 'CVE-연도-등록번호' 형식(2015년부터 자릿수 제한 없음). MITRE 제공.", "sub": ""}, {"t": "c", "term": "CWE(Common Weakness Enumeration)", "def": "일반적 취약점을 열거해 SW 취약점 유형을 정형화한 목록을 개발자·보안 관계자에게 제공. MITRE 제공.", "sub": ""}, {"t": "c", "term": "CWE/SANS Top25", "def": "CWE 중 치명적 약점을 정리한 목록. 프로그래밍·설계·아키텍처 오류 자료를 제공해 사전 예방.", "sub": ""}, {"t": "c", "term": "OWASP Top 10", "def": "MITRE·PCI DSS·DISA·FTC 등이 참여해 애플리케이션 보안 위험 상위 10개를 선정·발표.", "sub": ""}, {"t": "c", "term": "2021년 Top10", "def": "A1 취약한 접근 제어, A2 잘못된 암호(Cryptographic failures), A3 인젝션, A4 안전하지 않은 설계, A5 보안 설정 오류, A6 취약하고 오래된 컴포넌트, A7 식별 및 인증 실패, A8 소프트웨어 및 데이터 무결성 실패, A9 보안 로깅·모니터링 실패, A10 서버 사이드 요청 변조(SSRF).", "sub": ""}]}]}]}, {"title": "학습 4. 애플리케이션 보안 솔루션 업데이트 적용하기", "sections": [{"title": "4-1. 애플리케이션 보안 솔루션 업데이트 계획 수립", "groups": [{"title": "애플리케이션 보안 솔루션 업데이트 분류", "items": [{"t": "c", "term": "보안 기능 향상을 위한 업데이트", "def": "웹 방화벽·유해 사이트 차단 시스템 등은 신규 공격 패턴·악성 URL 추가 시마다 주기적 업데이트 필요.", "sub": ""}, {"t": "c", "term": "운영 SW 오류 및 보안 취약점 제거", "def": "솔루션 구현 SW의 오류·취약점이 발견되면 공격자가 악용·우회할 수 있으므로 최신 버전으로 업데이트.", "sub": ""}]}, {"title": "애플리케이션 보안 솔루션 업데이트 방식", "items": [{"t": "c", "term": "제조업체 패치서버를 통한 온라인 업데이트", "def": "제조업체 전용 패치서버로 온라인 업데이트(방화벽 접근 통제 권장). 안전·신속하나 서버 해킹·무결성 미확인 시 모든 사용자 피해 우려.", "sub": ""}, {"t": "c", "term": "제조사 홈페이지 등을 통한 오프라인 업데이트", "def": "홈페이지·메일로 패치파일을 별도 제공받아 업데이트. 다소 불편하나 무결성 검증 후 적용해 더 안전. 솔루션이 여러 개면 PMS로 업데이트 가능.", "sub": ""}]}]}, {"title": "4-2. 애플리케이션 보안 솔루션 업데이트 적용", "groups": [{"title": "애플리케이션 보안 솔루션 업데이트 체계", "items": [{"t": "c", "term": "애플리케이션 보안 솔루션 업데이트 체계", "def": "솔루션 SW의 기능 개선·버그·취약점 수정을 위해 벤더사가 내놓는 프로그램. 업데이트 체계는 취약점 확인→수정 SW 검색·다운로드→설치의 과정. 구성: 업데이트 중앙 서버(벤더), 업데이트 관리 서버(기관), 클라이언트 장치.", "sub": ""}, {"t": "n", "text": "업데이트 유형 :"}, {"t": "c", "term": "온라인/오프라인", "def": "수동 업데이트(오프라인, 직접 다운로드·설치), 자동 업데이트(온라인, 일정에 따라 검사·다운로드·설치). 최근 자동 업데이트가 일반적.", "sub": ""}, {"t": "c", "term": "중요도", "def": "중요 업데이트(취약점 패치·중대 문제 개선 등 필수), 선택적 업데이트(작업 환경 향상·드라이버·신규 SW 등 선택).", "sub": ""}, {"t": "c", "term": "자동 업데이트 동작 구조", "def": "① 중앙 서버→관리 서버로 패치 정보(버전·URL 목록) 송신 → ② 최신이 아니면 파일 다운로드 → ③ 패치 전 설정값 등 중요 정보 백업 → ④ 업데이트 대상 파일 설치.", "sub": ""}]}]}]}], "count": 51}, {"id": "07", "title": "보안로그 분석", "notes": ["학습모듈: 보안시스템 로그를 분석하고, 보안로그 상관분석을 수행하며, 탐지패턴을 개발·최적화한다."], "units": [{"title": "학습 1. 보안시스템 로그 분석하기", "sections": [{"title": "1-1. 보안로그 확인", "groups": [{"title": "보안로그", "items": [{"t": "c", "term": "로그(Log)의 개념", "def": "특정 사건(Event) 발생 시 발생 시점·내용·발생 주체 등의 정보를 기록한 것. 정책에 해당/위반되는 사건이나 장애 등 목표한 사건의 상세 내역을 기록.", "sub": ""}, {"t": "c", "term": "보안로그(Security Log)의 정의", "def": "로그 중 \"보안사건에 해당하는 로그\". 보안정책에 해당하는 사건에 대한 기록으로, 주체·객체·발생 시간·행위·영향 범위 등의 정보를 포함.", "sub": ""}]}, {"title": "사이버 공격", "items": [{"t": "c", "term": "사이버 공격", "def": "인터넷을 통해 이루어지는 외부의 인가되지 않은 공격으로, 내부 중요 정보가 변조·삭제·유출되는 현상.", "sub": ""}, {"t": "c", "term": "사이버 공격 유형", "def": "홈페이지 악성코드 유포, 홈페이지 변조, DDoS, 피싱(Phishing), 파밍(Pharming), 스미싱(Smishing).", "sub": ""}, {"t": "c", "term": "사이버공격 발생 순서", "def": "자산(가치+강점/취약점 동시 존재) 인지 → 자산 특성 조사·정보 수집 → 취약점 확인 → 악용 도구(Tool) 확보 → 취약점 공격.", "sub": ""}]}, {"title": "침해대응 절차", "items": [{"t": "c", "term": "침해대응 절차", "def": "침해(보안)사고 발생 시 대응하는 일련의 과정과 수행 행동. 사고 유형별 세부 대응 지침 마련 필요.", "sub": ""}, {"t": "c", "term": "수립 목적", "def": "이해관계자별 역할·책임 명시로 신속한 업무 복구 유도, 조치 업무 순서·책임 범위 규정.", "sub": ""}, {"t": "c", "term": "침해사고 대응 절차", "def": "사고 전 준비 → 사고 탐지(이상 징후·정탐/오탐 확인) → 초기 대응(세부사항 기록·관련 부서 통지) → 대응 전략 수립(전파·후속 공격 차단) → 사고 조사(데이터 수집·분석·복구) → 종료(보고서 작성·개선안 도출).", "sub": ""}]}]}, {"title": "1-2. 보안로그 분석", "groups": [{"title": "보안사건 판단", "items": [{"t": "c", "term": "보안사건 판단", "def": "침해사고 발생 시 해당 접근이 악의적 공격인지 정상 접근인지를 분석하는 행위.", "sub": ""}, {"t": "c", "term": "보안사건 탐지", "def": "정책(규칙)과 일치 여부 확인 → 일치 시 '탐지', 불일치 시 '미탐지'. 규칙에 없으나 악의적 공격이면 Zero-day 공격으로 분류해 담당자가 직접 차단.", "sub": ""}, {"t": "n", "text": "보안사건 탐지 분류 :"}, {"t": "c", "term": "정탐", "def": "정해진 규칙에 따라 보안사고를 정상 탐지(침해 사건을 보안사고로 판정, 비침해를 비사고로 판정).", "sub": ""}, {"t": "c", "term": "오탐", "def": "탐지 오류(보안사고가 아닌데 사고로 판정, 침해사건을 비사고로 판정).", "sub": ""}, {"t": "n", "text": "오탐 유형 :"}, {"t": "c", "term": "FAR(False Acceptance Ratio)", "def": "악의적 공격을 정상 접근으로 판단하는 오탐. 규칙 부재·과도한 예외처리 시 발생, 보안 요구사항 높은 조직에서 발생.", "sub": ""}, {"t": "c", "term": "FRR(False Reject Ratio)", "def": "정상 접근을 보안 사건으로 판단하는 오탐. 규칙 오설정·예외처리 미적용 시 발생, 보안 요구사항 낮은 조직에서 발생.", "sub": ""}, {"t": "c", "term": "ERR(Equal Error Rate, =CER)", "def": "FRR과 FAR이 동일하여 탐지 효율이 가장 높은 상태.", "sub": ""}]}, {"title": "IP Packet", "items": [{"t": "c", "term": "IP(Internet Protocol) 개념", "def": "인터넷상의 한 컴퓨터에서 다른 컴퓨터로 데이터를 보내는 프로토콜. OSI 7계층 중 Layer 3의 대표 프로토콜.", "sub": ""}, {"t": "c", "term": "IP Packet 구조", "def": "L2 Header(LAN용, Ethernet/IPX) + L3 Header(WAN용, 논리적 식별자·라우팅, IPv4/IPv6) + L4 Header(네트워크 제어·세션, TCP/UDP/ICMP) + Data(실제 사용자 데이터).", "sub": ""}, {"t": "c", "term": "구조 이해의 의미", "def": "IP Packet은 가장 많이 사용되는 프로토콜이므로 악의적 공격도 이를 사용. 각 Layer의 공격 기법·원리 이해가 필요.", "sub": ""}]}]}]}, {"title": "학습 2. 보안로그 상관분석하기", "sections": [{"title": "2-1. 시스템별 보안로그 분석", "groups": [{"title": "보안시스템 선별", "items": [{"t": "c", "term": "보안로그 기록", "def": "대부분의 정보시스템은 보안사고 여부와 무관하게 로그를 기록하며, 그중 보안사건에 해당하면 보안로그로 간주.", "sub": ""}, {"t": "n", "text": "보안시스템 유형 :"}, {"t": "c", "term": "네트워크", "def": "방화벽(정책 기반 트래픽 허용/차단·URL 차단·정보유출 차단), VPN(암호키 관리·암복호화·Replay 감지), IPS/IDS(악성코드 탐지·차단·격리), NAC(인증·비인가 시스템 차단).", "sub": ""}, {"t": "c", "term": "Platform", "def": "Vaccine(악성코드 탐지·차단·복구), PMS(OS 패치·비인가 SW 탐지), 키보드 보안(키 입력 암호화), SecureOS(자원 비인가 접근 차단·비정상 프로세스 탐지).", "sub": ""}, {"t": "c", "term": "Application", "def": "DRM·DLP(전자문서 생성/수정/출력 통제), USB 보안(분실·장착 식별·데이터 삭제), PKI(인증서 발행/폐기/갱신).", "sub": ""}, {"t": "n", "text": "보안로그 기록 방식 :"}, {"t": "c", "term": "저장 Type", "def": "File(저장 용량 최소화·저용량 시 검색 속도↑), Database(저장 공간 증대·대용량 시 검색 속도↑·암호화·통합 저장).", "sub": ""}, {"t": "c", "term": "저장 위치", "def": "Local Storage(내부 File System 활용, 장치 고장 시 활용 불가), 통합 로그 서버(네트워크로 다수 시스템 로그를 한 서버에 저장·연관 분석·수평 확장 가능).", "sub": ""}, {"t": "c", "term": "Platform별 보안로그", "def": "운영체제·로그 종류에 따라 저장 방식(File/Text, File/Binary)·조회 방법(제어판, GUI, Shell)이 상이.", "sub": ""}]}]}, {"title": "2-2. 상관분석", "groups": [{"title": "공격경로 확인 기법", "items": [{"t": "c", "term": "공격경로의 개념", "def": "외부 악의적 행위자가 내부 시스템에 실행한 공격의 경로를 확인·도식화하는 행위. 공격 기법·도구·지원 시스템·플랫폼도 함께 조사.", "sub": ""}, {"t": "c", "term": "기본 공격경로 확인 기법", "def": "공격 주체 확인, 단순 Routing 경로·Tracerouting 확인(1차 공격지까지 경로). 공격 주체 검증은 어려움.", "sub": ""}, {"t": "c", "term": "상세 공격경로 확인 기법", "def": "공격 주체 시스템에 직접 접속해 로그·행위 분석. 실제 공격 주체 여부·경로 시스템 여부 검증, 공격 기법·취약점 확인 가능.", "sub": ""}, {"t": "c", "term": "확인 시 주의사항", "def": "제2~3국 공격 주체 확인은 수사 협조 필요(미협조 시 국제법 위반), 주체 특정 검증은 Terminal Service·Relay Tool·계정 도용 여부까지 반복 검증.", "sub": ""}]}, {"title": "피해분석 범위", "items": [{"t": "c", "term": "피해분석의 개념", "def": "침해사고로 인한 내부 전체 자산의 피해 정도를 확인하는 행위. 물리적 피해뿐 아니라 논리적 피해·복구 비용을 포괄.", "sub": ""}, {"t": "c", "term": "피해분석 범위 유형", "def": "직접적 피해(물리적 피해-시스템 손상·교체, 논리적 피해-연계·지원 정도 대상), 간접적 피해(보안솔루션 도입 비용, 소송 대응·보상 등).", "sub": ""}]}]}]}, {"title": "학습 3. 탐지패턴 개발하기", "sections": [{"title": "3-1. 탐지패턴 개발", "groups": [{"title": "탐지패턴 개발", "items": [{"t": "c", "term": "개발 목적", "def": "새롭게 발견된 공격이 재발할 경우 즉각 탐지·차단하기 위해 탐지패턴을 개발·적용.", "sub": ""}, {"t": "n", "text": "탐지 모형 :"}, {"t": "c", "term": "이상 탐지", "def": "정보·정보 유입 순서가 규칙에 부합하는지 확인, 규칙 위반 시 보안사건으로 간주(예: 규칙 i=정수인데 i=\"A\"이면 이상 행위).", "sub": ""}, {"t": "c", "term": "오용 탐지", "def": "정보 활용 정도를 확인, 접근/반복 시도가 임계치를 초과하면 위반으로 간주(예: 규칙 1Gbps인데 5Gbps 유입이면 오용 행위).", "sub": ""}, {"t": "n", "text": "탐지패턴 개발 프로세스 :"}, {"t": "c", "term": "공격 기법 분석", "def": "공격의 유니크한 특징 도출(공격 순서·메카니즘 분석, 영향받는 시스템·SW 식별, 피해 정도 산정).", "sub": ""}, {"t": "c", "term": "탐지패턴 개발", "def": "적용 보안시스템 선정, 적용 가능한 규칙(정규식 등) 선정, 공격 특징 표현, 보안시스템에 적용.", "sub": ""}, {"t": "c", "term": "탐지패턴 검증", "def": "동일·유사 공격으로 정탐률·오탐률 검사, 반복 수행으로 최적화.", "sub": ""}, {"t": "c", "term": "탐지패턴 배포", "def": "동일·유사 보안시스템에 전달·적용.", "sub": ""}, {"t": "c", "term": "탐지패턴 개발 도구", "def": "보안로그(출발지/경유지 IP·국가·Port·프로토콜·Packet 내용 도출), 공격도구(공격 Sequence·메카니즘 확보).", "sub": ""}]}]}, {"title": "3-2. 탐지패턴 최적화", "groups": [{"title": "탐지패턴 최적화", "items": [{"t": "c", "term": "최적화 목적", "def": "오탐률 최소화·정탐률 증가, 탐지 Resource 소모 최소화·속도 증가, 업무 지속성 보장·외부 공격 차단의 개선 과정.", "sub": ""}, {"t": "n", "text": "탐지패턴 최적화 프로세스 :"}, {"t": "c", "term": "탐지패턴 적용", "def": "개발된 패턴을 보안시스템에 업로드·적용(Monitoring만 적용 가능).", "sub": ""}, {"t": "c", "term": "탐지율 평가", "def": "인위적으로 동일 침해사고를 발생시켜 탐지 여부 확인, 정상·유사 접속으로 오탐 확인(최소 1일 이상 지속 평가).", "sub": ""}, {"t": "c", "term": "원인 분석", "def": "패턴 분석·업무 시스템 환경 분석·오탐 Traffic과 현행 패턴의 Gap 분석.", "sub": ""}, {"t": "c", "term": "탐지패턴 개선", "def": "탐지 범위·표현식 변경 및 재적용.", "sub": ""}, {"t": "c", "term": "최적화 주의사항", "def": "초기 패턴은 Monitoring만 적용(업무 지장 방지), 탐지 범위 과대 설정 시 오탐↑, 과소 설정 시 미탐↑, 표현식 오류 시 Resource 과소모·성능 저하.", "sub": ""}]}, {"title": "탐지 성능 개선", "items": [{"t": "c", "term": "배경", "def": "개발 직후 탐지패턴은 오탐률·Resource 소모량이 높아 효율이 떨어짐.", "sub": ""}, {"t": "c", "term": "목적", "def": "탐지 범위·방법을 변경하여 탐지 효율·성능을 높임.", "sub": ""}, {"t": "n", "text": "탐지 성능 개선 기법 :"}, {"t": "c", "term": "탐지 범위 조정", "def": "범위 축소(미탐률↓·오탐률↑), 범위 확대(정탐률↑·Resource 사용↑).", "sub": ""}, {"t": "c", "term": "탐지 표현식 변경", "def": "Converting 과정을 최소화하여 탐지 효율을 높임.", "sub": ""}, {"t": "c", "term": "탐지 순서 변경", "def": "조합 패턴을 동시 매칭/단일 패턴으로 변경해 성능 향상.", "sub": ""}, {"t": "c", "term": "탐지 적용 대상 변경", "def": "가변 범위를 모두 포함한 패턴으로 변경해 Skip 과정에 의한 성능 저하 방지.", "sub": ""}]}]}]}], "count": 51}, {"id": "08", "title": "정보 시스템 진단", "notes": ["학습모듈: 정보 시스템 진단 기준을 마련하고, 진단 결과를 도출하며, 대응책을 마련한다."], "units": [{"title": "학습 1. 정보 시스템 진단 기준 마련하기", "sections": [{"title": "1-1. 정보 시스템 진단 준비 및 취약점 정보 파악", "groups": [{"title": "정보 시스템의 개요", "items": [{"t": "c", "term": "정보 시스템의 개요", "def": "정보 시스템은 기업이 다양한 의사 결정을 내리는 데 필요한 정보를 수집하고 그것을 목적에 따라 가공하며, 그 결과를 의사 결정자에게 제공하는 구조이다.", "sub": ""}, {"t": "n", "text": "정보 시스템의 관리 요소(10가지) :"}, {"t": "c", "term": "구성 및 변경 관리", "def": "HW·SW의 구성 현황·이력·구성 파일·파라미터·구성도를 관리하고 변경 사항을 효율적으로 관리하는 업무.", "sub": ""}, {"t": "c", "term": "운영 상태 관리", "def": "구성 요소의 운영 상태를 관리해 이상 징후를 발견·기록·분류·통지하여 가용성을 향상.", "sub": ""}, {"t": "c", "term": "성능 관리", "def": "효율·응답 속도를 최적 상태로 유지하기 위해 낮은 성능 요소를 찾아 개선.", "sub": ""}, {"t": "c", "term": "장애 관리", "def": "SW·HW·DB·네트워크의 고장·장애·서비스 불능을 관찰·진단·보고·제어·처리하는 과정.", "sub": ""}, {"t": "c", "term": "보안 관리", "def": "정보 자산의 정보 보호 활동·절차를 체계적으로 관리해 기밀성·무결성·가용성을 확보하고 불법 유출·파괴·변경으로부터 보호.", "sub": ""}, {"t": "c", "term": "백업 관리", "def": "장애·재해로 정보 소실·손상에 대비해 데이터를 별도 매체에 예비 저장하여 정보 시스템의 영속성을 보장.", "sub": ""}, {"t": "c", "term": "사용자 지원 관리", "def": "운영 지침서 수정·보완, 교육, 요구 처리 등으로 최종 사용자 만족도를 향상.", "sub": ""}, {"t": "c", "term": "전산실 관리", "def": "전산실 접근 통제와 건물·설비 관리로 전산 시스템 운용의 안전성·신뢰성을 보장.", "sub": ""}, {"t": "c", "term": "운영 아웃소싱 관리", "def": "효율적·체계적 운영을 위해 외부 기관으로부터 운영 서비스를 획득하는 절차.", "sub": ""}, {"t": "c", "term": "예산 관리", "def": "운영 예산 소요를 예측하고 예산을 계획·집행·통제하는 절차와 지침.", "sub": ""}]}, {"title": "위험의 정의", "items": [{"t": "c", "term": "위험의 정의", "def": "위험(risk)은 원하지 않는 사건이 발생하여 손실 또는 부정적 영향을 미칠 가능성. 손실 사건 발생 가능성과 발생 손실 정도에 비례.", "sub": ""}, {"t": "c", "term": "위험 평가 산식", "def": "위험 = 발생 가능성 × 손실의 정도.", "sub": ""}, {"t": "c", "term": "위험 평가 함수", "def": "위험 = f(자산, 위협, 취약성).", "sub": ""}]}, {"title": "위험의 구성 요소", "items": [{"t": "c", "term": "자산(Asset)", "def": "조직이 보호해야 할 대상(정보·HW·SW, 인력 등 무형 자산 포함). 데이터·문서·SW·HW·물리적·인적 자산 등으로 구분. 위험 분석 시 보안 사고 발생 시의 손실(loss)을 파악.", "sub": ""}, {"t": "c", "term": "위협(Threats)", "def": "자산에 손실을 초래할 수 있는 원치 않는 사건의 잠재적 원인. 환경적 요인(자연재해·장비 고장)과 인간에 의한 위협(의도적/우연적)으로 분류. 핵심 속성은 발생 가능성(연간 발생 횟수). 위협의 발생 가능성과 성공 가능성은 다를 수 있음.", "sub": ""}, {"t": "c", "term": "취약성(Vulnerability)", "def": "자산의 잠재적 속성으로 위협의 이용 대상, 또는 정보 보호 대책의 미비. 자산과 위협 사이의 관계를 맺어 주는 특성.", "sub": ""}, {"t": "c", "term": "취약성 속성", "def": "모든 자산에 잠재, 그 자체로는 위협을 초래하지 않고 위협에 이용될 때만 위험 발생, 대응책이 늘수록 감소, 대응책 자체도 취약성을 가져 0이 될 수 없음.", "sub": ""}, {"t": "c", "term": "취약성 유형 분류", "def": "관리적 측면(정책·조직·인사), 물리적 측면(건물·시설물), 기술적 측면(네트워크·시스템·DB·PC·응용 프로그램).", "sub": ""}]}]}, {"title": "1-2. 정보 시스템 위험 평가 방법 및 보호 대책 파악", "groups": [{"title": "위험 평가 방법론", "items": [{"t": "c", "term": "위험 관리", "def": "자산의 위험을 수용 가능한 수준으로 유지하기 위해 위험을 분석하고 보호 대책을 마련하는 과정.", "sub": ""}, {"t": "c", "term": "기준선 접근법(Baseline)", "def": "모든 정보 자산에 보호 기본 수준을 정하고 보호 대책을 적용. 시간·비용 적게 들지만 부서별 보안 수준이 과대/과소할 수 있음.", "sub": ""}, {"t": "c", "term": "비정형 접근법(Informal)", "def": "전문가의 지식·경험으로 위험 분석(전문가 판단법). 작은 조직에 효과적이나 위험 평가·비용 도출이 어렵고 사후 관리 제한.", "sub": ""}, {"t": "c", "term": "상세 위험 분석(Detail Risk Analysis)", "def": "자산 가치·위협·취약성을 분석해 위험 정도를 결정. 적절한 보안 수준 마련 가능하나 전문 지식·시간·노력 소요.", "sub": ""}, {"t": "c", "term": "정성적 위험 평가", "def": "손실·위험을 개략적 크기로 비교, 상황 설명으로 묘사.", "sub": ""}, {"t": "c", "term": "정량적 위험 평가", "def": "위험을 손실액 등 숫자값으로 표현. 연간 기대 손실 = 위협 성공 시 예상 손실액 × 발생률.", "sub": ""}, {"t": "c", "term": "복합 접근법(Combined)", "def": "위험이 높은 시스템은 상세 위험 분석, 그 외는 기준선 접근법 적용. 신속한 보안 전략 수립·효율적.", "sub": ""}]}, {"title": "위험 처리 방법", "items": [{"t": "c", "term": "위험 수용", "def": "현재의 위험을 받아들이고 잠재적 손실 비용을 감수(일정 수준 이하 위험 인정).", "sub": ""}, {"t": "c", "term": "위험 감소", "def": "위험을 감소시키는 대책을 채택·구현. 비용 효과 분석으로 양(+)의 효과를 갖는 대책 선택(보호 대책 효과 = 원래 ALE − 대책 구현 후 ALE − 연간 대책 비용).", "sub": ""}, {"t": "c", "term": "위험 회피", "def": "위험이 존재하는 사업을 수행하지 않고 포기.", "sub": ""}, {"t": "c", "term": "위험 전가", "def": "보험·외주 등으로 잠재적 위험 비용을 제3자에게 이전.", "sub": ""}]}, {"title": "정보 보호 관리 체계", "items": [{"t": "c", "term": "정보 보호 관리 체계", "def": "조직 자산을 효율적으로 보호하도록 기술적·물리적·관리적·조직적 보호 대책을 구현하고 지속 관리·운영하는 종합적 체계. 기밀성·무결성·가용성·준거성 달성을 위해 위험을 평가하고 대책을 수립·운영.", "sub": const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const state={sel:[],catFilter:-1,mode:"landing",drill:"flash",query:""};
function selIdx(){return state.sel.slice().sort((a,b)=>a-b);}
function selSig(){return selIdx().join(',');}

/* ---------- 개념 평탄화 & 진도 ---------- */
function conceptsOf(si){
  const out=[]; const s=STUDY_DATA.subjects[si];
  s.units.forEach((u,ui)=>u.sections.forEach((sec,xi)=>sec.groups.forEach((g,gi)=>g.items.forEach(it=>{
    if(it.t==="c") out.push({term:it.term,def:it.def,sub:it.sub,unit:u.title,sec:sec.title,group:g.title,
      id:s.id+"|"+ui+"|"+xi+"|"+gi+"|"+it.term});
  }))));
  return out;
}
const PKEY="secstudy_progress_v1";
let progress=JSON.parse(localStorage.getItem(PKEY)||"{}");
const saveP=()=>localStorage.setItem(PKEY,JSON.stringify(progress));
const isLearned=id=>!!progress[id];
function toggleLearned(id){progress[id]?delete progress[id]:progress[id]=1;saveP();}
/* 학습 통계 */
const SKEY="secstudy_stats_v1";
let stats=JSON.parse(localStorage.getItem(SKEY)||"null")||{};
stats.practice=stats.practice||{total:0,correct:0};
stats.flashq=stats.flashq||{total:0,correct:0};
stats.exams=stats.exams||[];
const saveS=()=>localStorage.setItem(SKEY,JSON.stringify(stats));
function recPractice(ok){stats.practice.total++;if(ok)stats.practice.correct++;saveS();}
function recFlash(ok){stats.flashq.total++;if(ok)stats.flashq.correct++;saveS();}
function recExam(rec){stats.exams.unshift(rec);stats.exams=stats.exams.slice(0,20);saveS();}

/* ---------- 과목 선택 변경 ---------- */
function onSelChange(){
  state.catFilter=-1; resetQuiz(); exam.started=false; fc.subj="";
  if(state.sel.length && !["concept","drill"].includes(state.mode)) state.mode="concept";
  state.query=""; const sb=$("#search"); if(sb)sb.value="";
  render();
}

/* ---------- 렌더 라우터 ---------- */
function render(){
  const noSel=state.sel.length===0;
  const isLanding=noSel||state.mode==="landing";
  $$(".tab").forEach(t=>{t.classList.toggle("active",!noSel&&t.dataset.mode===state.mode);t.classList.toggle("disabled",noSel);});
  if(isLanding){ renderLanding(noSel); return; }
  $("#subjTitle").textContent = state.sel.length===1?STUDY_DATA.subjects[state.sel[0]].title:`${state.sel.length}개 과목 선택`;
  if(state.mode==="concept"){
    $("#content").innerHTML='<div class="wrap"><div id="catbar"></div><div id="view"></div></div>';
    renderCatBar(); renderBrowse();
  }else{
    $("#content").innerHTML='<div class="wrap"><div id="drillbar"></div><div id="view"></div></div>';
    renderDrillBar(); renderDrill();
  }
}
function renderLanding(noSel){
  $("#subjTitle").textContent="과목 선택";
  const allSel=state.sel.length===STUDY_DATA.subjects.length;
  let tot=0,td=0;
  const chips=STUDY_DATA.subjects.map((s,i)=>{
    const on=state.sel.includes(i),cs=conceptsOf(i);
    const done=cs.filter(c=>isLearned(c.id)).length;
    const pct=cs.length?Math.round(done/cs.length*100):0;
    tot+=cs.length; td+=done;
    return `<button class="bigchip ${on?'on':''}" data-pick="${i}">
      <span class="ck">${on?'☑':'☐'}</span>
      <span class="bt"><span class="bn">${esc(s.title)}</span>
        <span class="bm">개념 ${cs.length}개 · 학습 ${done} (${pct}%)</span>
        <span class="bar"><i style="width:${pct}%"></i></span></span></button>`;}).join("");
  const tpct=tot?Math.round(td/tot*100):0;
  $("#content").innerHTML=`<div class="wrap"><div class="landing">
    <h2>📚 정보보안 학습</h2>
    <p class="lmuted">학습할 과목을 선택하세요. 여러 개 선택하면 개념·드릴존·모의고사가 함께 구성됩니다.</p>
    <div class="lsum">
      <div class="big">${tpct}%</div>
      <div class="mid">
        <div class="ls">전체 진도 · 학습 <b>${td}</b> / ${tot}개 · ${STUDY_DATA.subjects.length}과목</div>
        <div class="lbar"><i style="width:${tpct}%"></i></div>
      </div>
    </div>
    <button class="chip selallbtn ${allSel?'active':''}" id="lAll">${allSel?'☑ 전체 해제':'☐ 전체 선택'}</button>
    <div class="pickgrid">${chips}</div>
    <button class="btn primary biggo" id="goStudy" ${noSel?'disabled':''}>선택 완료 · 학습 시작${state.sel.length?` (${state.sel.length}과목)`:''} →</button>
    <div style="text-align:center;color:var(--muted);font-size:11px;margin-top:14px">정보보안 학습앱 v3 · 모바일 지원</div>
  </div></div>`;
  $$("[data-pick]").forEach(b=>b.onclick=()=>{const i=+b.dataset.pick,k=state.sel.indexOf(i);if(k>=0)state.sel.splice(k,1);else state.sel.push(i);render();});
  $("#lAll").onclick=()=>{state.sel=allSel?[]:STUDY_DATA.subjects.map((_,i)=>i);render();};

}
function poolByScope(){let a=[];selIdx().forEach(i=>a=a.concat(conceptsOf(i)));return a;}
/* 개념 카테고리 칩 (선택 과목이 2개 이상일 때 과목 필터) */

/* ---------- 읽기 ---------- */
function hl(text){ if(!state.query)return esc(text);
  const re=new RegExp("("+state.query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
  return esc(text).replace(re,'<mark>$1</mark>'); }
function esc(t){return t.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function renderBrowse(){
  const q=state.query.toLowerCase();
  const match=(a,b)=>!q||(a+ " "+b).toLowerCase().includes(q);
  const ids=(state.catFilter>=0&&state.sel.includes(state.catFilter))?[state.catFilter]:selIdx();
  const multi=selIdx().length>1;
  let html="";
  ids.forEach(si=>{
    const s=STUDY_DATA.subjects[si]; let shtml="";
    if(s.notes.length && !q && !multi) shtml+=`<div class="meta-notes">${s.notes.map(n=>`<span>${esc(n)}</span>`).join("")}</div>`;
    s.units.forEach((u,ui)=>{
      let usec="";
      u.sections.forEach((sec,xi)=>{
        let grp="";
        sec.groups.forEach((g,gi)=>{
          let cur="",rows="",cnt=0;
          g.items.forEach(it=>{
            if(it.t==="n"){ if(!q) rows+=`<div class="note">${esc(it.text)}</div>`; return; }
            if(!match(it.term,it.def)) return; cnt++;
            if(it.sub && it.sub!==cur){cur=it.sub;rows+=`<div class="sub">${esc(it.sub)}</div>`;}
            const id=s.id+"|"+ui+"|"+xi+"|"+gi+"|"+it.term;
            rows+=`<div class="c ${isLearned(id)?'learned':''}" data-id="${id}">
              <button class="mark" title="학습 표시">${isLearned(id)?'✅':'⬜'}</button>
              <div class="term">${hl(it.term)}</div><div class="def">${hl(it.def)}</div></div>`;
          });
          if(rows.trim()) grp+=`<div class="group"><h4>${esc(g.title)||'개념'} <span class="pill">${cnt}</span></h4>${rows}</div>`;
        });
        if(grp) usec+=`<div class="section">${sec.title?`<h3>${esc(sec.title)}</h3>`:""}${grp}</div>`;
      });
      if(usec) shtml+=`<div class="unit"><h2>${esc(u.title)}</h2>${usec}</div>`;
    });
    if(shtml) html+= multi?`<div class="subjblock"><div class="subjh">📁 ${esc(s.title)}</div>${shtml}</div>`:shtml;
  });
  $("#view").innerHTML=html||'<div class="empty">검색 결과가 없습니다.</div>';
  $$(".c .mark").forEach(b=>b.onclick=e=>{e.stopPropagation();const c=b.closest(".c");toggleLearned(c.dataset.id);
    c.classList.toggle("learned");b.textContent=c.classList.contains("learned")?'✅':'⬜';});
}

/* ---------- 플래시카드 (암기용 / 퀴즈용) ---------- */
let fc={mode:"memo",dir:"t2d",deck:[],pos:0,flip:false,subj:"",ses:{ok:0,total:0}};
function buildDeck(){fc.deck=shuffle(poolByScope());fc.pos=0;fc.flip=false;fc.subj=selSig();fc.ses={ok:0,total:0};}
function renderCard(){

    <div class="card" id="card"><div class="card-inner">
      <div class="face front"><div class="tag" id="fcFTag"></div>
        <div class="q" id="fcFront"></div><div class="hint" id="fcHint"></div>
        <div class="crumb" id="fcFCrumb"></div></div>
      <div class="face back"><div class="tag">정답</div>

    </div></div>

      <span id="fcHelp"></span></div></div>`;
  $("#card").onclick=()=>{
    if(fc.mode==="memo"){fc.flip=!fc.flip;$("#card").classList.toggle("flipped",fc.flip);}

  $$("[data-fcd]").forEach(b=>b.onclick=()=>{if(fc.dir===b.dataset.fcd)return;fc.dir=b.dataset.fcd;fc.flip=false;updateCard();});

/* 카드 내용만 in-place 갱신 (전체 재렌더 없이 깜빡임 방지) */
function updateCard(){
  const cs=poolByScope(); if(!cs.length)return;
  const c=fc.deck[fc.pos], memo=fc.mode==="memo", t2d=fc.dir==="t2d";
  const done=cs.filter(x=>isLearned(x.id)).length;
  $$("[data-fcm]").forEach(b=>b.classList.toggle("active",b.dataset.fcm===fc.mode));
  $$("[data-fcd]").forEach(b=>b.classList.toggle("active",b.dataset.fcd===fc.dir));
  $("#fcFTag").textContent=memo?(t2d?"용어":"정의"):(t2d?"용어 (정의를 떠올리세요)":"정의 (용어를 떠올리세요)");
  $("#fcFront").textContent=t2d?c.term:c.def;
  $("#fcHint").textContent=memo?(t2d?"카드를 클릭하면 정의가 보입니다":"카드를 클릭하면 용어가 보입니다"):"생각한 뒤 카드를 클릭/스페이스로 확인";
  $("#fcFCrumb").textContent=c.sub||c.group||"";
  $("#fcBTerm").textContent=c.term;
  $("#fcBDef").textContent=c.def;
  $("#fcBCrumb").textContent=`${c.unit||""} · ${c.sec||""}`;
  $("#fcCounter").textContent=`${fc.pos+1} / ${fc.deck.length} · 암기표시 ${done}/${cs.length}`+(memo?"":` · 이번 세션 ${fc.ses.ok}/${fc.ses.total}`);
  $("#fcHelp").textContent=memo?"스페이스=뒤집기 · ←/→ 이동":"스페이스=확인 · 맞음/틀림으로 채점";
  $("#card").classList.toggle("flipped",fc.flip);
  updateActions();
}
function updateActions(){
  const c=fc.deck[fc.pos], memo=fc.mode==="memo", a=$("#fcActions"); if(!a)return;
  if(memo){
    a.innerHTML=`<button class="btn" id="prev">← 이전</button>`+
      `<button class="btn ${isLearned(c.id)?'ok':''}" id="learn">${isLearned(c.id)?'✅ 외움':'외움 표시'}</button>`+
      `<button class="btn primary" id="next">다음 →</button>`;
    $("#prev").onclick=()=>{fc.pos=(fc.pos-1+fc.deck.length)%fc.deck.length;fc.flip=false;updateCard();};
    $("#next").onclick=()=>{fc.pos=(fc.pos+1)%fc.deck.length;fc.flip=false;updateCard();};
    $("#learn").onclick=()=>{toggleLearned(c.id);updateCard();};
  }else{
    a.innerHTML=fc.flip
      ? `<button class="btn bad" id="wrong">✘ 틀림</button><button class="btn ok" id="rightq">✔ 맞음</button>`
      : `<button class="btn primary" id="reveal">정답 확인 (스페이스)</button>`;
    const rev=$("#reveal"); if(rev)rev.onclick=()=>{fc.flip=true;$("#card").classList.toggle("flipped",true);updateActions();};
    const grade=ok=>{fc.ses.total++;if(ok){fc.ses.ok++;}else{fc.deck.push(c);} recFlash(ok);
      fc.pos++; if(fc.pos>=fc.deck.length)fc.pos=0; fc.flip=false; updateCard();};
    const rg=$("#rightq"); if(rg)rg.onclick=()=>grade(true);
    const wr=$("#wrong"); if(wr)wr.onclick=()=>grade(false);
  }
}

/* ---------- 퀴즈 (정보보안산업기사 1차/2차 대비) ---------- */
/* 모든 문항은 개념정리(폴더 자료)의 용어·정의를 '그대로' 사용해 생성한다. */
const EXAMS={
  "1":{name:"1차 (필기·객관식/주관식)",
    types:[["mc_d2t","4지택일"],["ox","진위형 O/X"],["match","연결형"],["short","단답형"]],
    info:"1차 대비: 모든 문항은 '설명 → 용어' 방향 · 전체 개념 출제 · 합격 40%"},
  "2":{name:"2차 (실기·필답형)",
    types:[["bank","보기 골라쓰기"]],
    info:"2차 대비: 설명을 보고 보기에서 알맞은 용어 선택 · 전체 개념 출제 · 합격 60%"}
};
let quiz={exam:"1",type:"mc_d2t",len:10,set:[],idx:0,summary:false,_sig:""};
const QUIZ_LENS=[10,20,30];
function quizPool(){return poolByScope();}
function resetQuiz(){quiz.set=[];quiz.idx=0;quiz.summary=false;quiz._sig="";}
function qsig(){return quiz.exam+"|"+quiz.type+"|"+selSig()+"|"+quiz.len;}
function pick(pool,n,exclude){return shuffle(pool.filter(c=>!exclude||(c.term!==exclude.term&&c.def!==exclude.def))).slice(0,n);}
/* 보기(오답) 생성: 같은 섹션→같은 단원→전체 순으로 주제가 가까운 것을 우선,
   정답과 용어·정의 중복 및 보기 간 용어 중복을 배제 */
function pickDistractors(pool,n,c){
  const used=new Set([c.term]); const out=[];
  const add=arr=>{for(const x of shuffle(arr)){if(out.length>=n)break;
    if(x.term===c.term||x.def===c.def||used.has(x.term))continue;used.add(x.term);out.push(x);}};
  add(pool.filter(x=>x.sec&&x.sec===c.sec));
  if(out.length<n) add(pool.filter(x=>x.unit&&x.unit===c.unit));
  if(out.length<n) add(pool);
  return out;
}
function makeQ(type,c,pool){
  if(type==="match"){
    const grp=pool.filter(x=>x.sec&&x.sec===c.sec);
    const set=grp.length>=4?shuffle(grp).slice(0,4):shuffle([c,...pickDistractors(pool,3,c)]).slice(0,4);
    return{type,kind:"match",set,order:shuffle(set.map((_,i)=>i)),sel:{},done:false};}
  if(type==="ox"){const t=Math.random()<0.5;let shown=c;
    if(!t){const o=pickDistractors(pool,1,c)[0];if(o)shown={term:c.term,def:o.def};else return makeQ(type,c,pool);}
    return{type,kind:"ox",concept:c,shown,isTrue:t,done:false};}
  if(type==="bank"){const opts=shuffle([c,...pickDistractors(pool,9,c)]);return{type,kind:"bank",concept:c,options:opts,answer:opts.indexOf(c),done:false};}
  if(type==="short"||type==="fill"){return{type,kind:"short",concept:c,done:false};}
  const opts=shuffle([c,...pickDistractors(pool,3,c)]);return{type,kind:"mc",concept:c,options:opts,answer:opts.indexOf(c),done:false};
}
function genSet(){
  const pool=quizPool(), uniq=shuffle(pool);
  quiz.len=uniq.length;
  quiz.set=[]; quiz.idx=0; quiz.summary=false;
  for(let i=0;i<quiz.len;i++){quiz.set.push(makeQ(quiz.type,uniq[i],pool));}
  quiz._sig=qsig();
}
function quizScore(){const d=quiz.set.filter(q=>q.done);return{answered:d.length,correct:d.filter(q=>q.correct).length};}
function renderQuiz(){
  const pool=quizPool();
  const ex=EXAMS[quiz.exam];
  if(!ex.types.some(t=>t[0]===quiz.type)) quiz.type=ex.types[0][0];
  const need = quiz.type==="match"?4:(quiz.type==="bank"||quiz.type==="fill"?6:(quiz.type==="short"?1:4));
  const typeseg = ex.types.length>1
    ? `<div class="seg typeseg">${ex.types.map(t=>`<button data-type="${t[0]}" class="${quiz.type===t[0]?'active':''}">${t[1]}</button>`).join("")}</div>`
    : "";
  const head=`<div class="quiz-head">${typeseg}
    <div class="examinfo" style="margin:0;flex:1">📋 ${ex.info}</div></div>`;
  if(pool.length<need){
    $("#view").innerHTML=`<div class="quiz">${head}<div class="empty">이 유형에는 개념이 ${need}개 이상 필요합니다. 좌측에서 과목을 더 선택하세요.</div></div>`;
    bindQuizControls();return;
  }
  if(quiz._sig!==qsig()||!quiz.set.length) genSet();
  if(quiz.summary){ renderQuizSummary(head); return; }
  const q=quiz.set[quiz.idx], sc=quizScore();
  let body="";
  if(q.kind==="mc") body=qMC(q);
  else if(q.kind==="ox") body=qOX(q);
  else if(q.kind==="match") body=qMatch(q);
  else if(q.kind==="short") body=qShort(q);
  else if(q.kind==="bank") body=qBank(q);
  const counter=`<div class="qcounter">문항 <b>${quiz.idx+1}</b> / ${quiz.len} · 정답 ${sc.correct}/${sc.answered}</div>`;
  const nav=`<div class="qnav">
    <button class="btn" id="qprev" ${quiz.idx===0?'disabled':''}>← 이전</button>
    <button class="btn" id="newset">🔀 새 세트</button>
    <button class="btn primary" id="qnext">${quiz.idx===quiz.len-1?'결과 보기 →':'다음 →'}</button></div>`;
  $("#view").innerHTML=`<div class="quiz">${head}<div class="qcard">${body}
    <div class="explain" id="explain">${q.done?explainHTML(q):''}</div></div>${counter}${nav}</div>`;
  bindQuizControls(); bindQ(q); bindNav();
}
function renderQuizSummary(head){
  const sc=quizScore(), pct=quiz.len?Math.round(sc.correct/quiz.len*100):0, pass=pct>=60;
  $("#view").innerHTML=`<div class="quiz">${head}
    <div class="scorebanner"><div class="pct" style="color:${pass?'var(--ok)':'var(--bad)'}">${pct}점</div>
      <div>${sc.correct} / ${quiz.len} 정답 (응답 ${sc.answered})</div>
      <div class="pf ${pass?'pass':'fail'}">${pass?'✅ 60점 이상':'❌ 60점 미만'}</div></div>
    <div class="qnav"><button class="btn" id="reviewset">← 문제 다시 보기</button><button class="btn primary" id="newset">🔀 새 세트 시작</button></div></div>`;
  bindQuizControls();
  $("#reviewset").onclick=()=>{quiz.summary=false;quiz.idx=0;renderQuiz();};
  $("#newset").onclick=()=>{genSet();renderQuiz();};
}
function bindQuizControls(){
  $$("[data-type]").forEach(b=>b.onclick=()=>{quiz.type=b.dataset.type;resetQuiz();renderQuiz();});
}
function bindNav(){
  const p=$("#qprev"),n=$("#qnext"),ns=$("#newset");
  if(p)p.onclick=()=>{if(quiz.idx>0){quiz.idx--;renderQuiz();}};
  if(n)n.onclick=()=>{if(quiz.idx<quiz.len-1){quiz.idx++;renderQuiz();}else{quiz.summary=true;renderQuiz();}};
  if(ns)ns.onclick=()=>{genSet();renderQuiz();};
}
function explainHTML(q){
  const c=q.concept;
  if(q.kind==="match") return q.correct?'✅ 모두 정답!':'❌ 일부 오답 — 오른쪽 정답 번호를 확인하세요.';
  if(q.kind==="ox") return (q.correct?'✅ 정답! ':'❌ 오답. ')+(q.isTrue?`옳은 설명: <b>${esc(c.term)}</b> — ${esc(c.def)}`:`틀린 설명. <b>${esc(q.shown.term)}</b>의 올바른 정의: ${esc(c.def)}`);
  return (q.correct?'✅ 정답! ':'❌ 오답. ')+`<b>${esc(c.term)}</b> — ${esc(c.def)}`;
}
/* --- 문항 뷰 (q.done이면 채점 결과 표시) --- */
function qMC(q){
  const d2t=q.type==="mc_d2t";
  const opts=q.options.map((o,i)=>{let cls="opt";
    if(q.done){if(i===q.answer)cls+=" correct";else if(i===q.chosen)cls+=" wrong";}
    return `<button class="${cls}" data-i="${i}" ${q.done?'disabled':''}><span class="k">${"ABCDEFGH"[i]}</span><span>${esc(d2t?o.term:o.def)}</span></button>`;}).join("");
  const prompt=d2t?`<div class="qtag">다음 설명에 해당하는 용어는?</div><div class="qtext">${esc(q.concept.def)}</div>`
    :`<div class="qtag">다음 용어의 올바른 정의는?</div><div class="qtext">${esc(q.concept.term)}</div>`;
  return prompt+`<div class="opts">${opts}</div>`;
}
function qBank(q){
  const opts=q.options.map((o,i)=>{let cls="opt bankopt";
    if(q.done){if(i===q.answer)cls+=" correct";else if(i===q.chosen)cls+=" wrong";}
    return `<button class="${cls}" data-i="${i}" ${q.done?'disabled':''}>${esc(o.term)}</button>`;}).join("");
  return `<div class="qtag">다음 설명에 해당하는 용어를 보기에서 고르시오.</div><div class="qtext">${esc(q.concept.def)}</div><div class="bank">${opts}</div>`;
}
function qOX(q){
  const mk=v=>{let cls="opt ox";
    if(q.done){if((v===1)===q.isTrue)cls+=" correct";else if(q.chosen===v)cls+=" wrong";}
    return `<button class="${cls}" data-ox="${v}" ${q.done?'disabled':''}><span class="k">${v?'O':'X'}</span><span>${v?'옳음':'틀림'}</span></button>`;};
  return `<div class="qtag">다음 설명이 옳으면 O, 틀리면 X.</div>
    <div class="qtext"><b>${esc(q.shown.term)}</b> : ${esc(q.shown.def)}</div>
    <div class="opts oxopts">${mk(1)}${mk(0)}</div>`;
}
function qShort(q){
  const fill=q.type==="fill";
  const tag=fill?"다음 설명의 빈칸에 들어갈 용어를 쓰시오.":"다음 설명에 해당하는 용어를 직접 쓰시오.";
  const bc=q.done?(q.correct?'var(--ok)':'var(--bad)'):'var(--line)';
  return `<div class="qtag">${tag}</div><div class="qtext">${esc(q.concept.def)}</div>
    <div class="shortbox"><input class="search shortin" id="shortin" style="border-color:${bc}" value="${esc(q.input||'')}" placeholder="정답 용어 입력 후 Enter" ${q.done?'disabled':''} autocomplete="off">
    <button class="btn primary" id="submitShort" ${q.done?'disabled':''}>제출</button></div>`;
}
function qMatch(q){
  const rights=q.order.map((oi,n)=>`<div class="mrow"><span class="mnum">${n+1}</span><span>${esc(q.set[oi].def)}</span></div>`).join("");
  const lefts=q.set.map((c,i)=>{
    const opts=q.order.map((_,n)=>`<option value="${n}" ${q.sel[i]==n?'selected':''}>${n+1}</option>`).join("");
    let res="";
    if(q.done){const correctOrder=q.order.indexOf(i);res=(q.sel[i]===correctOrder)?'✅':'❌ → '+(correctOrder+1);}
    return `<div class="mrow"><span class="mkey">${"㉠㉡㉢㉣"[i]}</span><span class="mterm">${esc(c.term)}</span>
      <select data-left="${i}" ${q.done?'disabled':''}><option value="">?</option>${opts}</select>
      <span class="mres">${res}</span></div>`;}).join("");
  return `<div class="qtag">왼쪽 용어에 맞는 설명 번호를 선택해 연결하시오.</div>
    <div class="match"><div class="mcol"><div class="mhead">용어</div>${lefts}</div>
    <div class="mcol"><div class="mhead">설명</div>${rights}</div></div>
    ${q.done?'':'<button class="btn primary" id="gradeMatch" style="margin-top:14px">채점하기</button>'}`;
}
/* --- 채점 바인딩 --- */
function bindQ(q){
  if(q.done) return;
  if(q.kind==="mc"||q.kind==="bank"){
    $$(".opt[data-i]").forEach(b=>b.onclick=()=>{q.done=true;q.chosen=+b.dataset.i;q.correct=(q.chosen===q.answer);recPractice(q.correct);renderQuiz();});
  }else if(q.kind==="ox"){
    $$("[data-ox]").forEach(b=>b.onclick=()=>{q.done=true;q.chosen=+b.dataset.ox;q.correct=((q.chosen===1)===q.isTrue);recPractice(q.correct);renderQuiz();});
  }else if(q.kind==="short"){
    const submit=()=>{const val=$("#shortin").value.trim();if(!val)return;q.input=val;q.done=true;q.correct=checkAnswer(val,q.concept.term);recPractice(q.correct);renderQuiz();};
    $("#submitShort").onclick=submit;
    $("#shortin").addEventListener("keydown",e=>{if(e.key==="Enter")submit();});
    $("#shortin").focus();
  }else if(q.kind==="match"){
    $$("select[data-left]").forEach(s=>s.onchange=()=>{q.sel[+s.dataset.left]=s.value===""?undefined:+s.value;});
    $("#gradeMatch").onclick=()=>{let allok=true;q.set.forEach((c,i)=>{if(q.sel[i]!==q.order.indexOf(i))allok=false;});q.done=true;q.correct=allok;recPractice(allok);renderQuiz();};
  }
}
function checkAnswer(input,term){
  const norm=s=>s.toLowerCase().replace(/\s+/g,'').replace(/[()\[\]{}·.,/_\-—:：]/g,'');
  const set=new Set();
  set.add(norm(term));
  set.add(norm(term.replace(/\(.*?\)/g,'')));
  const m=term.match(/\(([^)]+)\)/); if(m)set.add(norm(m[1]));
  set.add(norm(term.split(/[(（]/)[0]));
  return set.has(norm(input));
}

/* ---------- 모의고사 (공식 문항수 이상 생성 → 채점 → 풀이보기) ---------- */
let exam={exam:"1",count:50,started:false,submitted:false,qs:[],ans:{},result:null};
const EXAM_COUNTS={"1":[40,50,60],"2":[20,30,40]};
const TYPE_LABEL={mc_d2t:"4지택일",mc_t2d:"4지택일",ox:"진위형 O/X",short:"단답형",bank:"보기선택",fill:"괄호채우기"};
function renderExam(){
  if(!EXAM_COUNTS[exam.exam].includes(exam.count)) exam.count=EXAM_COUNTS[exam.exam][1];
  if(!exam.started) return renderExamSetup();
  if(exam.submitted) return renderExamReview();
  return renderExamSheet();
}
function renderExamSetup(){
  const counts=EXAM_COUNTS[exam.exam];
  $("#view").innerHTML=`<div class="exam-setup"><div class="card-box">
    <h2 style="margin:0 0 6px">🧪 모의고사</h2>
    <p style="color:var(--muted);font-size:13px;margin:0 0 14px">개념정리 자료에서 자동 출제됩니다. 공식(1차 40·2차 20)보다 많이 풀 수 있고, 제출하면 점수와 풀이를 볼 수 있습니다.</p>
    <div class="seg" style="display:inline-flex;margin-bottom:6px">
      <button data-ex="1" class="${exam.exam==='1'?'active':''}">1차 모의(객관식+단답)</button>
      <button data-ex="2" class="${exam.exam==='2'?'active':''}">2차 모의(필답형)</button></div>
    <div class="opt-row">문항수 ${counts.map(c=>`<button class="chip ${exam.count===c?'active':''}" data-cnt="${c}">${c}문항</button>`).join("")}</div>
    <div style="font-size:12px;color:var(--muted);margin:4px 0 14px">출제 범위: 좌측에서 선택한 ${selIdx().length}개 과목 · 개념 ${poolByScope().length}개 · 60점 이상이 합격선</div>
    <button class="btn primary" id="startExam">시험 시작 →</button></div></div>`;
  $$("[data-ex]").forEach(b=>b.onclick=()=>{exam.exam=b.dataset.ex;renderExam();});
  $$("[data-cnt]").forEach(b=>b.onclick=()=>{exam.count=+b.dataset.cnt;renderExam();});
  $("#startExam").onclick=()=>{genExam();exam.started=true;exam.submitted=false;renderExam();};
}
function genExam(){
  const pool=shuffle(poolByScope());
  const n=Math.min(exam.count,pool.length);
  const types=exam.exam==="1"?["mc_d2t","ox","short"]:["bank"];
  exam.qs=[];exam.ans={};
  for(let i=0;i<n;i++){
    const c=pool[i], type=types[i%types.length];
    if(type==="mc_d2t"||type==="mc_t2d"){const opts=shuffle([c,...pickDistractors(pool,3,c)]);exam.qs.push({type,c,opts,ans:opts.indexOf(c)});}
    else if(type==="ox"){let t=Math.random()<0.5;let shown=c;if(!t){const o=pickDistractors(pool,1,c)[0];if(o)shown={term:c.term,def:o.def};else t=true;}exam.qs.push({type,c,shown,isTrue:t});}
    else if(type==="bank"){const opts=shuffle([c,...pickDistractors(pool,7,c)]);exam.qs.push({type,c,opts,ans:opts.indexOf(c)});}
    else exam.qs.push({type,c});
  }
}
function gradeExamQ(q,i){
  const a=exam.ans[i];
  if(q.type==="ox") return a===(q.isTrue?1:0);
  if(q.type==="short"||q.type==="fill") return a!=null&&a!==""&&checkAnswer(String(a),q.c.term);
  return a===q.ans;
}
function examOpts(q,i,review,labFn){
  return `<div class="opts">`+q.opts.map((o,oi)=>{
    let cls="opt";
    if(review){if(oi===q.ans)cls+=" correct";else if(exam.ans[i]===oi)cls+=" wrong";}
    else if(exam.ans[i]===oi)cls+=" sel";
    return `<button class="${cls}" data-eqi="${i}" data-oi="${oi}" ${review?'disabled':''}><span class="k">${"ABCDEFGH"[oi]}</span><span>${esc(labFn(o))}</span></button>`;
  }).join("")+`</div>`;
}
function examOX(q,i,review){
  const sel=exam.ans[i];
  const mk=v=>{let cls="opt ox";
    if(review){if((v===1)===q.isTrue)cls+=" correct";else if(sel===v)cls+=" wrong";}
    else if(sel===v)cls+=" sel";
    return `<button class="${cls}" data-eqi="${i}" data-ox="${v}" ${review?'disabled':''}><span class="k">${v?'O':'X'}</span></button>`;};
  return `<div class="opts oxopts">${mk(1)}${mk(0)}</div>`;
}
function reviewFlag(q,i){
  const ok=gradeExamQ(q,i), a=exam.ans[i];
  let your;
  if(q.type==="short"||q.type==="fill") your=(a&&a!=="")?`내 답: ${esc(String(a))}`:'미응답';
  else if(q.type==="ox") your=(a==null)?'미응답':`내 답: ${a?'O':'X'}`;
  else your=(a==null)?'미응답':`내 답: ${"ABCDEFGH"[a]}`;
  return `<span class="review-flag" style="color:${ok?'var(--ok)':'var(--bad)'}">${ok?'✅':'❌'}</span> <small style="color:var(--muted)">${your}</small>`;
}
function examQHTML(q,i,review){
  const no=`<div class="qno">${i+1}번 <span class="badge">${TYPE_LABEL[q.type]}</span> ${review?reviewFlag(q,i):''}</div>`;
  let body="";
  if(q.type==="mc_d2t") body=`<div class="qtext">${esc(q.c.def)}</div>`+examOpts(q,i,review,o=>o.term);
  else if(q.type==="bank") body=`<div class="qtext">${esc(q.c.def)}</div>`+examOpts(q,i,review,o=>o.term);
  else if(q.type==="mc_t2d") body=`<div class="qtext"><b>${esc(q.c.term)}</b></div>`+examOpts(q,i,review,o=>o.def);
  else if(q.type==="ox") body=`<div class="qtext"><b>${esc(q.shown.term)}</b> : ${esc(q.shown.def)}</div>`+examOX(q,i,review);
  else{const v=exam.ans[i]||"";body=`<div class="qtext">${esc(q.c.def)}</div><input class="search" style="width:100%;margin-top:8px" data-eqi="${i}" value="${esc(String(v))}" ${review?'disabled':''} placeholder="정답 용어 입력">`;}
  const exp=review?`<div class="explain" style="margin-top:10px">정답: <b>${esc(q.c.term)}</b> — ${esc(q.c.def)}</div>`:"";
  return no+body+exp;
}
function renderExamSheet(){
  const answered=exam.qs.filter((q,i)=>exam.ans[i]!=null&&exam.ans[i]!=="").length;
  const sticky=`<div class="exam-sticky"><div class="prog">진행 <b>${answered}</b> / ${exam.qs.length} · ${exam.exam}차 모의</div>
    <button class="btn" id="cancelExam">취소</button><button class="btn primary" id="submitExam">제출 및 채점</button></div>`;
  $("#view").innerHTML=sticky+`<div class="exam-list">${exam.qs.map((q,i)=>`<div class="eq">${examQHTML(q,i,false)}</div>`).join("")}</div>`;
  $$('[data-oi]').forEach(b=>b.onclick=()=>{exam.ans[+b.dataset.eqi]=+b.dataset.oi;renderExamSheet();});
  $$('[data-ox]').forEach(b=>b.onclick=()=>{exam.ans[+b.dataset.eqi]=+b.dataset.ox;renderExamSheet();});
  $$('input[data-eqi]').forEach(inp=>inp.oninput=()=>{exam.ans[+inp.dataset.eqi]=inp.value;});
  $("#submitExam").onclick=()=>{
    if(answered<exam.qs.length && !confirm(`미응답 ${exam.qs.length-answered}문항이 있습니다. 제출할까요?`))return;
    submitExam();};
  $("#cancelExam").onclick=()=>{exam.started=false;renderExam();};
}
function submitExam(){
  let correct=0; exam.qs.forEach((q,i)=>{if(gradeExamQ(q,i))correct++;});
  exam.result={correct,total:exam.qs.length};
  recExam({date:new Date().toISOString().slice(0,10),exam:exam.exam,scope:(selIdx().length===STUDY_DATA.subjects.length?'all':selIdx().length+'과목'),correct,total:exam.qs.length});
  exam.submitted=true; renderExam(); $(".content").scrollTop=0;
}
function renderExamReview(){
  const r=exam.result, pct=r.total?Math.round(r.correct/r.total*100):0, pass=pct>=60;
  const banner=`<div class="scorebanner"><div class="pct" style="color:${pass?'var(--ok)':'var(--bad)'}">${pct}점</div>
    <div>${r.correct} / ${r.total} 정답</div>
    <div class="pf ${pass?'pass':'fail'}">${pass?'✅ 합격선(60점) 통과':'❌ 합격선(60점) 미달'}</div></div>`;
  const list=exam.qs.map((q,i)=>`<div class="eq ${gradeExamQ(q,i)?'correct':'wrong'}">${examQHTML(q,i,true)}</div>`).join("");
  $("#view").innerHTML=banner+`<div class="exam-list">${list}</div>
    <div class="opt-row" style="margin:16px 0"><button class="btn primary" id="retry">새 모의고사 →</button></div>`;
  $("#retry").onclick=()=>{exam.started=false;exam.submitted=false;renderExam();};
}

/* ---------- 진도 대시보드 ---------- */
/* ---------- 유틸 ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
/* ---------- 이벤트 ---------- */
$$(".tab").forEach(t=>t.onclick=()=>{if(state.sel.length===0)return;state.mode=t.dataset.mode;render();});
$("#search").oninput=e=>{state.query=e.target.value.trim();if(state.sel.length===0)return;if(state.mode!=="concept"){state.mode="concept";}render();};
$("#menuBtn").onclick=()=>{state.mode="landing";render();};
$("#resetBtn").onclick=()=>{if(confirm("학습 진도를 모두 초기화할까요?")){progress={};saveP();render();}};
const THEMEKEY="secstudy_theme";
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);
  $("#themeBtn").textContent=t==="dark"?"☀️ 라이트":"🌙 다크";localStorage.setItem(THEMEKEY,t);}
$("#themeBtn").onclick=()=>applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");
applyTheme(localStorage.getItem(THEMEKEY)||"light");
document.addEventListener("keydown",e=>{
  if(state.mode==="drill"&&state.drill==="flash"){
    if(e.target.tagName==="INPUT")return;
    if(e.code==="Space"){e.preventDefault();$("#card")?.click();}
    else if(e.key==="ArrowLeft")$("#prev")?.click();
    else if(e.key==="ArrowRight")$("#next")?.click();
  }
});
render();
</script>
