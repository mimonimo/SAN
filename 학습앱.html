<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정보보안 개념 학습앱</title>
<style>
  :root{
    --bg:#eef1f8; --panel:#ffffff; --ink:#18203a; --muted:#697089; --line:#e4e8f2;
    --brand:#4361ee; --brand2:#5c7cfa; --ok:#16a34a; --bad:#e23b3b; --warn:#f08c00;
    --chip:#eef1fb; --radius:14px;
    --shadow:0 1px 2px rgba(20,30,60,.06),0 8px 24px -8px rgba(30,45,90,.14);
    --shadow-sm:0 1px 2px rgba(20,30,60,.07);
    --grad:radial-gradient(1200px 600px at 80% -10%,rgba(67,97,238,.10),transparent 60%),radial-gradient(900px 500px at -10% 10%,rgba(124,140,250,.10),transparent 55%);
  }
  [data-theme="dark"]{
    --bg:#0c1018; --panel:#161c2c; --ink:#e8ecf7; --muted:#98a1ba; --line:#28304a;
    --brand:#6b8afd; --brand2:#86a0ff; --ok:#4ade80; --bad:#ff6b6b; --warn:#ffd43b;
    --chip:#1f2740;
    --shadow:0 1px 2px rgba(0,0,0,.5),0 10px 30px -10px rgba(0,0,0,.6);
    --shadow-sm:0 1px 2px rgba(0,0,0,.5);
    --grad:radial-gradient(1200px 600px at 80% -10%,rgba(107,138,253,.14),transparent 60%),radial-gradient(900px 500px at -10% 10%,rgba(134,160,255,.10),transparent 55%);
  }
  *{box-sizing:border-box}
  button,select,input,a{touch-action:manipulation;-webkit-tap-highlight-color:rgba(67,97,238,.15)}
  html,body{margin:0;height:100%}
  body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,-apple-system,sans-serif;
    background:var(--bg);background-image:var(--grad);background-attachment:fixed;
    color:var(--ink);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
  ::selection{background:color-mix(in srgb,var(--brand) 28%,transparent)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--muted) 35%,transparent);border-radius:8px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:color-mix(in srgb,var(--muted) 55%,transparent);background-clip:content-box}
  button{font-family:inherit;cursor:pointer}
  .app{height:100vh}
  .ghost{border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:9px;padding:8px 11px;font-size:12.5px;font-weight:600;transition:.15s}
  .ghost:hover{color:var(--brand);border-color:var(--brand);background:var(--chip)}
  /* Main */
  .main{display:flex;flex-direction:column;min-width:0;min-height:0;height:100vh}
  .top{display:flex;gap:10px;align-items:center;padding:13px 22px;border-bottom:1px solid var(--line);
    background:color-mix(in srgb,var(--panel) 78%,transparent);backdrop-filter:saturate(150%) blur(10px);
    flex-wrap:wrap;position:sticky;top:0;z-index:15}
  .h1{font-size:18px;font-weight:800;margin-right:auto;letter-spacing:-.4px}
  .tabs{display:flex;gap:4px;background:var(--chip);padding:5px;border-radius:13px}
  .tab{border:none;background:none;color:var(--muted);padding:8px 16px;border-radius:9px;font-weight:700;font-size:13.5px;transition:.15s}
  .tab:hover{color:var(--ink)}
  .tab.active{background:var(--panel);color:var(--brand);box-shadow:var(--shadow-sm)}
  .tab.disabled{opacity:.38;pointer-events:none}
  .search{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:11px;padding:9px 13px;width:230px;font-size:13.5px;transition:.15s}
  .search:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 18%,transparent)}
  .content{overflow:auto;padding:24px 22px 60px;flex:1}
  .wrap{max-width:900px;margin:0 auto;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  /* Browse */
  .unit{margin-bottom:26px}
  .unit>h2{font-size:16px;font-weight:800;color:var(--brand);margin:0 0 4px;padding-bottom:8px;border-bottom:2px solid var(--line)}
  .section>h3{font-size:14.5px;font-weight:700;margin:18px 0 6px;color:var(--ink)}
  .group{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:6px 18px 14px;margin:12px 0;box-shadow:var(--shadow)}
  .group>h4{font-size:14px;font-weight:800;margin:14px 0 8px;color:var(--ink);display:flex;align-items:center;gap:8px}
  .group>h4 .pill{font-size:11px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2));border-radius:20px;padding:2px 9px}
  .sub{font-size:12.5px;font-weight:700;color:var(--muted);margin:10px 0 4px}
  .c{display:flex;gap:10px;padding:7px 0;border-top:1px dashed var(--line);align-items:flex-start}
  .c:first-of-type{border-top:none}
  .c .term{flex:0 0 38%;max-width:38%;font-weight:700;font-size:13.5px;color:var(--brand)}
  .c.learned .term{color:var(--ok)}
  .c .def{flex:1;color:var(--ink);font-size:13.5px}
  .c .mark{flex:0 0 auto;border:none;background:none;font-size:16px;opacity:.35;padding:0 2px}
  .c.learned .mark{opacity:1}
  .c.learned .term{color:var(--ok)}
  .note{background:var(--chip);border-radius:9px;padding:8px 12px;margin:8px 0;font-size:12.5px;color:var(--muted)}
  .note::before{content:"💡 ";}
  .meta-notes{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .meta-notes span{background:var(--chip);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--muted)}
  /* Flashcard */
  .fc-stage{max-width:620px;margin:10px auto 0;text-align:center}
  .fc-counter{color:var(--muted);font-size:13px;margin-bottom:10px}
  .card{perspective:1600px;height:340px;margin:0 auto}
  .card-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
  .card.flipped .card-inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;background:var(--panel);border:1px solid var(--line);
    border-radius:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px;gap:12px}
  .face .tag{font-size:12px;color:var(--muted);position:absolute;top:16px;left:20px;font-weight:600}
  .face .crumb{font-size:11.5px;color:var(--muted);position:absolute;bottom:14px;left:0;right:0}
  .front .q{font-size:25px;font-weight:800;letter-spacing:-.5px}
  .back{transform:rotateY(180deg)}
  .back .q{font-size:17px;font-weight:800;color:var(--brand);margin-bottom:4px}
  .back .a{font-size:15px;line-height:1.75}
  .hint{color:var(--muted);font-size:12.5px}
  .fc-actions{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap}
  .btn{border:none;border-radius:11px;padding:11px 18px;font-weight:700;font-size:14px;background:var(--chip);color:var(--ink);transition:transform .08s,filter .15s,box-shadow .15s}
  .btn:hover{filter:brightness(.97)}
  .btn:active{transform:translateY(1px) scale(.99)}
  .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;box-shadow:0 8px 18px -8px color-mix(in srgb,var(--brand) 80%,transparent)}
  .btn.ok{background:var(--ok);color:#fff}
  .btn.bad{background:var(--bad);color:#fff}
  .btn:disabled{opacity:.4;cursor:default;box-shadow:none}
  .fc-bar{display:flex;gap:14px;justify-content:center;align-items:center;margin-top:14px;color:var(--muted);font-size:13px}
  /* Quiz */
  .quiz{max-width:680px;margin:0 auto}
  .quiz-head{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap}
  .seg{display:flex;background:var(--chip);border-radius:11px;padding:4px;gap:2px}
  .seg button{border:none;background:none;color:var(--muted);padding:7px 13px;border-radius:8px;font-weight:600;font-size:12.5px;transition:.15s}
  .seg button:hover{color:var(--ink)}
  .seg button.active{background:var(--panel);color:var(--brand);box-shadow:var(--shadow-sm)}
  .score{font-size:13px;color:var(--muted)}
  .score b{color:var(--ink)}
  .qcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:24px}
  .qtag{font-size:12px;color:var(--brand);font-weight:700;margin-bottom:8px;letter-spacing:.02em}
  .qtext{font-size:17.5px;font-weight:700;line-height:1.6;margin-bottom:18px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{text-align:left;border:1.5px solid var(--line);background:var(--panel);color:var(--ink);border-radius:13px;padding:13px 15px;font-size:14px;transition:border-color .12s,background .12s,transform .08s;display:flex;gap:10px;align-items:flex-start}
  .opt:hover{border-color:var(--brand2);background:var(--chip)}
  .opt:active{transform:scale(.99)}
  .opt .k{font-weight:800;color:var(--muted);flex:0 0 auto;width:18px}
  .opt.correct{border-color:var(--ok);background:color-mix(in srgb,var(--ok) 13%,transparent)}
  .opt.wrong{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 13%,transparent)}
  .opt.correct .k{color:var(--ok)} .opt.wrong .k{color:var(--bad)}
  .opt:disabled{cursor:default}
  .qfoot{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px}
  .explain{font-size:13px;color:var(--muted);flex:1}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  @media (max-width:820px){
    .c .term{flex-basis:46%;max-width:46%}
  }
  /* 모바일 (폰) */
  @media (max-width:600px){
    body{font-size:14px}
    .top{padding:10px 12px;gap:8px;align-items:center}
    .menu-btn{order:1}
    .h1{order:2;font-size:15px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tabs{order:4;width:100%;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;justify-content:flex-start}
    .tab{padding:8px 12px;font-size:13px;white-space:nowrap}
    .search{order:3;width:auto;flex:0 0 auto;max-width:46vw}
    .content{padding:14px}
    .group{padding:4px 12px 10px}
    .c{flex-direction:column;gap:3px;padding:9px 0}
    .c .term,.c .def{flex-basis:auto;max-width:100%}
    .c .term{font-size:14px}
    .c .mark{position:absolute;right:0}
    .c{position:relative;padding-right:26px}
    .unit>h2{font-size:15px}
    .match{grid-template-columns:1fr;gap:10px}
    .card{height:300px}
    .face{padding:22px}
    .front .q{font-size:21px}
    .back .a{font-size:14px}
    .opt{padding:11px 12px;font-size:13.5px}
    .stat-grid{grid-template-columns:1fr 1fr}
    .exam-sticky{flex-wrap:wrap;position:static}
    .exam-sticky .prog{flex:1 0 100%;order:-1;margin-bottom:4px}
    .qnav{flex-wrap:wrap}
    .qnav .btn{flex:1;min-width:0}
    .prow{flex-wrap:wrap}
    .prow .nm{flex:0 0 100%;margin-bottom:2px}
    .prow .pc{flex:0 0 auto}
    .scorebanner .pct{font-size:34px}
    .chip{padding:7px 12px;font-size:12.5px}
    .examinfo{font-size:11.5px}
    .wrap{max-width:100%}
    /* 가로 오버플로우 차단 + 퀴즈 헤더 세로 스택 */
    html,body{overflow-x:hidden}
    .content{overflow-x:hidden}
    .quiz-head{flex-direction:column;align-items:stretch;gap:8px}
    .seg{flex-wrap:wrap}
    .typeseg{width:100%}
    .examinfo{flex:none;width:100%;margin:0}
    .quiz,.qcard,.opts,.opt,.exam-list,.eq,.dash{min-width:0;max-width:100%}
    .qtext{word-break:break-word}
    .score{font-size:12px}
  }
  .menu-btn{display:inline-flex;align-items:center;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:9px;padding:8px 12px;font-size:13.5px;font-weight:600;transition:.15s}
  .menu-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--chip)}
  /* 칩 바 (개념 카테고리 / 드릴 포맷) */
  .chipbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
  .chip{border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:600;transition:.15s}
  .chip:hover{border-color:var(--brand2);color:var(--ink)}
  .chip:active{transform:scale(.97)}
  .chip.active{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border-color:transparent;box-shadow:0 6px 14px -6px color-mix(in srgb,var(--brand) 70%,transparent)}
  .chipgap{flex:1}
  /* 시작(홈) 화면 */
  .landing{max-width:760px;margin:10px auto;padding:8px}
  .landing h2{font-size:20px;margin:6px 0 4px}
  .landing .lmuted{color:var(--muted);font-size:13.5px;margin:0 0 16px}
  .lsum{display:flex;align-items:center;gap:16px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;margin-bottom:18px}
  .lsum .big{font-size:28px;font-weight:800;color:var(--brand);line-height:1;white-space:nowrap}
  .lsum .mid{flex:1;min-width:0}
  .lsum .ls{font-size:12.5px;color:var(--muted);margin-bottom:7px}
  .lsum .ls b{color:var(--ink)}
  .lsum .lbar{height:9px;background:var(--line);border-radius:6px;overflow:hidden}
  .lsum .lbar i{display:block;height:100%;background:linear-gradient(90deg,var(--ok),#34d399);transition:width .5s}
  .selallbtn{margin-bottom:14px}
  .pickgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
  .bigchip{display:flex;align-items:flex-start;gap:10px;text-align:left;border:1.5px solid var(--line);background:var(--panel);color:var(--ink);
    border-radius:var(--radius);padding:15px 16px;font-size:14.5px;font-weight:600;box-shadow:var(--shadow);transition:border-color .15s,transform .08s,box-shadow .15s}
  .bigchip:hover{border-color:var(--brand2);transform:translateY(-1px);box-shadow:0 10px 24px -10px rgba(30,45,90,.25)}
  .bigchip:active{transform:scale(.99)}
  .bigchip .ck{font-size:18px;color:var(--brand);margin-top:1px}
  .bigchip .bt{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
  .bigchip .bn{font-weight:700}
  .bigchip .bm{color:var(--muted);font-weight:600;font-size:11.5px}
  .bigchip .bar{height:5px;background:var(--line);border-radius:5px;margin-top:5px;overflow:hidden}
  .bigchip .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--ok),#34d399);transition:width .4s}
  .bigchip.on{border-color:var(--brand);background:color-mix(in srgb,var(--brand) 9%,transparent);box-shadow:0 8px 20px -10px color-mix(in srgb,var(--brand) 55%,transparent)}
  .biggo{margin-top:20px;width:100%;padding:16px;font-size:15.5px}
  .landing h2{font-size:23px;letter-spacing:-.5px}
  .opt.sel{border-color:var(--brand);background:color-mix(in srgb,var(--brand) 12%,transparent)}
  /* 다과목 읽기 블록 */
  .subjblock{margin-bottom:26px}
  .subjh{font-size:17px;font-weight:800;color:var(--brand);background:var(--chip);border-radius:10px;padding:10px 14px;margin-bottom:12px}
  /* 퀴즈 카운터/내비 */
  .qcounter{text-align:center;color:var(--muted);font-size:13px;margin:14px 0 10px}
  .qcounter b{color:var(--brand);font-size:15px}
  .qnav{display:flex;gap:10px;justify-content:center;align-items:center}
  .qnav .btn{min-width:96px}
  /* 퀴즈 확장 */
  .typeseg{margin:12px 0 6px;flex-wrap:wrap}
  .examinfo{font-size:12px;color:var(--muted);background:var(--chip);border-radius:8px;padding:7px 11px;margin-bottom:14px}
  .oxopts{flex-direction:row;gap:12px}
  .oxopts .opt{justify-content:center;font-weight:700;font-size:16px}
  .match{display:grid;grid-template-columns:1fr 1.4fr;gap:14px}
  .mcol{display:flex;flex-direction:column;gap:8px}
  .mhead{font-size:12px;font-weight:700;color:var(--muted)}
  .mrow{display:flex;gap:8px;align-items:flex-start;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:13px}
  .mnum{font-weight:800;color:var(--brand)}
  .mkey{font-weight:800;color:var(--brand)}
  .mterm{flex:1;font-weight:700}
  .mrow select{border:1px solid var(--line);border-radius:7px;padding:3px 6px;background:var(--panel);color:var(--ink)}
  .mres{font-weight:700}
  .shortbox{display:flex;gap:8px;margin-top:6px}
  .shortin{flex:1}
  .bank{display:flex;flex-wrap:wrap;gap:8px}
  .bankopt{flex:0 0 auto}
  /* 플래시카드 서브모드 */
  .fc-modebar{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  /* 모의고사 */
  .exam-setup{max-width:560px;margin:20px auto;text-align:center}
  .exam-setup .card-box{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:26px}
  .opt-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0}
  .exam-list{max-width:820px;margin:0 auto}
  .exam-sticky{position:sticky;top:0;z-index:5;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    box-shadow:var(--shadow);padding:12px 16px;display:flex;gap:12px;align-items:center;margin-bottom:14px}
  .exam-sticky .prog{flex:1;color:var(--muted);font-size:13px}
  .exam-sticky .big{font-size:18px;font-weight:800}
  .eq{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
  .eq .qno{font-size:12px;font-weight:800;color:var(--brand);margin-bottom:6px}
  .eq .qno .badge{background:var(--chip);color:var(--muted);border-radius:20px;padding:2px 9px;margin-left:6px;font-weight:700}
  .eq.correct{border-color:var(--ok)} .eq.wrong{border-color:var(--bad)}
  .review-flag{font-weight:800;margin-left:8px}
  .scorebanner{text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:24px;margin-bottom:18px}
  .scorebanner .pct{font-size:42px;font-weight:800}
  .scorebanner .pf{font-size:14px;font-weight:700;border-radius:20px;padding:4px 14px;display:inline-block;margin-top:8px}
  .pass{background:color-mix(in srgb,var(--ok) 18%,transparent);color:var(--ok)}
  .fail{background:color-mix(in srgb,var(--bad) 18%,transparent);color:var(--bad)}
  /* 대시보드 */
  .dash{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
  .stat .lbl{font-size:12px;color:var(--muted);font-weight:600}
  .stat .val{font-size:28px;font-weight:800;margin-top:4px;background:linear-gradient(135deg,var(--brand),var(--brand2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .panel-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px}
  .panel-box h3{margin:0 0 12px;font-size:15px}
  .prow{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:13px}
  .prow .nm{flex:0 0 130px;font-weight:600}
  .prow .bar2{flex:1;height:8px;background:var(--line);border-radius:6px;overflow:hidden}
  .prow .bar2 i{display:block;height:100%;background:var(--brand)}
  .prow .pc{flex:0 0 70px;text-align:right;color:var(--muted)}
  .hist{font-size:13px}
  .hist .hrow{display:flex;justify-content:space-between;padding:7px 0;border-top:1px dashed var(--line)}
  .hist .hrow:first-child{border-top:none}
</style>
</head>
<body>
<div class="app">
  <main class="main">
    <div class="top">
      <button class="menu-btn" id="menuBtn">📚 과목</button>
      <div class="h1" id="subjTitle">과목을 선택하세요</div>
      <div class="tabs">
        <button class="tab active" data-mode="concept">📖 개념</button>
        <button class="tab" data-mode="drill">🎯 드릴존</button>
      </div>

싱", "def": "스마트폰 문자 메시지로 악성 앱 설치를 유도하여 개인정보·금융정보를 탈취하는 침해 기법.", "sub": "사이버 공격 관련 주요 용어"}, {"t": "c", "term": "스피어 피싱", "def": "창(Spear)+피싱(Phishing)의 합성어로, 특정 공격 대상을 지정해 집중적으로 공격하여 정보를 탈취하는 수법.", "sub": "사이버 공격 관련 주요 용어"}, {"t": "c", "term": "웹 해킹", "def": "웹서비스 요소를 공격해 이용자·관리자 권한을 획득하고 개인정보 등을 탈취하는 행위.", "sub": "사이버 공격 관련 주요 용어"}, {"t": "c", "term": "지능형 지속 공격(APT, Advanced Persistent Threat)", "def": "특정 대상에 명확한 목표를 설정하고 지능적·지속적으로 공격하여 정보를 수집·유출하는 해킹 기법.", "sub": "사이버 공격 관련 주요 용어"}, {"t": "c", "term": "포트 스캐닝", "def": "공격 대상 서버의 열린 서비스 포트를 순차적으로 접속 시도하여 취약한 포트를 찾아내는 공격 준비 기법.", "sub": "사이버 공격 관련 주요 용어"}, {"t": "c", "term": "무작위 대입 공격(Brute-force)", "def": "인증이 필요한 기능에 비밀번호 등을 무작위로 대입하여 인증 성공을 노리는 공격.", "sub": "사이버 공격 관련 주요 용어"}, {"t": "c", "term": "미라이봇넷", "def": "IoT 기기를 통해 DDoS 공격을 하는 봇넷의 일종으로, IoT 기기의 기본 계정으로 통제권을 획득하거나 다량의 트래픽을 유발하는 공격.", "sub": "사이버 공격 관련 주요 용어"}, {"t": "c", "term": "랜섬웨어", "def": "동의 없이 설치되어 파일을 암호화하고 복호화를 원하는 사용자에게 돈을 요구하는 악성 프로그램.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "루트킷", "def": "설치된 악성코드가 백신·사용자에게 감지되지 않도록 숨겨 주는 악성 프로그램.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "C&C 서버", "def": "악성코드에 감염된 좀비 PC를 관리하고 DDoS 등 공격 명령을 내리는 관리·제어 목적 서버.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "컴퓨터 바이러스", "def": "정상 실행 파일과 결합해 PC 동작을 중지시키거나 파일을 변조·파괴하는 악성 프로그램.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "백도어", "def": "해커가 사용자 몰래 접속하여 악의적 행위를 할 수 있도록 출입구 역할을 하는 악성 프로그램.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "좀비 PC", "def": "원격 제어 악성 프로그램이 설치되어 사용자 모르게 스팸 발송·악성코드 유포·DDoS 등에 활용되는 컴퓨터.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "웜(worm)", "def": "다른 파일에 기생하지 않고 독자적으로 자신을 복제·확산하여 전파 속도가 매우 빠른 악성 프로그램(메일·공유 폴더 등으로 전파, 시스템·네트워크 부하 증가).", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "웹셸", "def": "해커가 원격으로 웹서버에 악의적 명령을 실행하도록 작성한 웹 브라우저 기반 스크립트 실행 파일.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "익스플로잇(Exploit)", "def": "소프트웨어·하드웨어 취약점을 통해 악성 행위를 수행하기 위해 제작한 프로그램.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "제로데이 취약점", "def": "보안 패치가 발표되지 않은 상태에서 외부에 노출된 취약점.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "키로거", "def": "사용자의 키보드 입력 데이터를 해커에게 전송하는 악성 프로그램.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "트로이 목마", "def": "컴퓨터에 숨어 있으면서 사용자가 인지하지 못하도록 정보를 유출하는 악성코드.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "SQL 인젝션", "def": "SQL을 사용하는 응용프로그램에서 SQL 구문을 조작하여 인증 우회·권한 상승을 유발하는 공격.", "sub": "주요 웹 해킹 공격 유형"}, {"t": "c", "term": "크로스 사이트 스크립트(XSS)", "def": "웹사이트에 악성 스크립트를 삽입하는 취약점을 활용해 의도하지 않은 기능 수행·정보 탈취를 하는 공격.", "sub": "주요 웹 해킹 공격 유형"}, {"t": "c", "term": "크로스 사이트 요청 위조(CSRF)", "def": "피해자의 세션 쿠키·인증 정보를 자동 포함시켜 위조된 웹 요청을 강제로 보내, 웹서버가 정당한 요청으로 오해하게 만드는 공격.", "sub": "주요 웹 해킹 공격 유형"}, {"t": "c", "term": "파일 업로드(웹셸)", "def": "허용되지 않은 유형의 파일을 업로드하고 외부에서 직접 접근하는 취약점을 활용해 웹서버 권한을 탈취하는 공격.", "sub": "주요 웹 해킹 공격 유형"}, {"t": "c", "term": "파일 다운로드", "def": "검증되지 않은 외부 입력값으로 서버 파일에 접근하여 중요 서버 파일을 탈취하는 공격.", "sub": "주요 웹 해킹 공격 유형"}, {"t": "c", "term": "세션 탈취", "def": "XSS 등으로 피해자의 세션 쿠키를 탈취하고 이를 이용해 피해자 세션으로 로그인하는 공격.", "sub": "주요 웹 해킹 공격 유형"}]}, {"title": "ISMS-P 인증 기준 중 네트워크 보안 관련 항목 (참고)", "items": [{"t": "c", "term": "네트워크 접근(2.6.1)", "def": "비인가 접근 통제를 위해 IP 관리·단말 인증 등 절차를 수립하고, 업무 목적·중요도에 따라 네트워크 분리(DMZ, 서버팜, DB존, 개발존 등)와 접근 통제를 적용.", "sub": ""}, {"t": "c", "term": "정보시스템 접근(2.6.2)", "def": "서버·네트워크시스템 등 정보시스템에 접근 허용 사용자, 접근 제한 방식, 안전한 접근 수단 등을 정의·통제.", "sub": ""}, {"t": "c", "term": "무선 네트워크 접근(2.6.5)", "def": "사용자 인증, 송수신 데이터 암호화, AP 통제 등 무선 보호 대책 적용 및 비인가 AP·AD Hoc 접속 차단.", "sub": ""}, {"t": "c", "term": "원격 접근 통제(2.6.6)", "def": "보호구역 외 정보시스템 관리·개인정보처리는 원칙 금지, 불가피 시 책임자 승인·단말 지정·강화된 인증·구간 암호화 등 보호 대책 수립.", "sub": ""}, {"t": "c", "term": "인터넷 접속 통제(2.6.7)", "def": "정보 유출·악성코드 감염·내부망 침투 예방을 위해 주요 시스템·단말의 인터넷 접속/서비스(P2P·웹하드·메신저 등)를 제한.", "sub": ""}]}, {"title": "네트워크 보안요구사항 도출 항목", "items": [{"t": "c", "term": "서버 네트워크 보안요구사항", "def": "접속 권한 IP 제한, 불법 개인정보 유출 시도 탐지, 망분리, 외부망 접속 시 VPN·전용선 등 안전 접속, 원격관리 원칙 금지, 중요도별 내·외부망 분리, DDoS 방어, 악성코드 유입 차단, 개인정보 유출 탐지·차단.", "sub": ""}, {"t": "c", "term": "클라이언트 네트워크 보안요구사항", "def": "허가받지 않은 단말 접속 차단, 내부망 관리 시 특정 단말 제한, 무선랜 사용 시 사용자 인증·송수신 암호화 등 보호 대책 수립.", "sub": ""}]}]}, {"title": "1-2. NW보안 설계", "groups": [{"title": "네트워크 보안 설계 원칙 및 보안 장비 유형", "items": [{"t": "c", "term": "최소화의 원칙(Minimalization)", "def": "반드시 필요한 항목을 필요로 하는 사람에게 최소한의 기간 동안만 접근을 허용하는 것. 네트워크 접근 통제의 기본 원칙.", "sub": "네트워크 보안 설계 원칙"}, {"t": "c", "term": "분리의 원칙(Isolation)", "def": "리스크를 격리하기 위한 원칙. DMZ와 내부망 분리, 개발 서버와 운영 서버 분리, 업무 처리자와 관리자의 권한 분리 등이 예.", "sub": "네트워크 보안 설계 원칙"}, {"t": "c", "term": "다중 보안의 원칙(Defence in Depth)", "def": "하나의 보안대책이 무력화되더라도 다른 보안대책으로 전체 보안성이 확보되도록 하는 개념(예: 침입 방지(1차)→확산 침투 방지(2차)→외부 유출 방지(3차)의 3중 대책).", "sub": "네트워크 보안 설계 원칙"}, {"t": "c", "term": "법규 준수의 원칙(Compliance)", "def": "보안 리스크 감소와 법률 위반 방지를 위해 법규가 가이드하는 보안대책을 반드시 적용.", "sub": "네트워크 보안 설계 원칙"}, {"t": "c", "term": "네트워크 보안 장비 유형", "def": "접근 통제, 침입 차단·탐지, DDoS 탐지 등을 수행하는 장비.", "sub": ""}, {"t": "c", "term": "방화벽(Fire Wall)", "def": "외부↔내부 정보통신망에 불법 접근하는 것을 차단하는 시스템. 발신지·수신지 IP 주소와 포트 번호에 대한 접근 통제 수행.", "sub": "네트워크 보안 장비 유형"}, {"t": "c", "term": "침입탐지시스템(IDS)", "def": "네트워크를 통한 사이버 공격을 실시간으로 탐지.", "sub": "네트워크 보안 장비 유형"}, {"t": "c", "term": "침입예방시스템(IPS)", "def": "네트워크를 통한 사이버 공격을 실시간으로 탐지하고 차단.", "sub": "네트워크 보안 장비 유형"}, {"t": "c", "term": "DDoS방지시스템", "def": "목적지 기준 트래픽이 임계치를 초과하면 기존 세션을 제외한 패킷을 Null Routing 처리하여 DDoS에 대응.", "sub": "네트워크 보안 장비 유형"}, {"t": "c", "term": "웹방화벽", "def": "알려진 유형의 웹 해킹 공격을 탐지·방어.", "sub": "네트워크 보안 장비 유형"}, {"t": "n", "text": "방화벽 주요 기능: 패킷 필터(L3·L4), 상태 확인(L4), 주소 변환 NAT·DHCP(L4), 트래픽 관리(L4), 프록시(L3·L4), 콘텐츠 필터(L7), URL 필터(L7), 바이러스 필터(L7), MAC 바인딩(L2·L3), 영역 분리(L3), 운영 모드 Router/Bridge(L2·L3)."}, {"t": "n", "text": "IDS vs IPS: IDS는 애플리케이션 계층·미러링·탭 모드·라우터 트래픽 탐지·간접 차단(방화벽 연동), IPS는 커널 계층·후킹·인라인 모드·로컬 트래픽 탐지·패킷 드롭(직접 차단). 탐지 성능은 IPS가 빠르나 장애 시 로컬 네트워크 장애 발생."}]}, {"title": "망분리의 개념 및 유형", "items": [{"t": "c", "term": "망분리의 개념", "def": "시스템의 오용/악용으로부터 정보시스템을 보호하기 위해, 중요 내부 업무 처리자의 PC·노트북을 인터넷에 접속되지 않도록 차단하는 기술.", "sub": "망분리의 개념 및 근거"}, {"t": "c", "term": "망분리의 근거", "def": "개인정보의 기술적·관리적 보호조치 기준 제4조(접근 통제) 6항 — 일정 규모 이상(이용자 수 일평균 100만 명 이상 또는 매출 100억 원 이상)의 정보통신서비스 제공자는 개인정보취급자 컴퓨터를 물리적·논리적으로 망분리해야 함.", "sub": "망분리의 개념 및 근거"}, {"t": "c", "term": "물리적 망분리", "def": "2대 이상의 PC와 별도 회선으로 내부망·외부망을 분리하는 방식(2PC, 공용 PC 방식).", "sub": "망분리의 유형 및 구현 방식"}, {"t": "c", "term": "논리적 망분리", "def": "한 대의 PC에서 가상화 기술로 내부망·외부망을 분리하는 방식(서버 기반 가상화, Host 기반 가상화).", "sub": "망분리의 유형 및 구현 방식"}]}]}, {"title": "1-3. NW구현 준비", "groups": [{"title": "정보통신 네트워크 구축 절차", "items": [{"t": "c", "term": "정보통신 네트워크 구축 절차", "def": "네트워크 구축 절차는 기본적으로 4단계로 나뉘며, 순환 주기는 소요 트래픽 증가량·서비스 환경 변화에 따라 달라진다.", "sub": ""}, {"t": "c", "term": "1단계 진단 및 분석(Analysis)", "def": "제공 서비스 요구사항 분석, 기존 네트워크 기술적 분석으로 기본 품질 목표 결정, 제약사항에 따른 최종 품질 목표 도출.", "sub": ""}, {"t": "c", "term": "2단계 설계(Design)", "def": "품질 목표 만족을 위한 구축 목표·원칙 수립, 아키텍처 설계 및 구간별 장비 용량 산정, 장비·솔루션 선정, 구축 일정 계획 수립.", "sub": ""}, {"t": "c", "term": "3단계 설치/구축(Implementation)", "def": "설계·일정 계획에 따른 장비 구축, 결과가 요구사항·품질 목표를 만족하는지 검증.", "sub": ""}, {"t": "c", "term": "4단계 운용(Operation)", "def": "운용 수행, 품질 기준 목표 유지 관리, 차기 고도화 진단 분석의 기초 자료로 활용할 운용 품질 지표 수집·관리.", "sub": ""}]}, {"title": "정보통신 네트워크 설계 개요 및 세부 요건", "items": [{"t": "c", "term": "네트워크 설계 업무", "def": "신규 구축·장비 대체 및 증설·구조 변경 등에 대해 계획을 세우고 설계 도면·내역서 등을 작성하는 과정.", "sub": "네트워크 설계 개요"}, {"t": "c", "term": "네트워크 설계 목적", "def": "노드 간 상호 통신이라는 기능적 요구사항과 가용성·속도·저지연 등 품질 관련 비기능적 요구사항을 충족하기 위한 것.", "sub": "네트워크 설계 개요"}, {"t": "c", "term": "경제성", "def": "투자 비용 대비 정량적·정성적 효과를 고려.", "sub": "네트워크 설계의 요건"}, {"t": "c", "term": "가용성", "def": "일부 노드 장애에도 전체 서비스 중단이 없도록 이중화 등을 고려.", "sub": "네트워크 설계의 요건"}, {"t": "c", "term": "확장성", "def": "구축 이후 장비·운용 관리 시스템의 확장·변경이 용이하도록 기술 호환성을 고려.", "sub": "네트워크 설계의 요건"}, {"t": "c", "term": "운용 효율성", "def": "운영 편이성·업무 효율성·대응 용이성 등 운영관리 효율성을 고려.", "sub": "네트워크 설계의 요건"}]}]}]}, {"title": "학습 2. NW보안 구현하기", "sections": [{"title": "2-1. NW보안 구현", "groups": [{"title": "네트워크 ACL 설정", "items": [{"t": "c", "term": "네트워크 ACL의 정의", "def": "허가받지 않은 이용자·트래픽이 라우터나 네트워크의 특정 자원에 접근하는 것을 차단·허용하는 것. 라우터 인터페이스에 적용되어 사전 설정 내역에 따라 특정 패킷을 필터링.", "sub": "네트워크 ACL의 개념"}, {"t": "c", "term": "ACL 적용 장점", "def": "불필요한 트래픽을 줄여 네트워크 부하 감소 및 보안성 향상.", "sub": "네트워크 ACL의 개념"}, {"t": "c", "term": "ACL 적용 단점", "def": "패킷 검사 과정에서 지연 발생, 과다 적용 시 라우팅 성능 저하.", "sub": "네트워크 ACL의 개념"}, {"t": "c", "term": "표준 ACL(Standard ACL)", "def": "패킷의 출발지 주소만 검사하여 제어. ACL 번호 1~99, 1300~1699.", "sub": "네트워크 ACL의 종류"}, {"t": "c", "term": "확장 ACL(Extended ACL)", "def": "출발지·목적지 주소, 프로토콜, 포트 번호 등을 검사하여 제어. ACL 번호 100~199, 2000~2699.", "sub": "네트워크 ACL의 종류"}]}, {"title": "보안 운영관리를 위한 ESM", "items": [{"t": "c", "term": "ESM의 개념", "def": "네트워크에 유입되는 다양한 위험 요소를 총체적으로 분석하여 미리 예방할 수 있도록 지원하는 솔루션.", "sub": "ESM(Enterprise Security Management) 개요"}, {"t": "c", "term": "주요 기능", "def": "보안 이벤트 수집·가공(정규화·필터링·축약), 통합 관리(단일/이종 장비 연계 분석, 실시간 모니터링), 침해 경보(수준별 가시·가청·메일·메시징 경보), 침해 대응(자동/수동 대응, 증적·로그 보관).", "sub": "ESM(Enterprise Security Management) 개요"}, {"t": "c", "term": "ESM의 구성", "def": "이벤트 수집 에이전트, 매니저, 관리 콘솔로 구성.", "sub": ""}, {"t": "c", "term": "ESM 에이전트", "def": "보안·시스템·네트워크 장비에 탑재되어 정의된 규칙에 따라 이벤트를 수집·전달하거나 보안 정책을 반영.", "sub": "ESM의 구성"}, {"t": "c", "term": "ESM 매니저", "def": "정의된 규칙으로 이벤트 데이터를 분석·저장하고 정제된 이벤트를 콘솔로 전달.", "sub": "ESM의 구성"}, {"t": "c", "term": "ESM 콘솔", "def": "전달된 자료를 시각화하여 운영자 판단을 지원하고, 침해 발생 시 경보 발령 및 자동/수동 대응 지원.", "sub": "ESM의 구성"}, {"t": "c", "term": "보안관제의 정의", "def": "외부 위협의 침입 가능 경로를 모니터링하고 이벤트를 감지하여 침해사고를 예방하는 활동.", "sub": "ESM 기반의 보안관제 업무"}, {"t": "c", "term": "보안관제의 주요 역할", "def": "보안시스템 통합 관리, 일관성 있는 정책 구현, 신속한 대응 처리(24×365 실시간 감시).", "sub": "ESM 기반의 보안관제 업무"}, {"t": "c", "term": "보안관제의 단계별 활동", "def": "예방 단계(보안 취약점 패치, 취약점 점검, 정책 관리) → 탐지 단계(모니터링, NMS·Alert, 시스템 장애·관리적 이벤트) → 대응 단계(웜·바이러스, 스캐닝, 침해사고, 기타 사고 대응).", "sub": "ESM 기반의 보안관제 업무"}]}, {"title": "네트워크 장비 보안 관리", "items": [{"t": "c", "term": "필요성", "def": "스위치·라우터·VPN·방화벽 등 네트워크 장비도 O/S를 운영하므로 서버처럼 보안 관리가 필요.", "sub": ""}, {"t": "c", "term": "네트워크 계정 관리", "def": "관리 콘솔 접속 시 기본 패스워드 변경, 패스워드 암호화 적용, 계정별 권한 수준 설정 점검.", "sub": ""}, {"t": "c", "term": "네트워크 접근 관리", "def": "원격 접속(VTY) 시 ACL로 허용 IP 통제, 접속 타임아웃 설정, 불필요한 보조(AUX) 포트 비활성화, 로그온 경고 메시지 출력 점검.", "sub": ""}]}]}, {"title": "2-2. NW보안 테스트", "groups": [{"title": "테스트 개요", "items": [{"t": "c", "term": "테스트 계획", "def": "요구사항 수집·계획 수립·계획서 작성, 항목별 테스트 케이스 작성 및 테스트 데이터 확보.", "sub": "테스트의 일반적인 절차"}, {"t": "c", "term": "테스트 수행", "def": "테스트 환경 구축·실행·측정, 결과 분석으로 결함 도출 및 테스트 결과서 작성·보고.", "sub": "테스트의 일반적인 절차"}, {"t": "c", "term": "결함 관리", "def": "결함 조치 방법·일정이 포함된 계획 수립(핵심 결함과 그 외 결함 구분), 결함 수정 후 재테스트 및 이행 관리.", "sub": "테스트의 일반적인 절차"}, {"t": "c", "term": "테스트 계획 수립 단계의 세부 업무", "def": "테스트 범위 정의, 착수·완료 기준 정의, 테스트 환경 및 소요 자원 정의, 일정 정의, 기타 사항(고려 사항·위험 요소·결함 관리 방안) 정의, 테스트 계획서 작성·검토·승인.", "sub": "테스트의 일반적인 절차"}]}, {"title": "테스트 유형 및 점검 기준", "items": [{"t": "c", "term": "단위 테스트", "def": "단위 모듈 또는 네트워크 단일 노드 내 기능이 요구사항에 부합하는지 테스트(인터페이스·자료 구조·수행 경로·오류 처리·경계 테스트).", "sub": ""}, {"t": "c", "term": "통합 테스트", "def": "단위 테스트 기반으로 모듈 간·노드 간 연계 기능을 테스트.", "sub": ""}, {"t": "c", "term": "하향식 테스트", "def": "최상위 모듈부터 하위로 통합(깊이 우선/넓이 우선 가능).", "sub": ""}, {"t": "c", "term": "상향식 테스트", "def": "최하위 모듈부터 상위로 통합.", "sub": ""}, {"t": "c", "term": "혼합식 테스트", "def": "하향식·상향식을 절충, 중요 모듈 중심으로 통합.", "sub": ""}, {"t": "c", "term": "비점진적 테스트", "def": "모든 모듈을 한꺼번에 통합하여 테스트.", "sub": ""}, {"t": "c", "term": "시스템 테스트", "def": "통합 테스트 기반으로 실제 인프라에서 기능 검증 및 비기능(처리 속도·안정성) 요구사항 검증. 검증 항목 — 기능성·신뢰성·사용성·효율성·유지보수성·이식성.", "sub": ""}, {"t": "c", "term": "사용자 인수 테스트", "def": "구현 기능이 최종 사용자의 업무 완결성 관점에서 요구사항에 부합하는지 테스트.", "sub": ""}, {"t": "c", "term": "알파 테스트", "def": "사용자 테스트를 개발자 환경에서 통제된 상태로 수행.", "sub": ""}, {"t": "c", "term": "베타 테스트", "def": "개발자가 참여하지 않고 일정 수의 시범 사용자가 수행.", "sub": ""}]}]}]}], "count": 100}, {"id": "02", "title": "시스템 보안 구축", "notes": ["학습모듈 목표: 시스템 보안요구사항을 정의하고 안전한 정보시스템을 설계·구현·검증할 수 있다."], "units": [{"title": "학습 1. 시스템 보안 설계하기", "sections": [{"title": "1-1. 시스템 보안요구사항 정의", "groups": [{"title": "시스템 보안 개념", "items": [{"t": "c", "term": "시스템 보안의 정의", "def": "시스템 구성 요소·자원의 기밀성·무결성·가용성을 보장하기 위해 취해지는 활동. 외부 피해(해커·바이러스·자연재해)와 내부 피해(불만·부정직·해고당한 종업원)로부터 조직의 컴퓨터 시스템·데이터베이스·네트워크 등 정보 자원을 보호하는 방법.", "sub": ""}]}, {"title": "시스템 보안 범위", "items": [{"t": "c", "term": "시스템 보안 범위", "def": "시스템 보안은 주로 계정·패스워드 관리, 세션 관리, 접근제어, 권한 관리, 로그 관리 및 취약점 관리, DBMS 관리 등을 포함한다.", "sub": ""}, {"t": "c", "term": "계정", "def": "적절한 권한을 가진 사용자를 식별하기 위한 가장 기본적인 인증 수단. 계정(account)이란 한 사용자에게 소유되는 모든 파일·자원·정보를 말함. 계정과 패스워드 관리가 보안의 시작.", "sub": ""}, {"t": "c", "term": "패스워드의 정의", "def": "허가 없이 DB·파일에 접속하는 것을 방지하기 위한 안전 대책으로, 사용자 ID와 함께 입력하여 정당한 사용자임을 식별하도록 주컴퓨터에 전달하는 고유의 문자열.", "sub": "패스워드"}, {"t": "c", "term": "패스워드의 기능", "def": "온라인 정보 서비스는 패스워드가 없으면 이용 불가. 주컴퓨터가 입력된 ID·패스워드를 등록된 것과 대조하여 일치 시 접속 허용.", "sub": "패스워드"}, {"t": "c", "term": "세션의 개념", "def": "망 환경에서 사용자/컴퓨터 간 대화를 위한 논리적 연결, 또는 프로세스 간 통신 시 메시지 교환으로 서로를 인식한 이후부터 통신을 마칠 때까지의 기간.", "sub": "세션 관리"}, {"t": "c", "term": "세션 관리의 개념", "def": "활성화된 접속에 대한 관리로, 일정 시간 경과 시 세션을 종료하고 비인가자의 세션 가로채기를 통제.", "sub": "세션 관리"}, {"t": "c", "term": "접근의 개념", "def": "데이터가 있는 곳을 알아내어 가져오는 것, 또는 사용자가 시스템·프로그램을 이용하기 위해 최초로 접속을 시도하는 것.", "sub": "접근제어"}, {"t": "c", "term": "접근제어의 개념", "def": "시스템이 다른 시스템으로부터 적절히 보호되고 꼭 필요한 사람에 의해서만 필요한 서비스를 제공하도록 전체 시스템 차원에서 접근을 통제하는 것.", "sub": "접근제어"}, {"t": "c", "term": "권한의 개념", "def": "직책 수행에 필요한 결정권 등을 합한 것. 조직 내 위치로 인해 갖는 공식적인 힘이며 합법성이 강조됨. 한 개인·집단을 지배할 수 있는 권리(right).", "sub": "권한 관리"}, {"t": "c", "term": "권한 관리의 개념", "def": "각 사용자가 적절한 권한으로 적절한 정보 자산에 접근하도록 통제하는 것.", "sub": "권한 관리"}, {"t": "c", "term": "로그의 개념", "def": "데이터를 기록한 것 또는 데이터의 인쇄된 기록.", "sub": "로그 관리"}, {"t": "c", "term": "로그 관리의 목적", "def": "시스템 내부·외부에서 시스템에 영향을 미칠 경우 해당 사항을 기록하여 문제 해결·예방 활동에 활용.", "sub": "로그 관리"}, {"t": "c", "term": "취약점 개념", "def": "공격자가 시스템의 정보 보안을 낮추는 데 사용되는 약점. 시스템 민감성·결함, 결함에 대한 접근, 결함에 대한 공격 가능성을 의미.", "sub": "취약점 관리"}, {"t": "c", "term": "취약점 관리의 개념", "def": "취약점을 확인·분류·치료·완화하는 주기적인 과정.", "sub": "취약점 관리"}, {"t": "c", "term": "취약점 관리의 목적", "def": "계정·접근제어 등이 잘 갖춰져도 시스템 자체의 결함으로 보안 문제가 발생할 수 있으며, 이런 결함을 체계적으로 관리하는 것.", "sub": "취약점 관리"}, {"t": "c", "term": "DBMS 개념", "def": "기업·조직이 보유하는 데이터베이스를 저장·관리하는 시스템(Data Base Management System). 전사적 자원·서비스 데이터를 포함하므로 보안이 중요.", "sub": "DBMS 관리"}, {"t": "c", "term": "DBMS 관리의 목적", "def": "DBMS 계정 관리, DB 접근 권한, DB 암호화, DB 백업 등을 관리.", "sub": "DBMS 관리"}]}]}, {"title": "1-2. 시스템 보안 설계", "groups": [{"title": "시스템 보안 설계의 개념", "items": [{"t": "c", "term": "시스템 보안 설계 개념", "def": "악성코드·개인정보 유출·중요 정보 노출·비밀 데이터 손실 등의 비즈니스 문제를 방지·해결하기 위해 안전한 정보시스템 환경을 구축하고자 관리적·기술적·물리적 보안 차원에서 보안 구축 계획을 수립하고 보안 설계서를 작성하는 것.", "sub": ""}, {"t": "c", "term": "시스템 보안 설계 대상", "def": "계정 관리, 패스워드 관리, 세션 관리, 접근 통제, 권한 관리, 취약점 관리(각 개념은 1-1과 동일).", "sub": ""}, {"t": "c", "term": "원칙 1", "def": "자원에 적용되는 보안 수준은 조직에 주는 가치에 비추어 적절해야 하며, 보안 비용은 그 혜택에 비추어 합리적이어야 한다.", "sub": "시스템 보안 설계 원칙"}, {"t": "c", "term": "원칙 2", "def": "보안 아키텍처는 변화하는 보안 필요·요구사항을 수용하고, 보호 레벨 변화 시에도 기본 아키텍처 수정 없이 지원하며, 미래 확장을 수용할 만큼 확장성이 있어야 한다.", "sub": "시스템 보안 설계 원칙"}, {"t": "c", "term": "원칙 3", "def": "조직이 안전한 업무를 전자적으로 수행하도록 통합된 보안 서비스를 제공해야 한다.", "sub": "시스템 보안 설계 원칙"}, {"t": "c", "term": "원칙 4", "def": "모든 컴퓨터 플랫폼에 걸쳐 일관성 있는 프레임워크를 제공해야 한다.", "sub": "시스템 보안 설계 원칙"}]}]}, {"title": "1-3. 시스템 보안 구현 준비", "groups": [{"title": "시스템 보안 구현을 위한 환경 개요", "items": [{"t": "c", "term": "시스템 보안 구현 환경 정의", "def": "기밀성·무결성·가용성이 보장된 안전하고 신뢰성 있는 시스템 보안을 구현하기 위한 조건·장소·여건. 관리적·기술적·물리적 차원으로 구분.", "sub": ""}, {"t": "c", "term": "관리적 보안 구현 환경", "def": "시스템 보안 정책, 보안 규정 및 절차서, 보안 조직 및 인원 등.", "sub": ""}, {"t": "c", "term": "기술적 보안 구현 환경", "def": "시스템 보안 솔루션 및 패키지 등.", "sub": ""}, {"t": "c", "term": "물리적 보안 구현 환경", "def": "IDC, 보안 통제 공간, 잠금장치, 출입 통제 장비 등.", "sub": ""}]}, {"title": "시스템 보안 구현 계획 개요", "items": [{"t": "c", "term": "시스템 보안 구현 계획 정의", "def": "보안 설계 내용대로 현장에서 구현하기 위한 세부 범위·일정·장소·인원·도구·매뉴얼 및 절차서를 포함하여 실행 방안을 구체화하는 작업.", "sub": ""}, {"t": "c", "term": "포함될 사항", "def": "범위(추진 범위·세부 업무), 일정(월간·주간·일 단위), 장소(설계·구현·테스트 장소), 인원(범위·일정별 작업자), 기타 준비 사항(매뉴얼·절차서·도구).", "sub": ""}]}, {"title": "시스템 보안 구현 도구", "items": [{"t": "c", "term": "도구 정의", "def": "어떤 일을 할 때 쓰는 연장·수단·방법. 시스템 보안 구현 도구는 시스템의 기밀성·무결성·가용성을 보장하고 취약점으로부터 노출되지 않도록 구현하기 위해 필요한 수단·방법.", "sub": ""}, {"t": "c", "term": "MBSA(Microsoft Baseline Security Analyzer)", "def": "Windows 시스템에서 틀리기 쉬운 보안 관련 설정을 간단히 확인하는 도구.", "sub": ""}, {"t": "c", "term": "Nmap", "def": "서버 관리자가 자체 시스템 스캔을 통해 자신이 모르는 사이에 다른 포트가 열려 있는지 등을 확인하는 도구.", "sub": ""}, {"t": "c", "term": "OWASP ZAP", "def": "OWASP에서 제공하는 웹 취약점 점검 도구로 OWASP Top10 주요 웹 취약점을 점검.", "sub": ""}]}]}]}, {"title": "학습 2. 시스템 보안 구현하기", "sections": [{"title": "2-1. 시스템 보안 구현", "groups": [{"title": "시스템 보안 구현", "items": [{"t": "c", "term": "시스템 보안 구현 개념", "def": "안전하고 신뢰성 있는 하드웨어·소프트웨어로 구성된 시스템 보안이 작동하도록 서버·소프트웨어 구성을 변경하거나 각종 파라미터를 설정하는 것.", "sub": ""}, {"t": "c", "term": "시스템 보안 구현 범위", "def": "하드웨어 서버·소프트웨어의 계정 관리, 패스워드 관리, 접속 관리, 세션 관리, 권한 관리, 로그 관리, 취약점 관리 등.", "sub": ""}]}, {"title": "시스템 인증", "items": [{"t": "c", "term": "시스템 인증 개념", "def": "참이라는 근거가 있는 무언가를 확인·확증하는 행위. 컴퓨터 시스템 보안에서 인증은 로그인 요청 등으로 통신상에서 보내는 사람의 디지털 정체성을 확인하는 과정.", "sub": ""}, {"t": "n", "text": "시스템 인증의 4가지 방법 :"}, {"t": "c", "term": "알고 있는 것(Something You Know)", "def": "머릿속에 기억하는 정보로 인증(예: 패스워드).", "sub": ""}, {"t": "c", "term": "가지고 있는 것(Something You Have)", "def": "신분증·OTP 장치 등으로 인증(예: 출입카드).", "sub": ""}, {"t": "c", "term": "스스로의 모습(Something You Are)", "def": "홍채·지문 등 생체 정보로 인증.", "sub": ""}, {"t": "c", "term": "위치하는 곳(Somewhere You Are)", "def": "접속 위치의 적절성 확인(예: 콜백, GPS).", "sub": ""}]}, {"title": "접근 통제 정책 종류", "items": [{"t": "c", "term": "임의적 접근 통제 정책(DAC)", "def": "객체에 접근하려는 주체의 접근권한에 따라 접근을 통제. 사용자가 권한을 임의로 추가·철회 가능, 데이터 소유자가 신분에 따라 임의 제어. ACL을 사용한 신원·사용자 기반 통제.", "sub": ""}, {"t": "c", "term": "강제적 접근 통제 정책(MAC)", "def": "객체에 포함된 정보의 비밀성과 그에 대한 주체의 권한에 근거하여 접근을 제한. 최상위 보안등급자도 모든 자료 열람 불가. 보안등급·규칙·관리 기반 통제.", "sub": ""}, {"t": "c", "term": "역할 기반 접근 통제 정책(RBAC)", "def": "임의적 접근 통제의 단점을 보완(비임의적 접근 통제). 사용자에게 최소 권한을 부여해 남용을 방지하고, 직무에 따라 허가를 결정하여 직원 변경이 잦은 구조에 유리.", "sub": ""}, {"t": "c", "term": "접근 통제 행렬", "def": "주체를 열, 객체를 행에 표시하여 권한을 부여. 주체·객체가 커지면 행렬 유지가 어려움.", "sub": ""}, {"t": "c", "term": "접근제어(AC)", "def": "사용자에 따라 공유 데이터 접근 권한을 제한. 접근 허용을 결정하는 인증과, 사용자 행위를 강제 제약하는 인가가 있음.", "sub": ""}]}]}, {"title": "2-2. 시스템 보안 구현 검증", "groups": [{"title": "테스트 개념", "items": [{"t": "c", "term": "테스트 정의", "def": "소프트웨어 제품·서비스의 품질에 대한 정보를 이해관계자에게 제공하기 위해 수행된 평가.", "sub": ""}, {"t": "c", "term": "테스트 목적", "def": "소프트웨어 결함을 탐지·수정하는 것. 모든 조건에서 정상 작동함을 입증할 수는 없고 특정 조건에서 작동하지 않는 경우를 발견. 요구사항 충족·정확한 응답·수용 가능 시간·사용성·설치 실행·기대 결과 달성 여부를 평가.", "sub": ""}, {"t": "c", "term": "테스트 범위", "def": "계정 관리, 패스워드 관리, 접속 관리, 권한 관리, 로깅 관리, 취약점 관리 등.", "sub": ""}]}, {"title": "결함 관리", "items": [{"t": "c", "term": "결함의 개념", "def": "소프트웨어가 바르게 동작하지 않는 원인이 되는 프로그램상의 오류. 요구 명세·설계의 오류도 결함(버그)에 포함.", "sub": ""}, {"t": "c", "term": "결함 관리의 개념", "def": "결함 관리 활동으로 발생한 결함의 재발생을 막고 유사 결함 발견 시 처리 시간을 단축하기 위한 활동.", "sub": ""}, {"t": "c", "term": "결함 관리의 절차", "def": "에러 발견 → 에러 등록(결함 관리 대장) → 에러 분석(단순 에러/실제 결함) → 결함 확정 → 결함 할당(담당자 지정) → 결함 조치(수정) → 결함 조치 검토 및 승인(확인 테스트 후 조치 완료).", "sub": ""}]}, {"title": "시스템 보안 테스트 개요", "items": [{"t": "c", "term": "시스템 보안 테스트 개념", "def": "시스템을 유지하는 데이터·구조를 보호하고 사용자가 원하는 대로 기능이 유지되는지 확인하는 것.", "sub": ""}, {"t": "c", "term": "시스템 보안 테스트 대상", "def": "계정·패스워드 관리, 세션 관리, 접근제어, 권한 관리, 로그 관리, 취약점 관리 (각 개념은 1-1과 동일).", "sub": ""}]}]}]}], "count": 54}, {"id": "03", "title": "SW개발 보안 구축", "notes": ["학습모듈 목표: 정의된 보안요구사항에 따라 응용프로그램 보안요구사항을 명세·설계하고, 보안약점이 제거된 SW를 구현·테스트할 수 있다."], "units": [{"title": "학습 1. SW개발 보안 설계하기", "sections": [{"title": "1-1. SW개발 보안요구사항 명세와 설계", "groups": [{"title": "SW개발 보안의 개요", "items": [{"t": "c", "term": "SW개발 보안의 개요", "def": "SW개발 보안은 사이버 보안 공격 위협에 대응하도록 SW개발 단계부터 보안약점을 제거하여 안전한 SW를 구축하는 활동. 해킹 등 사이버공격의 원인인 보안 취약점을 개발 단계에서 미리 제거하고, SDLC 단계별로 보안 업무를 수행해 안전한 SW를 개발·운영하기 위한 개발 방법.", "sub": ""}, {"t": "c", "term": "SW개발 보안의 3요소", "def": "정보 보안 3요소인 기밀성(confidentiality)·무결성(integrity)·가용성(availability)을 지키고, 서버 취약점을 사전에 방지하여 외부·내부 위협으로부터 위험을 최소화하는 구축 방법.", "sub": ""}, {"t": "c", "term": "자산(Asset)", "def": "조직이 보유한 정보화 자산 및 데이터(서버·네트워크·소프트웨어·중요 데이터 등).", "sub": "보안의 위험 요소"}, {"t": "c", "term": "위협원(Threat agents)", "def": "자산에 피해를 줄 수 있는 내·외부 공격 위험 주체(비인가 직원·외부 해커·자연재해 등).", "sub": "보안의 위험 요소"}, {"t": "c", "term": "위협(Threat)", "def": "자산에 피해를 주는 위협원의 공격 행동(해킹·위변조·삭제·불법 유통 등).", "sub": "보안의 위험 요소"}, {"t": "c", "term": "취약점(Vulnerability)", "def": "위협이 발생할 수 있는 상황(Injection·웹 취약점·취약한 암호화·미사용 포트 오픈 등).", "sub": "보안의 위험 요소"}, {"t": "c", "term": "위험(Risk)", "def": "위협원이 취약점을 이용하여 자산에 위해를 입힐 수 있는 상황 예측.", "sub": "보안의 위험 요소"}, {"t": "c", "term": "보안약점(Weakness)", "def": "개발 단계에서 발생하는 보안 관련 오류(정적 오류). 공격에 활용될 여지가 있는 이론상 위험 요소. 분류 체계는 CWE(Common Weakness Enumeration).", "sub": "SW 보안약점과 취약점의 개념"}, {"t": "c", "term": "취약점(Vulnerability)", "def": "운영 단계에서 발생하는 보안 관련 오류(동적 오류). 실제로 공격 구현이 가능한 요소. 분류 체계는 CVE(Common Vulnerabilities and Exposures). 보안약점이 존재하면 취약점으로 발전할 가능성이 높음.", "sub": "SW 보안약점과 취약점의 개념"}]}, {"title": "SW개발 보안 방법론", "items": [{"t": "c", "term": "SW개발 보안 방법론", "def": "기존 SW개발 생명주기(SDLC)에서 안전한 SW 개발을 위해 단계별로 요구되는 보안 활동을 적용한 방법론.", "sub": ""}, {"t": "n", "text": "SDLC 단계별 보안 활동 :"}, {"t": "c", "term": "요구사항 분석", "def": "보안 요구 항목·시스템 보안 항목 식별, 개발 환경 보안 프레임워크·운영 보안 환경 분석 → 산출물: 보안요구사항 정의서, 보안적용계획서.", "sub": ""}, {"t": "c", "term": "설계", "def": "보안 요구 항목 구현 방안 설계, 보안 프레임워크 인증·인가 설정, 화면 설계 등 → 산출물: 보안적용계획서, 보안 프레임워크.", "sub": ""}, {"t": "c", "term": "구현", "def": "시큐어 코딩(secure coding), 소스코드 보안약점 진단·조치, 코드 리뷰 → 산출물: 보안약점 진단 결과서, 보안약점이 제거된 소스코드.", "sub": ""}, {"t": "c", "term": "테스트", "def": "오류 유발 테스트 케이스 기반 테스트, 공격 시나리오 테스트, 모의 침투 테스트 → 산출물: 테스트 결과서, 취약점 조치 결과서.", "sub": ""}, {"t": "c", "term": "운영 및 유지보수", "def": "지속적 보안 패치, 보안약점·취약점 진단 및 조치 → 산출물: 보안 패치 결과서, 진단·조치 결과서.", "sub": ""}]}, {"title": "SW개발 보안의 요구공학 프로세스", "items": [{"t": "c", "term": "SW개발 보안의 요구공학 프로세스", "def": "보안 요구공학은 크게 보안요구사항 개발과 보안요구사항 관리로 나뉜다.", "sub": ""}, {"t": "c", "term": "요구사항 도출", "def": "법·제도 준거성(Compliance), 내·외부 시스템 환경, 시스템 보안 요구사항을 식별·도출하고 이해관계자 협의로 수집·정제·분류(제안서·계약서·과업지시서·회의록 등 참조).", "sub": ""}, {"t": "c", "term": "요구사항 분석", "def": "분류된 요구사항을 토대로, 구현 난이도·비용·인력 등 효율성을 고려해 제약조건을 판별하고 필요 시 대안을 제시.", "sub": ""}, {"t": "c", "term": "요구사항 명세", "def": "분석서를 통해 요구사항 정의서 도출. SW 시스템의 목표 기술과 기능·비기능 요구사항을 명세.", "sub": ""}, {"t": "c", "term": "요구사항 확인과 검증", "def": "이해관계자·조직 성숙도·표준을 고려하여 문제 보고서를 작성하고 경영진 승인으로 확정. 구현 가능성·테스트 가능성·추적성을 검토.", "sub": ""}, {"t": "c", "term": "요구사항 관리", "def": "환경 변화·시간 흐름에 따라 보안요구사항이 변경될 수 있으므로 지속 관리·갱신. 정식 승인 후 변경, 보안요구사항 추적 매트릭스로 산출물·테스트 시나리오를 관리.", "sub": ""}, {"t": "n", "text": "의사소통 관리: 정형적·서면(복잡한 이해 상충 해결), 정형적·구두(즉석 피드백, 발표), 비정형적·서면(단순 정보 요청, 메모·이메일), 비정형적·구두(개인 상담, 회의)."}]}, {"title": "SW개발 보안의 설계", "items": [{"t": "c", "term": "SW개발 보안의 설계", "def": "운영·개발 애플리케이션이 조직 사업 방향에 맞는 보안 목적을 정의하고, 보안 위험 분석 및 전사 보안 계획을 작성하는 것.", "sub": ""}, {"t": "c", "term": "요구사항 반영", "def": "분석 단계 보안요구사항 분석서를 반영하여 감지하지 못하는 보안 위험·통제를 고려해 보안 설계서(기본·상세 설계)를 작성.", "sub": ""}, {"t": "c", "term": "요구사항 설계 반영", "def": "조직 표준(기술·비즈니스 요건) 적합성 확인, 실제 구현 가능성 판단, 보안요구사항을 설계에 적절히 반영.", "sub": ""}, {"t": "c", "term": "환경 설계 반영", "def": "외부 공격으로부터 개발/운영 환경 보호를 위한 네트워크 보안 구성, 개발/운영 네트워크 분리, DMZ 구간 접근·계정 관리 점검.", "sub": ""}, {"t": "c", "term": "보안적용계획서 활용", "def": "보안요구사항 명세서 기반으로 설계 단계 보안적용계획서를 작성해 아키텍처정의서·화면설계서·보안 프레임워크 설계에 활용.", "sub": ""}]}]}, {"title": "1-2. SW개발 보안 환경 구축 일정 계획 수립", "groups": [{"title": "보안성이 강화된 응용프로그램 구현을 위한 환경의 구축", "items": [{"t": "c", "term": "보안성이 강화된 응용프로그램 구현을 위한 환경의 구축", "def": "대상 시스템을 개발 환경에 배포하는 데 쓰이는 취약점 진단 도구, 모니터링·결함 추적/관리 시스템 등으로 구성.", "sub": ""}, {"t": "c", "term": "보안 취약점 환경 구축 기능", "def": "대상 시스템을 테스트 환경에 배포, 진단 도구·모니터링 툴 설치 관리, 환경 설정 정보 문서화.", "sub": ""}, {"t": "c", "term": "진단 서버", "def": "취약점 진단에 필요한 CPU·메모리 등이 장착된 서버.", "sub": ""}, {"t": "c", "term": "스토리지", "def": "취약점 진단 데이터를 담는 저장 공간.", "sub": ""}, {"t": "c", "term": "네트워크", "def": "서버와 클라이언트를 연결하는 연결망(내부는 LAN으로 구성).", "sub": ""}, {"t": "c", "term": "취약점 모니터링 환경 기능", "def": "진단 진행 중 인프라·대상 시스템 모니터링 수행 및 모니터링 정보 저장.", "sub": ""}]}, {"title": "보안성이 강화된 응용프로그램 구현을 위한 일정 계획의 수립", "items": [{"t": "c", "term": "보안성이 강화된 응용프로그램 구현을 위한 일정 계획의 수립", "def": "발주·계약 이전에 개발 전략·계획을 수립하고 조직의 보안 정책을 일정에 반영. 역할과 책임을 명시.", "sub": ""}, {"t": "c", "term": "보안 전문가 선정", "def": "모든 개발 과정을 경험 있는 보안 전문가·실무자가 수행하도록 함.", "sub": ""}, {"t": "c", "term": "보안 범주 식별", "def": "사고의 잠재적 파급 효과를 기반으로 조직 보안요구사항을 도출·선택해 일정에 반영.", "sub": ""}, {"t": "c", "term": "보안요구사항 분석", "def": "개발자·공급자 선택, 부서 간 역할·책임, 전사 프로젝트 관리 등을 기술.", "sub": ""}, {"t": "c", "term": "독립적 테스트 계획 기획", "def": "보안 강화 여부를 직간접 확인하기 위한 취약점 점검 계획 기술.", "sub": ""}]}, {"title": "분석·설계 보안 항목과 구현 단계 보안약점의 관계", "items": [{"t": "c", "term": "분석·설계 보안 항목과 구현 단계 보안약점의 관계", "def": "안전한 SW를 위해 분석·설계 단계부터 보안성을 고려하고, 구현 단계에서는 시큐어 코딩으로 보안약점이 없도록 함. (예) DBMS 조회·결과 검증↔SQL Injection, 웹서비스 요청·결과 조회↔XSS, 웹 기능 요청 유효성 검증↔CSRF, 허용 범위 메모리 접근↔메모리 버퍼 오버플로우, 비밀번호 관리↔비밀번호 평문 기록, 암호화 키 관리↔하드코딩된 암호화 키 등.", "sub": ""}]}]}]}, {"title": "학습 2. SW개발 보안 구현하기", "sections": [{"title": "2-1. SW개발 보안 구현", "groups": [{"title": "SW개발 보안 구현을 위한 시큐어 코딩", "items": [{"t": "c", "term": "SW개발 보안 구현을 위한 시큐어 코딩", "def": "안전한 SW를 개발해 보안 위협을 예방·대응하고, 개발 시 보안성을 고려하여 SW 보안약점을 사전에 제거하기 위해 사용하는 코딩.", "sub": ""}, {"t": "c", "term": "시큐어 코딩의 목적", "def": "① 보안 취약점·결함 방지(SQL Injection·Zero Day·보안 장비 우회 등 사전 제거), ② 안전한 대고객 서비스 확대, ③ 안정성·신뢰성 확보(설계 개념·코드 수준 대응).", "sub": ""}, {"t": "c", "term": "시큐어 코딩 적용 방안", "def": "보안 정책 수립, 시큐어 코딩 가이드 작성, 가이드 교육, 시큐어 코딩 자동화 도구(보안약점 진단 도구) 활용. (사후 수정 비용은 시큐어 코딩 비용의 수십 배)", "sub": ""}, {"t": "c", "term": "소스코드 난독화(obfuscation)의 필요성", "def": "컴파일·빌드된 실행 코드는 디컴파일 등 역공학으로 소스코드 복원이 가능. 특히 JAVA·C#는 중간 계층 바이트코드로 컴파일되어 손쉽게 디컴파일되므로, 중요 정보 유출·소스 변조를 막기 위해 소스코드를 읽기 어렵게 만드는 난독화가 필요.", "sub": ""}]}, {"title": "SW보안을 위한 시큐어 코딩의 점검 내용 (보안약점 7대 유형)", "items": [{"t": "c", "term": "입력데이터 검증 및 표현", "
