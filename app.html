<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정보보안 개념 학습앱</title>
<style>
  :root{
    --bg:#eef1f8; --panel:#ffffff; --ink:#18203a; --muted:#697089; --line:#e4e8f2;
    --brand:#4361ee; --brand2:#5c7cfa; --ok:#16a34a; --bad:#e23b3b; --warn:#f08c00;
    --chip:#eef1fb; --radius:14px;
    --shadow:0 1px 2px rgba(20,30,60,.06),0 8px 24px -8px rgba(30,45,90,.14);
    --shadow-sm:0 1px 2px rgba(20,30,60,.07);
    --grad:radial-gradient(1200px 600px at 80% -10%,rgba(67,97,238,.10),transparent 60%),radial-gradient(900px 500px at -10% 10%,rgba(124,140,250,.10),transparent 55%);
  }
  [data-theme="dark"]{
    --bg:#0c1018; --panel:#161c2c; --ink:#e8ecf7; --muted:#98a1ba; --line:#28304a;
    --brand:#6b8afd; --brand2:#86a0ff; --ok:#4ade80; --bad:#ff6b6b; --warn:#ffd43b;
    --chip:#1f2740;
    --shadow:0 1px 2px rgba(0,0,0,.5),0 10px 30px -10px rgba(0,0,0,.6);
    --shadow-sm:0 1px 2px rgba(0,0,0,.5);
    --grad:radial-gradient(1200px 600px at 80% -10%,rgba(107,138,253,.14),transparent 60%),radial-gradient(900px 500px at -10% 10%,rgba(134,160,255,.10),transparent 55%);
  }
  *{box-sizing:border-box}
  button,select,input,a{touch-action:manipulation;-webkit-tap-highlight-color:rgba(67,97,238,.15)}
  html,body{margin:0;height:100%}
  body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,-apple-system,sans-serif;
    background:var(--bg);background-image:var(--grad);background-attachment:fixed;
    color:var(--ink);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
  ::selection{background:color-mix(in srgb,var(--brand) 28%,transparent)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--muted) 35%,transparent);border-radius:8px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:color-mix(in srgb,var(--muted) 55%,transparent);background-clip:content-box}
  button{font-family:inherit;cursor:pointer}
  .app{height:100vh}
  .ghost{border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:9px;padding:8px 11px;font-size:12.5px;font-weight:600;transition:.15s}
  .ghost:hover{color:var(--brand);border-color:var(--brand);background:var(--chip)}
  /* Main */
  .main{display:flex;flex-direction:column;min-width:0;min-height:0;height:100vh}
  .top{display:flex;gap:10px;align-items:center;padding:13px 22px;border-bottom:1px solid var(--line);
    background:color-mix(in srgb,var(--panel) 78%,transparent);backdrop-filter:saturate(150%) blur(10px);
    flex-wrap:wrap;position:sticky;top:0;z-index:15}
  .h1{font-size:18px;font-weight:800;margin-right:auto;letter-spacing:-.4px}
  .tabs{display:flex;gap:4px;background:var(--chip);padding:5px;border-radius:13px}
  .tab{border:none;background:none;color:var(--muted);padding:8px 16px;border-radius:9px;font-weight:700;font-size:13.5px;transition:.15s}
  .tab:hover{color:var(--ink)}
  .tab.active{background:var(--panel);color:var(--brand);box-shadow:var(--shadow-sm)}
  .tab.disabled{opacity:.38;pointer-events:none}
  .search{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:11px;padding:9px 13px;width:230px;font-size:13.5px;transition:.15s}
  .search:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 18%,transparent)}
  .content{overflow:auto;padding:24px 22px 60px;flex:1}
  .wrap{max-width:900px;margin:0 auto;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  /* Browse */
  .unit{margin-bottom:26px}
  .unit>h2{font-size:16px;font-weight:800;color:var(--brand);margin:0 0 4px;padding-bottom:8px;border-bottom:2px solid var(--line)}
  .section>h3{font-size:14.5px;font-weight:700;margin:18px 0 6px;color:var(--ink)}
  .group{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:6px 18px 14px;margin:12px 0;box-shadow:var(--shadow)}
  .group>h4{font-size:14px;font-weight:800;margin:14px 0 8px;color:var(--ink);display:flex;align-items:center;gap:8px}
  .group>h4 .pill{font-size:11px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2));border-radius:20px;padding:2px 9px}
  .sub{font-size:12.5px;font-weight:700;color:var(--muted);margin:10px 0 4px}
  .c{display:flex;gap:10px;padding:7px 0;border-top:1px dashed var(--line);align-items:flex-start}
  .c:first-of-type{border-top:none}
  .c .term{flex:0 0 38%;max-width:38%;font-weight:700;font-size:13.5px;color:var(--brand)}
  .c.learned .term{color:var(--ok)}
  .c .def{flex:1;color:var(--ink);font-size:13.5px}
  .c .mark{flex:0 0 auto;border:none;background:none;font-size:16px;opacity:.35;padding:0 2px}
  .c.learned .mark{opacity:1}
  .c.learned .term{color:var(--ok)}
  .note{background:var(--chip);border-radius:9px;padding:8px 12px;margin:8px 0;font-size:12.5px;color:var(--muted)}
  .note::before{content:"💡 ";}
  .meta-notes{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .meta-notes span{background:var(--chip);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--muted)}
  /* Flashcard */
  .fc-stage{max-width:620px;margin:10px auto 0;text-align:center}
  .fc-counter{color:var(--muted);font-size:13px;margin-bottom:10px}
  .card{perspective:1600px;height:340px;margin:0 auto}
  .card-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
  .card.flipped .card-inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;background:var(--panel);border:1px solid var(--line);
    border-radius:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px;gap:12px}
  .face .tag{font-size:12px;color:var(--muted);position:absolute;top:16px;left:20px;font-weight:600}
  .face .crumb{font-size:11.5px;color:var(--muted);position:absolute;bottom:14px;left:0;right:0}
  .front .q{font-size:25px;font-weight:800;letter-spacing:-.5px}
  .back{transform:rotateY(180deg)}
  .back .q{font-size:17px;font-weight:800;color:var(--brand);margin-bottom:4px}
  .back .a{font-size:15px;line-height:1.75}
  .hint{color:var(--muted);font-size:12.5px}
  .fc-actions{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap}
  .btn{border:none;border-radius:11px;padding:11px 18px;font-weight:700;font-size:14px;background:var(--chip);color:var(--ink);transition:transform .08s,filter .15s,box-shadow .15s}
  .btn:hover{filter:brightness(.97)}
  .btn:active{transform:translateY(1px) scale(.99)}
  .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;box-shadow:0 8px 18px -8px color-mix(in srgb,var(--brand) 80%,transparent)}
  .btn.ok{background:var(--ok);color:#fff}
  .btn.bad{background:var(--bad);color:#fff}
  .btn:disabled{opacity:.4;cursor:default;box-shadow:none}
  .fc-bar{display:flex;gap:14px;justify-content:center;align-items:center;margin-top:14px;color:var(--muted);font-size:13px}
  /* Quiz */
  .quiz{max-width:680px;margin:0 auto}
  .quiz-head{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap}
  .seg{display:flex;background:var(--chip);border-radius:11px;padding:4px;gap:2px}
  .seg button{border:none;background:none;color:var(--muted);padding:7px 13px;border-radius:8px;font-weight:600;font-size:12.5px;transition:.15s}
  .seg button:hover{color:var(--ink)}
  .seg button.active{background:var(--panel);color:var(--brand);box-shadow:var(--shadow-sm)}
  .score{font-size:13px;color:var(--muted)}
  .score b{color:var(--ink)}
  .qcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:24px}
  .qtag{font-size:12px;color:var(--brand);font-weight:700;margin-bottom:8px;letter-spacing:.02em}
  .qtext{font-size:17.5px;font-weight:700;line-height:1.6;margin-bottom:18px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{text-align:left;border:1.5px solid var(--line);background:var(--panel);color:var(--ink);border-radius:13px;padding:13px 15px;font-size:14px;transition:border-color .12s,background .12s,transform .08s;display:flex;gap:10px;align-items:flex-start}
  .opt:hover{border-color:var(--brand2);background:var(--chip)}
  .opt:active{transform:scale(.99)}
  .opt .k{font-weight:800;color:var(--muted);flex:0 0 auto;width:18px}
  .opt.correct{border-color:var(--ok);background:color-mix(in srgb,var(--ok) 13%,transparent)}
  .opt.wrong{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 13%,transparent)}
  .opt.correct .k{color:var(--ok)} .opt.wrong .k{color:var(--bad)}
  .opt:disabled{cursor:default}
  .qfoot{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px}
  .explain{font-size:13px;color:var(--muted);flex:1}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  @media (max-width:820px){
    .c .term{flex-basis:46%;max-width:46%}
  }
  /* 모바일 (폰) */
  @media (max-width:600px){
    body{font-size:14px}
    .top{padding:10px 12px;gap:8px;align-items:center}
    .menu-btn{order:1}
    .h1{order:2;font-size:15px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tabs{order:4;width:100%;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;justify-content:flex-start}
    .tab{padding:8px 12px;font-size:13px;white-space:nowrap}
    .search{order:3;width:auto;flex:0 0 auto;max-width:46vw}
    .content{padding:14px}
    .group{padding:4px 12px 10px}
    .c{flex-direction:column;gap:3px;padding:9px 0}
    .c .term,.c .def{flex-basis:auto;max-width:100%}
    .c .term{font-size:14px}
    .c .mark{position:absolute;right:0}
    .c{position:relative;padding-right:26px}
    .unit>h2{font-size:15px}
    .match{grid-template-columns:1fr;gap:10px}
    .card{height:300px}
    .face{padding:22px}
    .front .q{font-size:21px}
    .back .a{font-size:14px}
    .opt{padding:11px 12px;font-size:13.5px}
    .stat-grid{grid-template-columns:1fr 1fr}
    .exam-sticky{flex-wrap:wrap;position:static}
    .exam-sticky .prog{flex:1 0 100%;order:-1;margin-bottom:4px}
    .qnav{flex-wrap:wrap}
    .qnav .btn{flex:1;min-width:0}
    .prow{flex-wrap:wrap}
    .prow .nm{flex:0 0 100%;margin-bottom:2px}
    .prow .pc{flex:0 0 auto}
    .scorebanner .pct{font-size:34px}
    .chip{padding:7px 12px;font-size:12.5px}
    .examinfo{font-size:11.5px}
    .wrap{max-width:100%}
    /* 가로 오버플로우 차단 + 퀴즈 헤더 세로 스택 */
    html,body{overflow-x:hidden}
    .content{overflow-x:hidden}
    .quiz-head{flex-direction:column;align-items:stretch;gap:8px}
    .seg{flex-wrap:wrap}
    .typeseg{width:100%}
    .examinfo{flex:none;width:100%;margin:0}
    .quiz,.qcard,.opts,.opt,.exam-list,.eq,.dash{min-width:0;max-width:100%}
    .qtext{word-break:break-word}
    .score{font-size:12px}
  }
  .menu-btn{display:inline-flex;align-items:center;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:9px;padding:8px 12px;font-size:13.5px;font-weight:600;transition:.15s}
  .menu-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--chip)}
  /* 칩 바 (개념 카테고리 / 드릴 포맷) */
  .chipbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
  .chip{border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:600;transition:.15s}
  .chip:hover{border-color:var(--brand2);color:var(--ink)}
  .chip:active{transform:scale(.97)}
  .chip.active{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border-color:transparent;box-shadow:0 6px 14px -6px color-mix(in srgb,var(--brand) 70%,transparent)}
  .chipgap{flex:1}
  /* 시작(홈) 화면 */
  .landing{max-width:760px;margin:10px auto;padding:8px}
  .landing h2{font-size:20px;margin:6px 0 4px}
  .landing .lmuted{color:var(--muted);font-size:13.5px;margin:0 0 16px}
  .lsum{display:flex;align-items:center;gap:16px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;margin-bottom:18px}
  .lsum .big{font-size:28px;font-weight:800;color:var(--brand);line-height:1;white-space:nowrap}
  .lsum .mid{flex:1;min-width:0}
  .lsum .ls{font-size:12.5px;color:var(--muted);margin-bottom:7px}
  .lsum .ls b{color:var(--ink)}
  .lsum .lbar{height:9px;background:var(--line);border-radius:6px;overflow:hidden}
  .lsum .lbar i{display:block;height:100%;background:linear-gradient(90deg,var(--ok),#34d399);transition:width .5s}
  .selallbtn{margin-bottom:14px}
  .pickgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
  .bigchip{display:flex;align-items:flex-start;gap:10px;text-align:left;border:1.5px solid var(--line);background:var(--panel);color:var(--ink);
    border-radius:var(--radius);padding:15px 16px;font-size:14.5px;font-weight:600;box-shadow:var(--shadow);transition:border-color .15s,transform .08s,box-shadow .15s}
  .bigchip:hover{border-color:var(--brand2);transform:translateY(-1px);box-shadow:0 10px 24px -10px rgba(30,45,90,.25)}
  .bigchip:active{transform:scale(.99)}
  .bigchip .ck{font-size:18px;color:var(--brand);margin-top:1px}
  .bigchip .bt{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
  .bigchip .bn{font-weight:700}
  .bigchip .bm{color:var(--muted);font-weight:600;font-size:11.5px}
  .bigchip .bar{height:5px;background:var(--line);border-radius:5px;margin-top:5px;overflow:hidden}
  .bigchip .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--ok),#34d399);transition:width .4s}
  .bigchip.on{border-color:var(--brand);background:color-mix(in srgb,var(--brand) 9%,transparent);box-shadow:0 8px 20px -10px color-mix(in srgb,var(--brand) 55%,transparent)}
  .biggo{margin-top:20px;width:100%;padding:16px;font-size:15.5px}
  .landing h2{font-size:23px;letter-spacing:-.5px}
  .opt.sel{border-color:var(--brand);background:color-mix(in srgb,var(--brand) 12%,transparent)}
  /* 다과목 읽기 블록 */
  .subjblock{margin-bottom:26px}
  .subjh{font-size:17px;font-weight:800;color:var(--brand);background:var(--chip);border-radius:10px;padding:10px 14px;margin-bottom:12px}
  /* 퀴즈 카운터/내비 */
  .qcounter{text-align:center;color:var(--muted);font-size:13px;margin:14px 0 10px}
  .qcounter b{color:var(--brand);font-size:15px}
  .qnav{display:flex;gap:10px;justify-content:center;align-items:center}
  .qnav .btn{min-width:96px}
  /* 퀴즈 확장 */
  .typeseg{margin:12px 0 6px;flex-wrap:wrap}
  .examinfo{font-size:12px;color:var(--muted);background:var(--chip);border-radius:8px;padding:7px 11px;margin-bottom:14px}
  .oxopts{flex-direction:row;gap:12px}
  .oxopts .opt{justify-content:center;font-weight:700;font-size:16px}
  .match{display:grid;grid-template-columns:1fr 1.4fr;gap:14px}
  .mcol{display:flex;flex-direction:column;gap:8px}
  .mhead{font-size:12px;font-weight:700;color:var(--muted)}
  .mrow{display:flex;gap:8px;align-items:flex-start;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:13px}
  .mnum{font-weight:800;color:var(--brand)}
  .mkey{font-weight:800;color:var(--brand)}
  .mterm{flex:1;font-weight:700}
  .mrow select{border:1px solid var(--line);border-radius:7px;padding:3px 6px;background:var(--panel);color:var(--ink)}
  .mres{font-weight:700}
  .shortbox{display:flex;gap:8px;margin-top:6px}
  .shortin{flex:1}
  .bank{display:flex;flex-wrap:wrap;gap:8px}
  .bankopt{flex:0 0 auto}
  /* 플래시카드 서브모드 */
  .fc-modebar{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  /* 모의고사 */
  .exam-setup{max-width:560px;margin:20px auto;text-align:center}
  .exam-setup .card-box{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:26px}
  .opt-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0}
  .exam-list{max-width:820px;margin:0 auto}
  .exam-sticky{position:sticky;top:0;z-index:5;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    box-shadow:var(--shadow);padding:12px 16px;display:flex;gap:12px;align-items:center;margin-bottom:14px}
  .exam-sticky .prog{flex:1;color:var(--muted);font-size:13px}
  .exam-sticky .big{font-size:18px;font-weight:800}
  .eq{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
  .eq .qno{font-size:12px;font-weight:800;color:var(--brand);margin-bottom:6px}
  .eq .qno .badge{background:var(--chip);color:var(--muted);border-radius:20px;padding:2px 9px;margin-left:6px;font-weight:700}
  .eq.correct{border-color:var(--ok)} .eq.wrong{border-color:var(--bad)}
  .review-flag{font-weight:800;margin-left:8px}
  .scorebanner{text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:24px;margin-bottom:18px}
  .scorebanner .pct{font-size:42px;font-weight:800}
  .scorebanner .pf{font-size:14px;font-weight:700;border-radius:20px;padding:4px 14px;display:inline-block;margin-top:8px}
  .pass{background:color-mix(in srgb,var(--ok) 18%,transparent);color:var(--ok)}
  .fail{background:color-mix(in srgb,var(--bad) 18%,transparent);color:var(--bad)}
  /* 대시보드 */
  .dash{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
  .stat .lbl{font-size:12px;color:var(--muted);font-weight:600}
  .stat .val{font-size:28px;font-weight:800;margin-top:4px;background:linear-gradient(135deg,var(--brand),var(--brand2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .panel-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px}
  .panel-box h3{margin:0 0 12px;font-size:15px}
  .prow{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:13px}
  .prow .nm{flex:0 0 130px;font-weight:600}
  .prow .bar2{flex:1;height:8px;background:var(--line);border-radius:6px;overflow:hidden}
  .prow .bar2 i{display:block;height:100%;background:var(--brand)}
  .prow .pc{flex:0 0 70px;text-align:right;color:var(--muted)}
  .hist{font-size:13px}
  .hist .hrow{display:flex;justify-content:space-between;padding:7px 0;border-top:1px dashed var(--line)}
  .hist .hrow:first-child{border-top:none}
</style>
</head>
<body>
<div class="app">
  <main class="main">
    <div class="top">
      <button class="menu-btn" id="menuBtn">📚 과목</button>
      <div class="h1" id="subjTitle">과목을 선택하세요</div>
      <div class="tabs">
        <button class="tab active" data-mode="concept">📖 개념</button>
        <button class="tab" data-mode="drill">🎯 드릴존</button>
      </div>

싱", "def": "스마트폰 문자 메시지로 악성 앱 설치를 유도하여 개인정보·금융정보를 탈취하는 침해 기법.", "sub": "사이버 공격 관련 주요 용어"}, {"t": "c", "term": "스피어 피싱", "def": "창(Spear)+피싱(Phishing)의 합성어로, 특정 공격 대상을 지정해 집중적으로 공격하여 정보를 탈취하는 수법.", "sub": "사이버 공격 관련 주요 용어"}, {"t": "c", "term": "웹 해킹", "def": "웹서비스 요소를 공격해 이용자·관리자 권한을 획득하고 개인정보 등을 탈취하는 행위.", "sub": "사이버 공격 관련 주요 용어"}, {"t": "c", "term": "지능형 지속 공격(APT, Advanced Persistent Threat)", "def": "특정 대상에 명확한 목표를 설정하고 지능적·지속적으로 공격하여 정보를 수집·유출하는 해킹 기법.", "sub": "사이버 공격 관련 주요 용어"}, {"t": "c", "term": "포트 스캐닝", "def": "공격 대상 서버의 열린 서비스 포트를 순차적으로 접속 시도하여 취약한 포트를 찾아내는 공격 준비 기법.", "sub": "사이버 공격 관련 주요 용어"}, {"t": "c", "term": "무작위 대입 공격(Brute-force)", "def": "인증이 필요한 기능에 비밀번호 등을 무작위로 대입하여 인증 성공을 노리는 공격.", "sub": "사이버 공격 관련 주요 용어"}, {"t": "c", "term": "미라이봇넷", "def": "IoT 기기를 통해 DDoS 공격을 하는 봇넷의 일종으로, IoT 기기의 기본 계정으로 통제권을 획득하거나 다량의 트래픽을 유발하는 공격.", "sub": "사이버 공격 관련 주요 용어"}, {"t": "c", "term": "랜섬웨어", "def": "동의 없이 설치되어 파일을 암호화하고 복호화를 원하는 사용자에게 돈을 요구하는 악성 프로그램.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "루트킷", "def": "설치된 악성코드가 백신·사용자에게 감지되지 않도록 숨겨 주는 악성 프로그램.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "C&C 서버", "def": "악성코드에 감염된 좀비 PC를 관리하고 DDoS 등 공격 명령을 내리는 관리·제어 목적 서버.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "컴퓨터 바이러스", "def": "정상 실행 파일과 결합해 PC 동작을 중지시키거나 파일을 변조·파괴하는 악성 프로그램.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "백도어", "def": "해커가 사용자 몰래 접속하여 악의적 행위를 할 수 있도록 출입구 역할을 하는 악성 프로그램.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "좀비 PC", "def": "원격 제어 악성 프로그램이 설치되어 사용자 모르게 스팸 발송·악성코드 유포·DDoS 등에 활용되는 컴퓨터.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "웜(worm)", "def": "다른 파일에 기생하지 않고 독자적으로 자신을 복제·확산하여 전파 속도가 매우 빠른 악성 프로그램(메일·공유 폴더 등으로 전파, 시스템·네트워크 부하 증가).", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "웹셸", "def": "해커가 원격으로 웹서버에 악의적 명령을 실행하도록 작성한 웹 브라우저 기반 스크립트 실행 파일.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "익스플로잇(Exploit)", "def": "소프트웨어·하드웨어 취약점을 통해 악성 행위를 수행하기 위해 제작한 프로그램.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "제로데이 취약점", "def": "보안 패치가 발표되지 않은 상태에서 외부에 노출된 취약점.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "키로거", "def": "사용자의 키보드 입력 데이터를 해커에게 전송하는 악성 프로그램.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "트로이 목마", "def": "컴퓨터에 숨어 있으면서 사용자가 인지하지 못하도록 정보를 유출하는 악성코드.", "sub": "정보 보안 침해 공격에 사용되는 악성 프로그램"}, {"t": "c", "term": "SQL 인젝션", "def": "SQL을 사용하는 응용프로그램에서 SQL 구문을 조작하여 인증 우회·권한 상승을 유발하는 공격.", "sub": "주요 웹 해킹 공격 유형"}, {"t": "c", "term": "크로스 사이트 스크립트(XSS)", "def": "웹사이트에 악성 스크립트를 삽입하는 취약점을 활용해 의도하지 않은 기능 수행·정보 탈취를 하는 공격.", "sub": "주요 웹 해킹 공격 유형"}, {"t": "c", "term": "크로스 사이트 요청 위조(CSRF)", "def": "피해자의 세션 쿠키·인증 정보를 자동 포함시켜 위조된 웹 요청을 강제로 보내, 웹서버가 정당한 요청으로 오해하게 만드는 공격.", "sub": "주요 웹 해킹 공격 유형"}, {"t": "c", "term": "파일 업로드(웹셸)", "def": "허용되지 않은 유형의 파일을 업로드하고 외부에서 직접 접근하는 취약점을 활용해 웹서버 권한을 탈취하는 공격.", "sub": "주요 웹 해킹 공격 유형"}, {"t": "c", "term": "파일 다운로드", "def": "검증되지 않은 외부 입력값으로 서버 파일에 접근하여 중요 서버 파일을 탈취하는 공격.", "sub": "주요 웹 해킹 공격 유형"}, {"t": "c", "term": "세션 탈취", "def": "XSS 등으로 피해자의 세션 쿠키를 탈취하고 이를 이용해 피해자 세션으로 로그인하는 공격.", "sub": "주요 웹 해킹 공격 유형"}]}, {"title": "ISMS-P 인증 기준 중 네트워크 보안 관련 항목 (참고)", "items": [{"t": "c", "term": "네트워크 접근(2.6.1)", "def": "비인가 접근 통제를 위해 IP 관리·단말 인증 등 절차를 수립하고, 업무 목적·중요도에 따라 네트워크 분리(DMZ, 서버팜, DB존, 개발존 등)와 접근 통제를 적용.", "sub": ""}, {"t": "c", "term": "정보시스템 접근(2.6.2)", "def": "서버·네트워크시스템 등 정보시스템에 접근 허용 사용자, 접근 제한 방식, 안전한 접근 수단 등을 정의·통제.", "sub": ""}, {"t": "c", "term": "무선 네트워크 접근(2.6.5)", "def": "사용자 인증, 송수신 데이터 암호화, AP 통제 등 무선 보호 대책 적용 및 비인가 AP·AD Hoc 접속 차단.", "sub": ""}, {"t": "c", "term": "원격 접근 통제(2.6.6)", "def": "보호구역 외 정보시스템 관리·개인정보처리는 원칙 금지, 불가피 시 책임자 승인·단말 지정·강화된 인증·구간 암호화 등 보호 대책 수립.", "sub": ""}, {"t": "c", "term": "인터넷 접속 통제(2.6.7)", "def": "정보 유출·악성코드 감염·내부망 침투 예방을 위해 주요 시스템·단말의 인터넷 접속/서비스(P2P·웹하드·메신저 등)를 제한.", "sub": ""}]}, {"title": "네트워크 보안요구사항 도출 항목", "items": [{"t": "c", "term": "서버 네트워크 보안요구사항", "def": "접속 권한 IP 제한, 불법 개인정보 유출 시도 탐지, 망분리, 외부망 접속 시 VPN·전용선 등 안전 접속, 원격관리 원칙 금지, 중요도별 내·외부망 분리, DDoS 방어, 악성코드 유입 차단, 개인정보 유출 탐지·차단.", "sub": ""}, {"t": "c", "term": "클라이언트 네트워크 보안요구사항", "def": "허가받지 않은 단말 접속 차단, 내부망 관리 시 특정 단말 제한, 무선랜 사용 시 사용자 인증·송수신 암호화 등 보호 대책 수립.", "sub": ""}, {"t": "c", "term": "네트워크 운영 보안요구사항", "def": "보안시스템 유형별로 관리자 지정·최신 정책 업데이트·룰셋 변경·이벤트 모니터링 등 운영 절차를 수립하고 보안시스템별 정책 적용 현황을 관리하며, 네트워크 비인가 접근 통제를 위한 네트워크 접근 통제 리스트·네트워크 식별자 관리 절차를 수립해야 한다는 요구사항.", "sub": ""}]}]}, {"title": "1-2. NW보안 설계", "groups": [{"title": "네트워크 보안 설계 원칙 및 보안 장비 유형", "items": [{"t": "c", "term": "최소화의 원칙(Minimalization)", "def": "반드시 필요한 항목을 필요로 하는 사람에게 최소한의 기간 동안만 접근을 허용하는 것. 네트워크 접근 통제의 기본 원칙.", "sub": "네트워크 보안 설계 원칙"}, {"t": "c", "term": "분리의 원칙(Isolation)", "def": "리스크를 격리하기 위한 원칙. DMZ와 내부망 분리, 개발 서버와 운영 서버 분리, 업무 처리자와 관리자의 권한 분리 등이 예.", "sub": "네트워크 보안 설계 원칙"}, {"t": "c", "term": "다중 보안의 원칙(Defence in Depth)", "def": "하나의 보안대책이 무력화되더라도 다른 보안대책으로 전체 보안성이 확보되도록 하는 개념(예: 침입 방지(1차)→확산 침투 방지(2차)→외부 유출 방지(3차)의 3중 대책).", "sub": "네트워크 보안 설계 원칙"}, {"t": "c", "term": "법규 준수의 원칙(Compliance)", "def": "보안 리스크 감소와 법률 위반 방지를 위해 법규가 가이드하는 보안대책을 반드시 적용.", "sub": "네트워크 보안 설계 원칙"}, {"t": "c", "term": "네트워크 보안 장비 유형", "def": "접근 통제, 침입 차단·탐지, DDoS 탐지 등을 수행하는 장비.", "sub": ""}, {"t": "c", "term": "방화벽(Fire Wall)", "def": "외부↔내부 정보통신망에 불법 접근하는 것을 차단하는 시스템. 발신지·수신지 IP 주소와 포트 번호에 대한 접근 통제 수행.", "sub": "네트워크 보안 장비 유형"}, {"t": "c", "term": "침입탐지시스템(IDS)", "def": "네트워크를 통한 사이버 공격을 실시간으로 탐지.", "sub": "네트워크 보안 장비 유형"}, {"t": "c", "term": "침입예방시스템(IPS)", "def": "네트워크를 통한 사이버 공격을 실시간으로 탐지하고 차단.", "sub": "네트워크 보안 장비 유형"}, {"t": "c", "term": "DDoS방지시스템", "def": "목적지 기준 트래픽이 임계치를 초과하면 기존 세션을 제외한 패킷을 Null Routing 처리하여 DDoS에 대응.", "sub": "네트워크 보안 장비 유형"}, {"t": "c", "term": "웹방화벽", "def": "알려진 유형의 웹 해킹 공격을 탐지·방어.", "sub": "네트워크 보안 장비 유형"}, {"t": "n", "text": "방화벽 주요 기능: 패킷 필터(L3·L4), 상태 확인(L4), 주소 변환 NAT·DHCP(L4), 트래픽 관리(L4), 프록시(L3·L4), 콘텐츠 필터(L7), URL 필터(L7), 바이러스 필터(L7), MAC 바인딩(L2·L3), 영역 분리(L3), 운영 모드 Router/Bridge(L2·L3)."}, {"t": "n", "text": "IDS vs IPS: IDS는 애플리케이션 계층·미러링·탭 모드·라우터 트래픽 탐지·간접 차단(방화벽 연동), IPS는 커널 계층·후킹·인라인 모드·로컬 트래픽 탐지·패킷 드롭(직접 차단). 탐지 성능은 IPS가 빠르나 장애 시 로컬 네트워크 장애 발생."}]}, {"title": "망분리의 개념 및 유형", "items": [{"t": "c", "term": "망분리의 개념", "def": "시스템의 오용/악용으로부터 정보시스템을 보호하기 위해, 중요 내부 업무 처리자의 PC·노트북을 인터넷에 접속되지 않도록 차단하는 기술.", "sub": "망분리의 개념 및 근거"}, {"t": "c", "term": "망분리의 근거", "def": "개인정보의 기술적·관리적 보호조치 기준 제4조(접근 통제) 6항 — 일정 규모 이상(이용자 수 일평균 100만 명 이상 또는 매출 100억 원 이상)의 정보통신서비스 제공자는 개인정보취급자 컴퓨터를 물리적·논리적으로 망분리해야 함.", "sub": "망분리의 개념 및 근거"}, {"t": "c", "term": "물리적 망분리", "def": "2대 이상의 PC와 별도 회선으로 내부망·외부망을 분리하는 방식(2PC, 공용 PC 방식).", "sub": "망분리의 유형 및 구현 방식"}, {"t": "c", "term": "논리적 망분리", "def": "한 대의 PC에서 가상화 기술로 내부망·외부망을 분리하는 방식(서버 기반 가상화, Host 기반 가상화).", "sub": "망분리의 유형 및 구현 방식"}]}, {"title": "서버 네트워크 관문 영역 보안 설계", "items": [{"t": "c", "term": "관문 영역 보안 솔루션", "def": "서버팜이 인터넷과 연결되는 관문에 대한 보안 설계를 수행한다.", "sub": ""}, {"t": "c", "term": "안티 DDoS 솔루션", "def": "방화벽의 앞 단에서 대용량 DDoS 공격에 대응하여 과다 세션을 처리할 수 있도록 구성하는 솔루션.", "sub": "관문 영역 보안 솔루션"}, {"t": "c", "term": "악성코드 유입 방지 솔루션", "def": "인터넷 혹은 이메일 수신 등을 통해 유입되는 악성코드를 탐지하고 차단할 수 있는 솔루션.", "sub": "관문 영역 보안 솔루션"}, {"t": "c", "term": "개인정보 유출 방지 솔루션", "def": "내부망의 개인정보가 인터넷으로 유출되는 것을 탐지하고 차단할 수 있는 데이터 유출 방지 솔루션.", "sub": "관문 영역 보안 솔루션"}, {"t": "c", "term": "DMZ 영역", "def": "외부로부터의 접근이 불가피한 웹서버·메일서버 등 공개용 서버가 배치되는 영역으로, 외부 직접 접근이 차단되는 내부망과 구분하여 설계한다.", "sub": "서버 네트워크 영역 구분 설계"}, {"t": "c", "term": "존 분리 방화벽(영역 분리 방화벽)", "def": "DMZ와 내부망, 운영 서버 영역과 개발 서버 영역 등 네트워크 영역 간 접근 통제를 적용하는 방화벽.", "sub": "서버 네트워크 영역 구분 설계"}]}, {"title": "VPN을 통한 원격 접속 설계", "items": [{"t": "c", "term": "IPsec-VPN", "def": "인터넷을 통해 외부 네트워크와 내부 네트워크를 연계하는 VPN으로, 커널(3계층)에서 암호화하며 IKE(X.509 인증서·Pre-Shared Key) 기반 인증을 사용하고, 사용자 PC 설치가 필요 없으며 고정형 IP·지정된 서버-클라이언트를 대상으로 한다(라우팅 변경 없음).", "sub": ""}, {"t": "c", "term": "SSL-VPN", "def": "외부망에 존재하는 PC와 내부망을 인터넷을 통해 연계하는 VPN으로, 애플리케이션(5계층)에서 암호화하며 ID/Password 인증을 사용하고, 사용자 PC 설치(Active-X)가 필요하며 가변형 IP·지정된 서버와 불특정 다수 사용자를 대상으로 한다(정적 라우팅 경로 추가). 성능은 IPsec-VPN의 ¼ 정도.", "sub": ""}]}, {"title": "사용자 단말기 네트워크 접근 통제(NAC)", "items": [{"t": "c", "term": "네트워크 접근 통제(NAC, Network Access Control)", "def": "사전에 네트워크 접속이 승인된 단말기만 접근을 허용하고 그 외의 단말기에 대한 네트워크 접속을 차단할 수 있는 솔루션.", "sub": "NAC의 개념"}, {"t": "c", "term": "NAC 패치", "def": "패치 관리 시스템과 연동하여 OS 보안 업데이트를 수행하는 기능.", "sub": "NAC 제공 기능"}, {"t": "c", "term": "NAC 백신", "def": "악성코드 감염을 탐지·치료하는 기능.", "sub": "NAC 제공 기능"}, {"t": "c", "term": "NAC 격리", "def": "일정 주기별 체크를 통해 비정상 호스트의 네트워크 인터페이스를 차단(Host 격리)하는 기능.", "sub": "NAC 제공 기능"}, {"t": "c", "term": "NAC 패턴 업데이트", "def": "악성코드 시그너처를 업데이트하여 제로데이 공격에 대응하는 기능.", "sub": "NAC 제공 기능"}, {"t": "c", "term": "NAC 패턴 분석", "def": "악성코드를 전송 및 분석하는 기능.", "sub": "NAC 제공 기능"}, {"t": "c", "term": "NAC 애플리케이션 통제", "def": "비인가 SW 설치를 방지하고 라이선스 통제를 병행하는 기능.", "sub": "NAC 제공 기능"}, {"t": "c", "term": "NAC 자원 관리", "def": "네트워크·CPU·메모리 사용률 등 자원을 관리하는 기능.", "sub": "NAC 제공 기능"}, {"t": "c", "term": "NAC 호스트 인증", "def": "사용자 시스템을 인증하여 비인가 시스템의 네트워크 접속을 차단하는 기능.", "sub": "NAC 제공 기능"}]}, {"title": "사용자 단말기 망분리 솔루션 및 세부 구현 방식", "items": [{"t": "c", "term": "VDI(가상 데스크톱 인프라)", "def": "서버 기반 논리적 망분리에서 서버에 구성하는 가상 데스크톱 환경으로, 로컬 PC 영역과 서버 내 VDI 영역을 논리적으로 분리하고 관리자 승인이 없으면 영역 간 파일 전달을 차단한다(보안 관점에서 통제 무력화 방지에 더 적정).", "sub": ""}, {"t": "c", "term": "매체 제어 솔루션", "def": "비용 절감을 위해 호스트 기반 가상화로 망분리를 구성할 때 NAC 솔루션과 연계하여 망분리 무력화를 방지하기 위해 사용하는 솔루션.", "sub": ""}, {"t": "c", "term": "2PC 방식", "def": "개인이 업무용·인터넷용 PC를 별도로 나누어 사용하는 물리적 망분리 방식.", "sub": ""}, {"t": "c", "term": "공용 PC 방식", "def": "2PC 방식과 동일하나 인터넷용 PC는 공유하는 물리적 망분리 방식.", "sub": ""}, {"t": "c", "term": "서버 기반 가상화 인터넷 기본형", "def": "로컬 PC는 업무망 전용으로 동작하고 인터넷 접속 시 별도 서버에서 인터넷용 가상머신이 동작하는 논리적 망분리 방식.", "sub": ""}, {"t": "c", "term": "서버 기반 가상화 업무 기본형", "def": "로컬 PC는 인터넷 전용으로 동작하고 업무망 접속 시 별도 서버에서 업무망 접속용 가상머신이 동작하는 논리적 망분리 방식.", "sub": ""}, {"t": "c", "term": "Host 기반 가상화 업무 기본형", "def": "로컬 PC가 업무용 PC로 동작하며 업무망용 랜카드로 통신하고, 인터넷 활용 시 로컬 PC에서 인터넷용 가상머신을 실행하여 인터넷용 랜카드로 통신하는 논리적 망분리 방식.", "sub": ""}, { 품질 목표 도출.", "sub": ""}, {"t": "c", "term": "2단계 설계(Design)", "def": "품질 목표 만족을 위한 구축 목표·원칙 수립, 아키텍처 설계 및 구간별 장비 용량 산정, 장비·솔루션 선정, 구축 일정 계획 수립.", "sub": ""}, {"t": "c", "term": "3단계 설치/구축(Implementation)", "def": "설계·일정 계획에 따른 장비 구축, 결과가 요구사항·품질 목표를 만족하는지 검증.", "sub": ""}, {"t": "c", "term": "4단계 운용(Operation)", "def": "운용 수행, 품질 기준 목표 유지 관리, 차기 고도화 진단 분석의 기초 자료로 활용할 운용 품질 지표 수집·관리.", "sub": ""}]}, {"title": "정보통신 네트워크 설계 개요 및 세부 요건", "items": [{"t": "c", "term": "네트워크 설계 업무", "def": "신규 구축·장비 대체 및 증설·구조 변경 등에 대해 계획을 세우고 설계 도면·내역서 등을 작성하는 과정.", "sub": "네트워크 설계 개요"}, {"t": "c", "term": "네트워크 설계 목적", "def": "노드 간 상호 통신이라는 기능적 요구사항과 가용성·속도·저지연 등 품질 관련 비기능적 요구사항을 충족하기 위한 것.", "sub": "네트워크 설계 개요"}, {"t": "c", "term": "경제성", "def": "투자 비용 대비 정량적·정성적 효과를 고려.", "sub": "네트워크 설계의 요건"}, {"t": "c", "term": "가용성", "def": "일부 노드 장애에도 전체 서비스 중단이 없도록 이중화 등을 고려.", "sub": "네트워크 설계의 요건"}, {"t": "c", "term": "확장성", "def": "구축 이후 장비·운용 관리 시스템의 확장·변경이 용이하도록 기술 호환성을 고려.", "sub": "네트워크 설계의 요건"}, {"t": "c", "term": "운용 효율성", "def": "운영 편이성·업무 효율성·대응 용이성 등 운영관리 효율성을 고려.", "sub": "네트워크 설계의 요건"}]}, {"title": "가용성을 고려한 기본 네트워크 설계", "items": [{"t": "c", "term": "백본 라우터", "def": "기본 네트워크 설계 시 하위 네트워크 장비 구성의 기준이 되는 상위 라우터.", "sub": ""}, {"t": "c", "term": "완전 그물망(Full Mesh)", "def": "계층별 주요 네트워크 장비를 주 장비와 이중화 장비로 구분하고 모든 장비가 상호 연결되도록 구성하여 가용성을 확보하는 형태.", "sub": ""}, {"t": "c", "term": "인터링크 네트워크", "def": "링크 장애 대비를 위해 계층별 주요 네트워크 장비 간에 구성하는 네트워크.", "sub": ""}, {"t": "c", "term": "STP(Spanning Tree Protocol)", "def": "완전 그물망 네트워크에서 발생할 수 있는 루프 현상을 방지하기 위해 적용하는 프로토콜.", "sub": ""}]}, {"title": "네트워크 장비·회선 용량 설계", "items": [{"t": "c", "term": "L4/L7 TCP 용량 산정", "def": "'네트워크 구축을 위한 장비 규모 산정 지침(TTAK.KO-01.0103/R1)'의 TCP 분석 기준식을 참고하여 L4/L7 스위치의 용량을 산정하는 방식.", "sub": ""}, {"t": "c", "term": "동시 접속자(Concurrent)", "def": "네트워크 예상 가입 회선 수와 시스템 사용자 용량을 기준으로 산정하는 동시 접속 사용자 수(사례: 전체 사용자의 5%).", "sub": ""}, {"t": "c", "term": "동시 사용자(Active User)", "def": "동시 접속자 중 실제로 세션을 유지하는 동시 세션 수(사례: 동시 접속자의 10%).", "sub": ""}, {"t": "c", "term": "TCP Throughput", "def": "목표 동시 세션 수에 (세션별 평균 데이터양 ÷ 세션별 평균 유지 시간)과 시스템 확장 상수(1.2)를 곱하여 산출하는 네트워크 보안 장비 트래픽 처리량.", "sub": ""}, {"t": "c", "term": "시스템 확장 고려 상수", "def": "향후 확장이 예상되는 비율로, 용량 산정 시 일반적으로 1.2(120%)를 적용하는 상수.", "sub": ""}]}]}]}, {"title": "학습 2. NW보안 구현하기", "sections": [{"title": "2-1. NW보안 구현", "groups": [{"title": "네트워크 ACL 설정", "items": [{"t": "c", "term": "네트워크 ACL의 정의", "def": "허가받지 않은 이용자·트래픽이 라우터나 네트워크의 특정 자원에 접근하는 것을 차단·허용하는 것. 라우터 인터페이스에 적용되어 사전 설정 내역에 따라 특정 패킷을 필터링.", "sub": "네트워크 ACL의 개념"}, {"t": "c", "term": "ACL 적용 장점", "def": "불필요한 트래픽을 줄여 네트워크 부하 감소 및 보안성 향상.", "sub": "네트워크 ACL의 개념"}, {"t": "c", "term": "ACL 적용 단점", "def": "패킷 검사 과정에서 지연 발생, 과다 적용 시 라우팅 성능 저하.", "sub": "네트워크 ACL의 개념"}, {"t": "c", "term": "표준 ACL(Standard ACL)", "def": "패킷의 출발지 주소만 검사하여 제어. ACL 번호 1~99, 1300~1699.", "sub": "네트워크 ACL의 종류"}, {"t": "c", "term": "확장 ACL(Extended ACL)", "def": "출발지·목적지 주소, 프로토콜, 포트 번호 등을 검사하여 제어. ACL 번호 100~199, 2000~2699.", "sub": "네트워크 ACL의 종류"}]}, {"title": "보안 운영관리를 위한 ESM", "items": [{"t": "c", "term": "ESM의 개념", "def": "네트워크에 유입되는 다양한 위험 요소를 총체적으로 분석하여 미리 예방할 수 있도록 지원하는 솔루션.", "sub": "ESM(Enterprise Security Management) 개요"}, {"t": "c", "term": "주요 기능", "def": "보안 이벤트 수집·가공(정규화·필터링·축약), 통합 관리(단일/이종 장비 연계 분석, 실시간 모니터링), 침해 경보(수준별 가시·가청·메일·메시징 경보), 침해 대응(자동/수동 대응, 증적·로그 보관).", "sub": "ESM(Enterprise Security Management) 개요"}, {"t": "c", "term": "ESM의 구성", "def": "이벤트 수집 에이전트, 매니저, 관리 콘솔로 구성.", "sub": ""}, {"t": "c", "term": "ESM 에이전트", "def": "보안·시스템·네트워크 장비에 탑재되어 정의된 규칙에 따라 이벤트를 수집·전달하거나 보안 정책을 반영.", "sub": "ESM의 구성"}, {"t": "c", "term": "ESM 매니저", "def": "정의된 규칙으로 이벤트 데이터를 분석·저장하고 정제된 이벤트를 콘솔로 전달.", "sub": "ESM의 구성"}, {"t": "c", "term": "ESM 콘솔", "def": "전달된 자료를 시각화하여 운영자 판단을 지원하고, 침해 발생 시 경보 발령 및 자동/수동 대응 지원.", "sub": "ESM의 구성"}, {"t": "c", "term": "보안관제의 정의", "def": "외부 위협의 침입 가능 경로를 모니터링하고 이벤트를 감지하여 침해사고를 예방하는 활동.", "sub": "ESM 기반의 보안관제 업무"}, {"t": "c", "term": "보안관제의 주요 역할", "def": "보안시스템 통합 관리, 일관성 있는 정책 구현, 신속한 대응 처리(24×365 실시간 감시).", "sub": "ESM 기반의 보안관제 업무"}, {"t": "c", "term": "보안관제의 단계별 활동", "def": "예방 단계(보안 취약점 패치, 취약점 점검, 정책 관리) → 탐지 단계(모니터링, NMS·Alert, 시스템 장애·관리적 이벤트) → 대응 단계(웜·바이러스, 스캐닝, 침해사고, 기타 사고 대응).", "sub": "ESM 기반의 보안관제 업무"}]}, {"title": "네트워크 장비 보안 관리", "items": [{"t": "c", "term": "필요성", "def": "스위치·라우터·VPN·방화벽 등 네트워크 장비도 O/S를 운영하므로 서버처럼 보안 관리가 필요.", "sub": ""}, {"t": "c", "term": "네트워크 계정 관리", "def": "관리 콘솔 접속 시 기본 패스워드 변경, 패스워드 암호화 적용, 계정별 권한 수준 설정 점검.", "sub": ""}, {"t": "c", "term": "네트워크 접근 관리", "def": "원격 접속(VTY) 시 ACL로 허용 IP 통제, 접속 타임아웃 설정, 불필요한 보조(AUX) 포트 비활성화, 로그온 경고 메시지 출력 점검.", "sub": ""}]}, {"title": "라우터·스위치 보안 설정", "items": [{"t": "c", "term": "불필요한 서비스·프로토콜 비활성화", "def": "라우터·스위치에서 ICMP, finger, http, CDP, bootp, dns 등 불필요한 서비스와 프로토콜을 비활성화하는 보안 설정.", "sub": ""}, {"t": "c", "term": "NTP 시간 동기화", "def": "정확한 로그 분석을 위해 시간 동기화 서버(NTP)를 통해 주기적으로 장비 시간이 동기화되도록 하는 설정.", "sub": ""}, {"t": "c", "term": "Ingress 필터링", "def": "사용하지 않는 대역에서 인입되는 IP 대역을 차단하는 필터링 설정.", "sub": ""}, {"t": "c", "term": "Egress 필터링", "def": "라우터 내부에서 외부로 나가는 패킷의 소스 IP가 라우터 내부 IP인 것만 허용하도록 하는 필터링 설정.", "sub": ""}, {"t": "c", "term": "NAT(Network Address Translation)", "def": "영역 분리 방화벽 등에서 공인 IP 주소와 사설 IP 주소 간의 주소를 변환하는 기능.", "sub": ""}]}]}, {"title": "2-2. NW보안 테스트", "groups": [{"title": "테스트 개요", "items": [{"t": "c", "term": "테스트 계획", "def": "요구사항 수집·계획 수립·계획서 작성, 항목별 테스트 케이스 작성 및 테스트 데이터 확보.", "sub": "테스트의 일반적인 절차"}, {"t": "c", "term": "테스트 수행", "def": "테스트 환경 구축·실행·측정, 결과 분석으로 결함 도출 및 테스트 결과서 작성·보고.", "sub": "테스트의 일반적인 절차"}, {"t": "c", "term": "결함 관리", "def": "결함 조치 방법·일정이 포함된 계획 수립(핵심 결함과 그 외 결함 구분), 결함 수정 후 재테스트 및 이행 관리.", "sub": "테스트의 일반적인 절차"}, {"t": "c", "term": "테스트 계획 수립 단계의 세부 업무", "def": "테스트 범위 정의, 착수·완료 기준 정의, 테스트 환경 및 소요 자원 정의, 일정 정의, 기타 사항(고려 사항·위험 요소·결함 관리 방안) 정의, 테스트 계획서 작성·검토·승인.", "sub": "테스트의 일반적인 절차"}]}, {"title": "테스트 유형 및 점검 기준", "items": [{"t": "c", "term": "단위 테스트", "def": "단위 모듈 또는 네트워크 단일 노드 내 기능이 요구사항에 부합하는지 테스트(인터페이스·자료 구조·수행 경로·오류 처리·경계 테스트).", "sub": ""}, {"t": "c", "term": "통합 테스트", "def": "단위 테스트 기반으로 모듈 간·노드 간 연계 기능을 테스트.", "sub": ""}, {"t": "c", "term": "하향식 테스트", "def": "최상위 모듈부터 하위로 통합(깊이 우선/넓이 우선 가능).", "sub": ""}, {"t": "c", "term": "상향식 테스트", "def": "최하위 모듈부터 상위로 통합.", "sub": ""}, {"t": "c", "term": "혼합식 테스트", "def": "하향식·상향식을 절충, 중요 모듈 중심으로 통합.", "sub": ""}, {"t": "c", "term": "비점진적 테스트", "def": "모든 모듈을 한꺼번에 통합하여 테스트.", "sub": ""}, {"t": "c", "term": "시스템 테스트", "def": "통합 테스트 기반으로 실제 인프라에서 기능 검증 및 비기능(처리 속도·안정성) 요구사항 검증. 검증 항목 — 기능성·신뢰성·사용성·효율성·유지보수성·이식성.", "sub": ""}, {"t": "c", "term": "사용자 인수 테스트", "def": "구현 기능이 최종 사용자의 업무 완결성 관점에서 요구사항에 부합하는지 테스트.", "sub": ""}, {"t": "c", "term": "알파 테스트", "def": "사용자 테스트를 개발자 환경에서 통제된 상태로 수행.", "sub": ""}, {"t": "c", "term": "베타 테스트", "def": "개발자가 참여하지 않고 일정 수의 시범 사용자가 수행.", "sub": ""}]}]}]}], "count": 150}, {"id": "02", "title": "시스템 보안 구축", "notes": ["학습모듈 목표: 시스템 보안요구사항을 정의하고 안전한 정보시스템을 설계·구현·검증할 수 있다."], "units": [{"title": "학습 1. 시스템 보안 설계하기", "sections": [{"title": "1-1. 시스템 보안요구사항 정의", "groups": [{"title": "시스템 보안 개념", "items": [{"t": "c", "term": "시스템 보안의 정의", "def": "시스템 구성 요소·자원의 기밀성·무결성·가용성을 보장하기 위해 취해지는 활동. 외부 피해(해커·바이러스·자연재해)와 내부 피해(불만·부정직·해고당한 종업원)로부터 조직의 컴퓨터 시스템·데이터베이스·네트워크 등 정보 자원을 보호하는 방법.", "sub": ""}]}, {"title": "시스템 보안 범위", "items": [{"t": "c", "term": "시스템 보안 범위", "def": "시스템 보안은 주로 계정·패스워드 관리, 세션 관리, 접근제어, 권한 관리, 로그 관리 및 취약점 관리, DBMS 관리 등을 포함한다.", "sub": ""}, {"t": "c", "term": "계정", "def": "적절한 권한을 가진 사용자를 식별하기 위한 가장 기본적인 인증 수단. 계정(account)이란 한 사용자에게 소유되는 모든 파일·자원·정보를 말함. 계정과 패스워드 관리가 보안의 시작.", "sub": ""}, {"t": "c", "term": "패스워드의 정의", "def": "허가 없이 DB·파일에 접속하는 것을 방지하기 위한 안전 대책으로, 사용자 ID와 함께 입력하여 정당한 사용자임을 식별하도록 주컴퓨터에 전달하는 고유의 문자열.", "sub": "패스워드"}, {"t": "c", "term": "패스워드의 기능", "def": "온라인 정보 서비스는 패스워드가 없으면 이용 불가. 주컴퓨터가 입력된 ID·패스워드를 등록된 것과 대조하여 일치 시 접속 허용.", "sub": "패스워드"}, {"t": "c", "term": "세션의 개념", "def": "망 환경에서 사용자/컴퓨터 간 대화를 위한 논리적 연결, 또는 프로세스 간 통신 시 메시지 교환으로 서로를 인식한 이후부터 통신을 마칠 때까지의 기간.", "sub": "세션 관리"}, {"t": "c", "term": "세션 관리의 개념", "def": "활성화된 접속에 대한 관리로, 일정 시간 경과 시 세션을 종료하고 비인가자의 세션 가로채기를 통제.", "sub": "세션 관리"}, {"t": "c", "term": "접근의 개념", "def": "데이터가 있는 곳을 알아내어 가져오는 것, 또는 사용자가 시스템·프로그램을 이용하기 위해 최초로 접속을 시도하는 것.", "sub": "접근제어"}, {"t": "c", "term": "접근제어의 개념", "def": "시스템이 다른 시스템으로부터 적절히 보호되고 꼭 필요한 사람에 의해서만 필요한 서비스를 제공하도록 전체 시스템 차원에서 접근을 통제하는 것.", "sub": "접근제어"}, {"t": "c", "term": "권한의 개념", "def": "직책 수행에 필요한 결정권 등을 합한 것. 조직 내 위치로 인해 갖는 공식적인 힘이며 합법성이 강조됨. 한 개인·집단을 지배할 수 있는 권리(right).", "sub": "권한 관리"}, {"t": "c", "term": "권한 관리의 개념", "def": "각 사용자가 적절한 권한으로 적절한 정보 자산에 접근하도록 통제하는 것.", "sub": "권한 관리"}, {"t": "c", "term": "로그의 개념", "def": "데이터를 기록한 것 또는 데이터의 인쇄된 기록.", "sub": "로그 관리"}, {"t": "c", "term": "로그 관리의 목적", "def": "시스템 내부·외부에서 시스템에 영향을 미칠 경우 해당 사항을 기록하여 문제 해결·예방 활동에 활용.", "sub": "로그 관리"}, {"t": "c", "term": "취약점 개념", "def": "공격자가 시스템의 정보 보안을 낮추는 데 사용되는 약점. 시스템 민감성·결함, 결함에 대한 접근, 결함에 대한 공격 가능성을 의미.", "sub": "취약점 관리"}, {"t": "c", "term": "취약점 관리의 개념", "def": "취약점을 확인·분류·치료·완화하는 주기적인 과정.", "sub": "취약점 관리"}, {"t": "c", "term": "취약점 관리의 목적", "def": "계정·접근제어 등이 잘 갖춰져도 시스템 자체의 결함으로 보안 문제가 발생할 수 있으며, 이런 결함을 체계적으로 관리하는 것.", "sub": "취약점 관리"}, {"t": "c", "term": "DBMS 개념", "def": "기업·조직이 보유하는 데이터베이스를 저장·관리하는 시스템(Data Base Management System). 전사적 자원·서비스 데이터를 포함하므로 보안이 중요.", "sub": "DBMS 관리"}, {"t": "c", "term": "DBMS 관리의 목적", "def": "DBMS 계정 관리, DB 접근 권한, DB 암호화, DB 백업 등을 관리.", "sub": "DBMS 관리"}]}]}, {"title": "1-2. 시스템 보안 설계", "groups": [{"title": "시스템 보안 설계의 개념", "items": [{"t": "c", "term": "시스템 보안 설계 개념", "def": "악성코드·개인정보 유출·중요 정보 노출·비밀 데이터 손실 등의 비즈니스 문제를 방지·해결하기 위해 안전한 정보시스템 환경을 구축하고자 관리적·기술적·물리적 보안 차원에서 보안 구축 계획을 수립하고 보안 설계서를 작성하는 것.", "sub": ""}, {"t": "c", "term": "시스템 보안 설계 대상", "def": "계정 관리, 패스워드 관리, 세션 관리, 접근 통제, 권한 관리, 취약점 관리(각 개념은 1-1과 동일).", "sub": ""}, {"t": "c", "term": "원칙 1", "def": "자원에 적용되는 보안 수준은 조직에 주는 가치에 비추어 적절해야 하며, 보안 비용은 그 혜택에 비추어 합리적이어야 한다.", "sub": "시스템 보안 설계 원칙"}, {"t": "c", "term": "원칙 2", "def": "보안 아키텍처는 변화하는 보안 필요·요구사항을 수용하고, 보호 레벨 변화 시에도 기본 아키텍처 수정 없이 지원하며, 미래 확장을 수용할 만큼 확장성이 있어야 한다.", "sub": "시스템 보안 설계 원칙"}, {"t": "c", "term": "원칙 3", "def": "조직이 안전한 업무를 전자적으로 수행하도록 통합된 보안 서비스를 제공해야 한다.", "sub": "시스템 보안 설계 원칙"}, {"t": "c", "term": "원칙 4", "def": "모든 컴퓨터 플랫폼에 걸쳐 일관성 있는 프레임워크를 제공해야 한다.", "sub": "시스템 보안 설계 원칙"}]}, {"title": "정보시스템 보안 계층", "items": [{"t": "c", "term": "Client", "def": "사용자 단말(단말기, PC 등)에 대한 보안 설정 및 적용 기술.", "sub": ""}, {"t": "c", "term": "Network", "def": "네트워크 시스템(라우터, 브릿지, 스위치, 보안 장치 등) 및 네트워크 보안 솔루션에 대한 보안 설정 및 적용 기술.", "sub": ""}, {"t": "c", "term": "Server", "def": "서버 시스템의 보안 설정 및 적용 기술.", "sub": ""}, {"t": "c", "term": "Application", "def": "업무 관련 애플리케이션에 대한 보안 설정 및 적용 기술.", "sub": ""}, {"t": "c", "term": "Data(DB)", "def": "저장 정보(주요 정보)에 대한 보안 설정 및 적용 기술.", "sub": ""}]}, {"title": "정보보호 기술 영역", "items": [{"t": "c", "term": "인증(기술 영역)", "def": "정보 자산에 접근하고자 하는 사용자와 장비에 대한 접근 중요도에 따라 차별화된 인증 방안을 적용하는 영역.", "sub": ""}, {"t": "c", "term": "접근 통제(기술 영역)", "def": "사용자 및 장비의 접근 필요성에 따라 정보 자산에 대한 접근권한을 부여함으로써 비인가자의 무단 접근을 제한하는 영역.", "sub": ""}, {"t": "c", "term": "암호화(기술 영역)", "def": "개인정보·인증정보 등 기밀성을 요구하는 정보를 변조·삭제·오남용 등으로부터 보호하기 위하여 전송 및 저장 시 암호화를 적용하는 영역.", "sub": ""}, {"t": "c", "term": "로깅 감사(기술 영역)", "def": "사용자 및 장비의 정보 자산에 대한 접근·처리 내역을 보존하여 감사 추적성 및 모니터링 증적을 확보하는 영역.", "sub": ""}, {"t": "c", "term": "프라이버시(기술 영역)", "def": "개인정보의 유출 및 오남용 방지를 위해 주요 경로에 대한 보호 대책을 적용하는 영역.", "sub": ""}, {"t": "c", "term": "침해사고 예방 및 대응(기술 영역)", "def": "네트워크·시스템·데이터의 보안을 위협하는 침입 행위를 탐지·차단·예방하기 위한 방안을 적용하는 영역.", "sub": ""}]}]}, {"title": "1-3. 시스템 보안 구현 준비", "groups": [{"title": "시스템 보안 구현을 위한 환경 개요", "items": [{"t": "c", "term": "시스템 보안 구현 환경 정의", "def": "기밀성·무결성·가용성이 보장된 안전하고 신뢰성 있는 시스템 보안을 구현하기 위한 조건·장소·여건. 관리적·기술적·물리적 차원으로 구분.", "sub": ""}, {"t": "c", "term": "관리적 보안 구현 환경", "def": "시스템 보안 정책, 보안 규정 및 절차서, 보안 조직 및 인원 등.", "sub": ""}, {"t": "c", "term": "기술적 보안 구현 환경", "def": "시스템 보안 솔루션 및 패키지 등.", "sub": ""}, {"t": "c", "term": "물리적 보안 구현 환경", "def": "IDC, 보안 통제 공간, 잠금장치, 출입 통제 장비 등.", "sub": ""}]}, {"title": "시스템 보안 구현 계획 개요", "items": [{"t": "c", "term": "시스템 보안 구현 계획 정의", "def": "보안 설계 내용대로 현장에서 구현하기 위한 세부 범위·일정·장소·인원·도구·매뉴얼 및 절차서를 포함하여 실행 방안을 구체화하는 작업.", "sub": ""}, {"t": "c", "term": "포함될 사항", "def": "범위(추진 범위·세부 업무), 일정(월간·주간·일 단위), 장소(설계·구현·테스트 장소), 인원(범위·일정별 작업자), 기타 준비 사항(매뉴얼·절차서·도구).", "sub": ""}]}, {"title": "시스템 보안 구현 도구", "items": [{"t": "c", "term": "도구 정의", "def": "어떤 일을 할 때 쓰는 연장·수단·방법. 시스템 보안 구현 도구는 시스템의 기밀성·무결성·가용성을 보장하고 취약점으로부터 노출되지 않도록 구현하기 위해 필요한 수단·방법.", "sub": ""}, {"t": "c", "term": "MBSA(Microsoft Baseline Security Analyzer)", "def": "Windows 시스템에서 틀리기 쉬운 보안 관련 설정을 간단히 확인하는 도구.", "sub": ""}, {"t": "c", "term": "Nmap", "def": "서버 관리자가 자체 시스템 스캔을 통해 자신이 모르는 사이에 다른 포트가 열려 있는지 등을 확인하는 도구.", "sub": ""}, {"t": "c", "term": "OWASP ZAP", "def": "OWASP에서 제공하는 웹 취약점 점검 도구로 OWASP Top10 주요 웹 취약점을 점검.", "sub": ""}]}, {"title": "시스템 보안 구현 준비 보강 개념", "items": [{"t": "c", "term": "IDC(Internet Data Center)", "def": "시스템 보안 구현을 위해 확보하는 안전하고 신뢰성 있는 물리적 장소로, 통상 IDC 혹은 별도 통제된 전산실 등의 공간을 확보한다.", "sub": ""}, {"t": "c", "term": "WBS(Work Breakdown Structure)", "def": "시스템 보안 구현의 추진 목표와 구현 범위에 따라 작성하는 세부적인 업무 수행 내역.", "sub": ""}]}]}]}, {"title": "학습 2. 시스템 보안 구현하기", "sections": [{"title": "2-1. 시스템 보안 구현", "groups": [{"title": "시스템 보안 구현", "items": [{"t": "c", "term": "시스템 보안 구현 개념", "def": "안전하고 신뢰성 있는 하드웨어·소프트웨어로 구성된 시스템 보안이 작동하도록 서버·소프트웨어 구성을 변경하거나 각종 파라미터를 설정하는 것.", "sub": ""}, {"t": "c", "term": "시스템 보안 구현 범위", "def": "하드웨어 서버·소프트웨어의 계정 관리, 패스워드 관리, 접속 관리, 세션 관리, 권한 관리, 로그 관리, 취약점 관리 등.", "sub": ""}]}, {"title": "시스템 인증", "items": [{"t": "c", "term": "시스템 인증 개념", "def": "참이라는 근거가 있는 무언가를 확인·확증하는 행위. 컴퓨터 시스템 보안에서 인증은 로그인 요청 등으로 통신상에서 보내는 사람의 디지털 정체성을 확인하는 과정.", "sub": ""}, {"t": "n", "text": "시스템 인증의 4가지 방법 :"}, {"t": "c", "term": "알고 있는 것(Something You Know)", "def": "머릿속에 기억하는 정보로 인증(예: 패스워드).", "sub": ""}, {"t": "c", "term": "가지고 있는 것(Something You Have)", "def": "신분증·OTP 장치 등으로 인증(예: 출입카드).", "sub": ""}, {"t": "c", "term": "스스로의 모습(Something You Are)", "def": "홍채·지문 등 생체 정보로 인증.", "sub": ""}, {"t": "c", "term": "위치하는 곳(Somewhere You Are)", "def": "접속 위치의 적절성 확인(예: 콜백, GPS).", "sub": ""}]}, {"title": "접근 통제 정책 종류", "items": [{"t": "c", "term": "임의적 접근 통제 정책(DAC)", "def": "객체에 접근하려는 주체의 접근권한에 따라 접근을 통제. 사용자가 권한을 임의로 추가·철회 가능, 데이터 소유자가 신분에 따라 임의 제어. ACL을 사용한 신원·사용자 기반 통제.", "sub": ""}, {"t": "c", "term": "강제적 접근 통제 정책(MAC)", "def": "객체에 포함된 정보의 비밀성과 그에 대한 주체의 권한에 근거하여 접근을 제한. 최상위 보안등급자도 모든 자료 열람 불가. 보안등급·규칙·관리 기반 통제.", "sub": ""}, {"t": "c", "term": "역할 기반 접근 통제 정책(RBAC)", "def": "임의적 접근 통제의 단점을 보완(비임의적 접근 통제). 사용자에게 최소 권한을 부여해 남용을 방지하고, 직무에 따라 허가를 결정하여 직원 변경이 잦은 구조에 유리.", "sub": ""}, {"t": "c", "term": "접근 통제 행렬", "def": "주체를 열, 객체를 행에 표시하여 권한을 부여. 주체·객체가 커지면 행렬 유지가 어려움.", "sub": ""}, {"t": "c", "term": "접근제어(AC)", "def": "사용자에 따라 공유 데이터 접근 권한을 제한. 접근 허용을 결정하는 인증과, 사용자 행위를 강제 제약하는 인가가 있음.", "sub": ""}]}, {"title": "계정 관리 구현", "items": [{"t": "c", "term": "루트(root) 계정", "def": "컴퓨터에서 전체적으로 자원을 관리할 수 있는 총괄 권한을 가진 유일한 특별계정. 원격에서 루트 계정에 직접 로그인을 허용하면 불법 침입자가 로그인하여 시스템 보안이 침해될 수 있으므로 원격 접속을 제한할 필요가 있다.", "sub": ""}, {"t": "c", "term": "SSH(Secure SHell)", "def": "보안을 위해 서버 OS가 기본적으로 Telnet 접속을 허용하지 않으므로 사용하는 안전한 원격 접속 방식. 루트 계정 원격 접속 제한을 위해 sshd_config 파일의 PermitRootLogin 파라미터를 no로 설정한다.", "sub": ""}, {"t": "c", "term": "불필요한 계정 제거", "def": "운영체제(OS)나 패키지 설치 시 기본 생성되는 default 계정은 대부분 default 패스워드를 사용해 패스워드 추측 공격에 악용될 수 있으므로, 이용하지 않는 default 계정 및 의심스러운 특이한 계정의 존재 유무를 확인한 후 삭제하는 것.", "sub": ""}, {"t": "c", "term": "관리자 그룹 최소 계정 등록", "def": "루트(root) 계정이 속한 그룹은 시스템 운영 파일에 대한 접근권한이 부여되어 있으므로 최소한의 계정만 등록되어 있어야 하며, 등록된 불필요한 계정을 삭제하는 것.", "sub": ""}]}, {"title": "패스워드 관리 구현", "items": [{"t": "c", "term": "셰도 패스워드(shadow password)", "def": "/etc/passwd 파일은 누구나 읽기가 가능해 일방향 암호화된 패스워드 정보가 노출될 수 있으므로, 패스워드를 특정 장소에 암호화하여 저장해 보호하는 기술.", "sub": ""}, {"t": "c", "term": "DES 일방향 암호화", "def": "사용자 계정 패스워드를 일방향 암호화(DES)하여 /etc/passwd 파일에 계정 정보와 함께 저장하는 방식. DES 알고리즘은 보안성이 약해 평문으로 해독될 수 있는 취약점이 있다.", "sub": ""}, {"t": "c", "term": "패스워드 무작위 대입 공격(Brute Force Attack)", "def": "외부 침입자가 가능한 패스워드를 무작위로 대입하여 패스워드를 알아내려는 공격. 패스워드 입력 실패 횟수 제한, 최소 길이 설정 등으로 대비한다.", "sub": ""}, {"t": "c", "term": "패스워드 추측 공격(Password Guessing)", "def": "외부 침입자가 패스워드를 추측하여 알아내려는 공격. 패스워드 입력 실패 횟수 제한, 최소 길이 설정 등으로 대비한다.", "sub": ""}, {"t": "c", "term": "계정 잠금 임계값", "def": "패스워드 입력 실패 횟수를 적정하게 제한하여 일정 횟수를 초과하면 계정을 잠금으로써 패스워드 유출 위험을 줄이는 설정.", "sub": ""}, {"t": "c", "term": "패스워드 최대 사용 기간", "def": "악의적인 사용자로부터 계속적인 접속을 차단하기 위해 패스워드의 최대 사용 기간을 설정하여 주기적으로 패스워드를 변경하도록 하는 설정.", "sub": ""}, {"t": "c", "term": "패스워드 최소 사용 기간", "def": "최소 사용 기간을 설정하지 않으면 사용자가 익숙한 패스워드로 변경·재사용하여 정기적 변경이 무의미해질 수 있으므로, 이를 방지하기 위해 설정하는 패스워드 변경 후 최소 유지 기간.", "sub": ""}]}, {"title": "파일시스템 접근제어·권한 구현", "items": [{"t": "c", "term": "세션 유지 시간(timeout)", "def": "계정이 접속된 상태로 방치되면 권한 없는 사용자에게 중요 시스템이 노출될 수 있으므로, 일정 시간 이후 어떠한 이벤트도 발생하지 않으면 연결을 종료하도록 설정하는 값.", "sub": ""}, {"t": "c", "term": "NFS(Network File System)", "def": "서버의 로컬디스크 영역을 네트워크로 공유하는 서비스로, 파일 공유를 통한 보안 위험이 존재하므로 사용하지 않는 것이 보안에 안전하다.", "sub": ""}, {"t": "c", "term": "Apache 상위 디렉터리 접근 금지", "def": "상위 경로로 이동이 가능하면 하위 경로에서 상위 경로로 이동해 해킹당할 위험이 있고 유니코드 버그(Unicode Bug) 및 서비스 거부 공격에 취약해질 수 있으므로, 상위 경로 이동 문자 사용을 제한하고 디렉터리 내 파일 호출 시 사용자 인증을 수행하도록 설정하는 것.", "sub": ""}, {"t": "c", "term": "/etc/passwd 파일", "def": "사용자의 ID, 패스워드, UID, GID, 홈 디렉터리, 셸 정보를 담고 있는 중요 파일. 관리자 이외 사용자가 접근 시 루트(root) 권한 획득이 불가능하도록 접근을 제한해야 한다.", "sub": ""}, {"t": "c", "term": "/etc/shadow 파일", "def": "시스템에 등록된 모든 계정의 패스워드를 암호화된 형태로 저장·관리하는 중요한 파일. ID 및 패스워드 정보가 외부로 노출되지 않도록 루트(root) 계정을 제외한 모든 사용자의 접근을 제한해야 한다.", "sub": ""}, {"t": "c", "term": "/etc/services 파일", "def": "서비스 관리를 위해 사용되는 파일. 일반 사용자가 접근·변경하면 정상 서비스를 제한하거나 허용되지 않은 서비스를 악의적으로 실행시켜 침해사고를 발생시킬 수 있다.", "sub": ""}, {"t": "c", "term": "Cron", "def": "cron.allow 파일과 cron.deny 파일을 통해 명령어 사용자를 제한할 수 있는 시스템. 접근제한 파일의 권한이 잘못되면 권한 획득자가 임의 계정을 등록해 불법 예약 파일 실행으로 시스템 피해를 일으킬 수 있다.", "sub": ""}]}, {"title": "DBMS 보안 관리 구현", "items": [{"t": "c", "term": "DBMS 보안 관리", "def": "기업·조직의 중요 데이터를 저장·관리하는 DBMS에 대해 계정 관리, 접근 관리를 수행하고 DBMS 벤더가 제공하는 최신 보안 패치를 적용하는 것.", "sub": ""}, {"t": "c", "term": "DBMS 디폴트(Default) 계정 관리", "def": "DBMS 설치 시 기본 생성되는 디폴트 계정을 변경하지 않고 사용하면 공격자가 기본 계정 정보로 침투해 데이터를 탈취·위변조할 수 있으므로, 기본 생성 계정의 패스워드 및 권한을 변경하는 것.", "sub": ""}, {"t": "c", "term": "DBMS 원격 접속 제한", "def": "DBMS가 외부 인터넷망에서 직접 접속되면 중요 데이터가 탈취·위변조될 위협이 있으므로, 외부에서 접속할 수 없는 내부 네트워크에 설치하고 주요 관리자 계정은 원격 접속을 허용하지 않으며 응용시스템 접속 계정은 IP 필터링 등으로 통제하는 것.", "sub": ""}, {"t": "c", "term": "응용시스템(WEB, WAS) 접속 계정 최소 권한", "def": "웹 응용시스템에서 DBMS를 사용하는 계정에 DBA 등 과도한 권한이 설정되면 웹서버를 통해 DBMS로 침투당할 수 있으므로, 데이터 삽입·삭제·업데이트 등 최소한의 권한만 설정하는 것.", "sub": ""}]}, {"title": "웹 취약점", "items": [{"t": "c", "term": "웹 취약점", "def": "웹서비스를 이용하여 서버 내 중요 자원 탈취, 변조, 명령어 실행 등의 공격에 이용될 수 있는 보안 취약점.", "sub": ""}, {"t": "c", "term": "운영체제 명령어 삽입", "def": "URL의 파라미터 등 사용자 입력값에 의해 시스템 명령어를 삽입해 요청하는 경우 적절한 검증이 없으면 서버 내 명령어로 실행되는 취약점.", "sub": ""}, {"t": "c", "term": "SQL 인젝션", "def": "URL 및 사용자 입력값에서 적절한 검증이 없을 경우 SQL문 구성에 사용되어 공격자가 의도한 SQL문으로 실행되는 취약점.", "sub": ""}, {"t": "c", "term": "크로스 사이트 스크립트(XSS)", "def": "홈페이지 게시판, 이메일 등으로 악성 스크립트를 전파해 사용자 브라우저에서 악성 스크립트가 강제 실행되는 취약점.", "sub": ""}, {"t": "c", "term": "불충분한 인증 및 인가", "def": "사용자 인증 및 접근제어가 미흡하여 비인가자 접근, 허용되지 않은 불법 접근 등을 할 수 있는 취약점.", "sub": ""}, {"t": "c", "term": "취약한 패스워드 복구", "def": "취약한 비밀번호 설정으로 비밀번호 복구 기술에 의해 비밀번호를 탈취·변경할 수 있는 취약점.", "sub": ""}, {"t": "c", "term": "파일 업로드", "def": "악의적인 스크립트가 포함된 파일을 업로드하여 서버에서 실행해 중요 정보를 탈취할 수 있는 취약점.", "sub": ""}, {"t": "c", "term": "데이터 평문 전송", "def": "서버와 사용자 브라우저 간의 구간 암호화가 되지 않은 상태로 통신 시 주요 정보 등이 평문으로 노출되는 취약점.", "sub": ""}, {"t": "c", "term": "URL 파라미터 변조", "def": "인증 및 사용자 검증을 거치지 않고 파라미터 조작을 통해 게시물 조작이나 주요 정보 탈취가 가능한 취약점.", "sub": ""}]}]}, {"title": "2-2. 시스템 보안 구현 검증", "groups": [{"title": "테스트 개념", "items": [{"t": "c", "term": "테스트 정의", "def": "소프트웨어 제품·서비스의 품질에 대한 정보를 이해관계자에게 제공하기 위해 수행된 평가.", "sub": ""}, {"t": "c", "term": "테스트 목적", "def": "소프트웨어 결함을 탐지·수정하는 것. 모든 조건에서 정상 작동함을 입증할 수는 없고 특정 조건에서 작동하지 않는 경우를 발견. 요구사항 충족·정확한 응답·수용 가능 시간·사용성·설치 실행·기대 결과 달성 여부를 평가.", "sub": ""}, {"t": "c", "term": "테스트 범위", "def": "계정 관리, 패스워드 관리, 접속 관리, 권한 관리, 로깅 관리, 취약점 관리 등.", "sub": ""}]}, {"title": "결함 관리", "items": [{"t": "c", "term": "결함의 개념", "def": "소프트웨어가 바르게 동작하지 않는 원인이 되는 프로그램상의 오류. 요구 명세·설계의 오류도 결함(버그)에 포함.", "sub": ""}, {"t": "c", "term": "결함 관리의 개념", "def": "결함 관리 활동으로 발생한 결함의 재발생을 막고 유사 결함 발견 시 처리 시간을 단축하기 위한 활동.", "sub": ""}, {"t": "c", "term": "결함 관리의 절차", "def": "에러 발견 → 에러 등록(결함 관리 대장) → 에러 분석(단순 에러/실제 결함) → 결함 확정 → 결함 할당(담당자 지정) → 결함 조치(수정) → 결함 조치 검토 및 승인(확인 테스트 후 조치 완료).", "sub": ""}]}, {"title": "시스템 보안 테스트 개요", "items": [{"t": "c", "term": "시스템 보안 테스트 개념", "def": "시스템을 유지하는 데이터·구조를 보호하고 사용자가 원하는 대로 기능이 유지되는지 확인하는 것.", "sub": ""}, {"t": "c", "term": "시스템 보안 테스트 대상", "def": "계정·패스워드 관리, 세션 관리, 접근제어, 권한 관리, 로그 관리, 취약점 관리 (각 개념은 1-1과 동일).", "sub": ""}]}, {"title": "결함 결과 관리", "items": [{"t": "c", "term": "결함의 분야별·심각도별 목록화", "def": "시스템 보안 테스트 결과 발견된 결함을 계정·패스워드·세션·접근제어·권한·로그·취약점 관리 등 분야별로, 심각도에 따라 상·중·하로 구분하여 취합 정리하는 것.", "sub": ""}, {"t": "c", "term": "시스템 보안 결함 관리 대장", "def": "테스트 결과 발견된 결함을 관리 번호, 결함 내역, 분야, 결함 발견자, 결함 해결 담당자, 결함 원인, 결함 해결 완료일, 비고 등으로 구분하여 작성·기록하는 문서.", "sub": ""}]}]}]}], "count": 100}, {"id": "03", "title": "SW개발 보안 구축", "notes": ["학습모듈 목표: 정의된 보안요구사항에 따라 응용프로그램 보안요구사항을 명세·설계하고, 보안약점이 제거된 SW를 구현·테스트할 수 있다."], "units": [{"title": "학습 1. SW개발 보안 설계하기", "sections": [{"title": "1-1. SW개발 보안요구사항 명세와 설계", "groups": [{"title": "SW개발 보안의 개요", "items": [{"t": "c", "term": "SW개발 보안의 개요", "def": "SW개발 보안은 사이버 보안 공격 위협에 대응하도록 SW개발 단계부터 보안약점을 제거하여 안전한 SW를 구축하는 활동. 해킹 등 사이버공격의 원인인 보안 취약점을 개발 단계에서 미리 제거하고, SDLC 단계별로 보안 업무를 수행해 안전한 SW를 개발·운영하기 위한 개발 방법.", "sub": ""}, {"t": "c", "term": "SW개발 보안의 3요소", "def": "정보 보안 3요소인 기밀성(confidentiality)·무결성(integrity)·가용성(availability)을 지키고, 서버 취약점을 사전에 방지하여 외부·내부 위협으로부터 위험을 최소화하는 구축 방법.", "sub": ""}, {"t": "c", "term": "자산(Asset)", "def": "조직이 보유한 정보화 자산 및 데이터(서버·네트워크·소프트웨어·중요 데이터 등).", "sub": "보안의 위험 요소"}, {"t": "c", "term": "위협원(Threat agents)", "def": "자산에 피해를 줄 수 있는 내·외부 공격 위험 주체(비인가 직원·외부 해커·자연재해 등).", "sub": "보안의 위험 요소"}, {"t": "c", "term": "위협(Threat)", "def": "자산에 피해를 주는 위협원의 공격 행동(해킹·위변조·삭제·불법 유통 등).", "sub": "보안의 위험 요소"}, {"t": "c", "term": "취약점(Vulnerability)", "def": "위협이 발생할 수 있는 상황(Injection·웹 취약점·취약한 암호화·미사용 포트 오픈 등).", "sub": "보안의 위험 요소"}, {"t": "c", "term": "위험(Risk)", "def": "위협원이 취약점을 이용하여 자산에 위해를 입힐 수 있는 상황 예측.", "sub": "보안의 위험 요소"}, {"t": "c", "term": "보안약점(Weakness)", "def": "개발 단계에서 발생하는 보안 관련 오류(정적 오류). 공격에 활용될 여지가 있는 이론상 위험 요소. 분류 체계는 CWE(Common Weakness Enumeration).", "sub": "SW 보안약점과 취약점의 개념"}, {"t": "c", "term": "취약점(Vulnerability)", "def": "운영 단계에서 발생하는 보안 관련 오류(동적 오류). 실제로 공격 구현이 가능한 요소. 분류 체계는 CVE(Common Vulnerabilities and Exposures). 보안약점이 존재하면 취약점으로 발전할 가능성이 높음.", "sub": "SW 보안약점과 취약점의 개념"}]}, {"title": "SW개발 보안 방법론", "items": [{"t": "c", "term": "SW개발 보안 방법론", "def": "기존 SW개발 생명주기(SDLC)에서 안전한 SW 개발을 위해 단계별로 요구되는 보안 활동을 적용한 방법론.", "sub": ""}, {"t": "n", "text": "SDLC 단계별 보안 활동 :"}, {"t": "c", "term": "요구사항 분석", "def": "보안 요구 항목·시스템 보안 항목 식별, 개발 환경 보안 프레임워크·운영 보안 환경 분석 → 산출물: 보안요구사항 정의서, 보안적용계획서.", "sub": ""}, {"t": "c", "term": "설계", "def": "보안 요구 항목 구현 방안 설계, 보안 프레임워크 인증·인가 설정, 화면 설계 등 → 산출물: 보안적용계획서, 보안 프레임워크.", "sub": ""}, {"t": "c", "term": "구현", "def": "시큐어 코딩(secure coding), 소스코드 보안약점 진단·조치, 코드 리뷰 → 산출물: 보안약점 진단 결과서, 보안약점이 제거된 소스코드.", "sub": ""}, {"t": "c", "term": "테스트", "def": "오류 유발 테스트 케이스 기반 테스트, 공격 시나리오 테스트, 모의 침투 테스트 → 산출물: 테스트 결과서, 취약점 조치 결과서.", "sub": ""}, {"t": "c", "term": "운영 및 유지보수", "def": "지속적 보안 패치, 보안약점·취약점 진단 및 조치 → 산출물: 보안 패치 결과서, 진단·조치 결과서.", "sub": ""}]}, {"title": "SW개발 보안의 요구공학 프로세스", "items": [{"t": "c", "term": "SW개발 보안의 요구공학 프로세스", "def": "보안 요구공학은 크게 보안요구사항 개발과 보안요구사항 관리로 나뉜다.", "sub": ""}, {"t": "c", "term": "요구사항 도출", "def": "법·제도 준거성(Compliance), 내·외부 시스템 환경, 시스템 보안 요구사항을 식별·도출하고 이해관계자 협의로 수집·정제·분류(제안서·계약서·과업지시서·회의록 등 참조).", "sub": ""}, {"t": "c", "term": "요구사항 분석", "def": "분류된 요구사항을 토대로, 구현 난이도·비용·인력 등 효율성을 고려해 제약조건을 판별하고 필요 시 대안을 제시.", "sub": ""}, {"t": "c", "term": "요구사항 명세", "def": "분석서를 통해 요구사항 정의서 도출. SW 시스템의 목표 기술과 기능·비기능 요구사항을 명세.", "sub": ""}, {"t": "c", "term": "요구사항 확인과 검증", "def": "이해관계자·조직 성숙도·표준을 고려하여 문제 보고서를 작성하고 경영진 승인으로 확정. 구현 가능성·테스트 가능성·추적성을 검토.", "sub": ""}, {"t": "c", "term": "요구사항 관리", "def": "환경 변화·시간 흐름에 따라 보안요구사항이 변경될 수 있으므로 지속 관리·갱신. 정식 승인 후 변경, 보안요구사항 추적 매트릭스로 산출물·테스트 시나리오를 관리.", "sub": ""}, {"t": "n", "text": "의사소통 관리: 정형적·서면(복잡한 이해 상충 해결), 정형적·구두(즉석 피드백, 발표), 비정형적·서면(단순 정보 요청, 메모·이메일), 비정형적·구두(개인 상담, 회의)."}]}, {"title": "SW개발 보안의 설계", "items": [{"t": "c", "term": "SW개발 보안의 설계", "def": "운영·개발 애플리케이션이 조직 사업 방향에 맞는 보안 목적을 정의하고, 보안 위험 분석 및 전사 보안 계획을 작성하는 것.", "sub": ""}, {"t": "c", "term": "요구사항 반영", "def": "분석 단계 보안요구사항 분석서를 반영하여 감지하지 못하는 보안 위험·통제를 고려해 보안 설계서(기본·상세 설계)를 작성.", "sub": ""}, {"t": "c", "term": "요구사항 설계 반영", "def": "조직 표준(기술·비즈니스 요건) 적합성 확인, 실제 구현 가능성 판단, 보안요구사항을 설계에 적절히 반영.", "sub": ""}, {"t": "c", "term": "환경 설계 반영", "def": "외부 공격으로부터 개발/운영 환경 보호를 위한 네트워크 보안 구성, 개발/운영 네트워크 분리, DMZ 구간 접근·계정 관리 점검.", "sub": ""}, {"t": "c", "term": "보안적용계획서 활용", "def": "보안요구사항 명세서 기반으로 설계 단계 보안적용계획서를 작성해 아키텍처정의서·화면설계서·보안 프레임워크 설계에 활용.", "sub": ""}]}, {"title": "SW 설계 단계 보안 설계 기준", "items": [{"t": "c", "term": "입력데이터 검증 및 표현", "def": "사용자 입력데이터의 유효성(Validation) 검증 로직과 유효하지 않은 값에 대한 처리 방법을 설계하는 기준(DBMS 조회·XML 조회·LDAP 서비스 조회 및 결과 검증 등).", "sub": ""}, {"t": "c", "term": "보안 기능 설계 기준", "def": "사용자 인증, 접근 통제, 권한 관리, 비밀번호 등의 정책이 적정하게 반영되도록 설계하는 기준(인증 대상 및 방식, 인증 수행 제한, 비밀번호 관리 등).", "sub": ""}, {"t": "c", "term": "에러처리 설계 기준", "def": "에러·오류 상황을 부적절하거나 불충분하게 처리해 시스템 내 중요 정보 유출 등 보안약점이 발생하지 않도록 설계하는 기준(오류메시지 중요 정보 노출 등).", "sub": ""}, {"t": "c", "term": "세션 통제", "def": "다른 세션 간 데이터 공유 금지(세션 ID 노출 금지 등) 등 세션을 안전하게 관리할 수 있도록 설계하는 기준.", "sub": ""}]}, {"title": "SW개발 보안 적용 원칙과 범위", "items": [{"t": "c", "term": "소프트웨어 개발 보안 원칙", "def": "행정기관 등이 정보시스템 사업을 추진할 때 별표 3의 소프트웨어 보안약점이 없도록 SW를 개발 또는 변경해야 한다는 원칙(행정기관 및 공공기관 정보시스템 구축·운영 지침 제50조).", "sub": ""}, {"t": "c", "term": "신규 개발의 /트랩 도어 등의 코드 삽입을 방지하는 점검 항목.", "sub": ""}, {"t": "c", "term": "CI/CD 환경의 자동 보안약점 진단", "def": "형상관리 시스템이나 CI/CD(Continuous Integration·Continuous Delivery) 환경에서 소스코드를 반영(commit)할 때 자동으로 보안약점을 진단하는 방식.", "sub": ""}, {"t": "c", "term": "오탐 예외 처리(peer review)", "def": "룰셋 기반 정적 분석 도구의 오진단을 동료검토(peer review)로 분석해 오탐으로 판단되는 경우 예외 처리하는 활동.", "sub": ""}]}, {"title": "알려진 주요 취약점 정적 분석 점검 항목", "items": [{"t": "c", "term": "불안전한 직접적인 객체 참조", "def": "애플리케이션이 URL이나 폼(form) 파라미터로 파일·디렉터리·DB 기록·키 등 내부 이행 객체에 대한 참조를 안전하지 않은 방법으로 제공하는지 검토하는 항목.", "sub": ""}, {"t": "c", "term": "불안전한 암호 저장", "def": "클라이언트 애플릿·HTML 소스 등 공개 접근 가능한 정보에서 민감한 암호화 상세 정보(암호화 알고리즘·암호화 키 등)를 회수할 수 있는지 검토하는 항목.", "sub": ""}, {"t": "c", "term": "URL 접근 제한 실패", "def": "애플리케이션이 모호한 URL(obscurity)이나 위장술(obfuscation)을 기반으로 기능을 제한하는지 여부를 검토하는 항목.", "sub": ""}, {"t": "c", "term": "취약한 인증 및 세션 관리", "def": "인증 사용자의 ID를 추정할 수 있는 인증·세션 관리 침해 공격 리스크를 최소화하도록 인증 및 세션 관리를 올바르게 이행했는지 검토하는 항목.", "sub": ""}, {"t": "c", "term": "잘못된 보안 설정", "def": "시스템 데이터·기능에 비인가 접근으로 시스템 전체가 침해되는 공격을 방지하도록 애플리케이션이 적절히 설정되어 있는지 검토하는 항목.", "sub": ""}, {"t": "c", "term": "불충분한 전송 레이어 보호", "def": "네트워크를 통해 전송되는 데이터가 비인가 가로채기(interception) 및 Man-in-the-middle 공격을 방지할 수 있도록 안전한지 검토하는 항목.", "sub": ""}, {"t": "c", "term": "검증되지 않은 리디렉팅 및 포워드", "def": "사용자가 악성 웹사이트로 리디렉팅되는 것을 방지하도록 페이지 리디렉션·포워드를 검증하는 통제를 이행했는지 검토하는 항목.", "sub": ""}, {"t": "c", "term": "애플리케이션 로직 결함", "def": "의도한 애플리케이션 로직이 악용되어 워크플로우나 정보를 변환·우회·조작하는 결과를 가져올 수 있는지 검토하는 항목.", "sub": ""}, {"t": "c", "term": "인증 우회", "def": "애플리케이션을 악용해 보안 통제를 우회하여 내부 애플리케이션 기능에 직접 접근하는 공격을 허용할 수 있는지 검토하는 항목.", "sub": ""}, {"t": "c", "term": "권한 부여(Authorization) 우회", "def": "권한 부여 메커니즘을 악용해 악의적 사용자가 특권을 강화하여 기능이나 사용자의 민감한 데이터에 비인가 접근을 허용할 수 있는지 검토하는 항목.", "sub": ""}]}]}, {"title": "2-2. SW개발 보안 테스트와 결함 관리", "groups": [{"title": "SW개발 보안 테스트", "items": [{"t": "c", "term": "결함 등급의 영향도와 긴급도", "def": "보안 결함 등급 = 복구 우선순위 = 영향도(잠재적 손실의 영향) × 긴급도(해결 시간의 중요성).", "sub": ""}, {"t": "n", "text": "SW개발 보안 테스트의 종류 :"}, {"t": "c", "term": "정적 분석", "def": "SW를 실행하지 않고 소스코드 수준으로 보안약점 분석(개발 과정에서 사용). 초기 발견으로 수정 비용 절감, 단 통합·설계·구조 관점 약점 발견은 제한적.", "sub": ""}, {"t": "c", "term": "동적 분석", "def": "SW 실행 환경에서 보안약점 분석(시험 단계에서 사용). 소스코드 불필요, 정확도·커버리지 향상, 단 도구 사용자 수준에 영향, 구조 관점 약점 발견 불가.", "sub": ""}, {"t": "c", "term": "보안 테스트 일반 원칙", "def": "개발자와 운영자를 분리하여 공정하게 테스트. 계획서에 따른 실시, 적정성 판단, 결과의 신뢰성 확인, 결함 발견 시 피드백.", "sub": ""}]}, {"title": "SW개발 보안 테스트에 따른 결함관리", "items": [{"t": "c", "term": "SW개발 보안 테스트에 따른 결함관리", "def": "반복·지속 테스트 후 발생 결함을 제거·재발 방지하여 고품질 SW를 제공하는 활동.", "sub": ""}, {"t": "c", "term": "SW보안 결함의 개요", "def": "프로그램과 보안명세서의 차이·불일치, 기대 보안 품질과 실제 관찰 결과의 차이.", "sub": ""}, {"t": "c", "term": "SW보안 결함의 종류", "def": "SW보안 결함(정의 특성과 불일치한 모든 행위), 발견된 보안 결함(운영 전 발견), 잠재적 보안 결함(운영 환경에 전달됨), SW의 특이한 고장(잠재 결함이 운영 중 나타난 이상 징후 집합).", "sub": ""}, {"t": "c", "term": "SW보안 결함관리 프레임워크(절차)", "def": "관리계획(테스트·결함 추적·분류 정의) → 결함 기록 → 결함 검토(원인 파악) → 결함 수정(할당·수정) → 결함 재확인 → 상태 추적 모니터링 → 최종 분석·리포팅.", "sub": ""}, {"t": "c", "term": "단위 테스트 절차 및 산출물", "def": "보안 테스트 계획서 작성 → 범위 분석·분할 → 테스트 시나리오 작성 → 테스트 케이스 작성 → 테스트 수행(Defect Report) → 테스트 평가(정성·정량) → 결과 보고.", "sub": ""}]}, {"title": "보안 테스트 절차와 점검 도구", "items": [{"t": "c", "term": "보안 검증 테스팅(SVT, Security Verification Testing)", "def": "프로덕션 내 시스템이 조직의 보안 표준을 준수하는지 확인하기 위해 주기적으로 실시되는 형상 준수 테스트.", "sub": ""}, {"t": "c", "term": "정기 시스템 취약점 테스트", "def": "시스템이 프로덕션 환경으로 이전되기 전에 실시되는 보안 인수 테스트를 보완하는 테스트.", "sub": ""}, {"t": "c", "term": "소스코드 보안 취약성 점검 도구", "def": "버퍼오버플로우, 포인터와 배열, 함수 반환 주소, 포맷스트링 처리 등 잘 알려진 메모리 보안 취약점을 사전에 점검하는 도구.", "sub": ""}, {"t": "c", "term": "소스코드 오류 검사 도구", "def": "개발이 완료된 소스코드 내 알려진 메모리 관련 버그나 논리적 취약점 오류를 사전에 점검해 주는 도구.", "sub": ""}, {"t": "c", "term": "실행 코드 보안 취약성 점검·취약점 방지 도구", "def": "실행 코드를 실행 처리한 후 주로 메모리 관련 보안 취약성을 체크하며, 소스코드 점검 도구가 검출하지 못하는 취약성을 검출하고 공격을 사전에 차단하는 도구.", "sub": ""}, {"t": "c", "term": "소프트웨어 모델 체킹 도구", "def": "정형적으로 모델링된 SW의 제어 흐름과 데이터 흐름을 분석해 추상화된 프로파일(profile)을 도출하고, 설계된 프로파일이 취약한 모델과 일치하는지 점검하는 도구.", "sub": ""}]}, {"title": "취약점 리스크 등급 분류", "items": [{"t": "c", "term": "아주 높은 리스크(Very High Risk)", "def": "개선/패치 적용이 즉각적이어야 하며 적용 요건이 0일인 장애로 취급해야 하는 등급.", "sub": ""}, {"t": "c", "term": "높은 리스크(High Risk)", "def": "리스크가 높은 환경(게이트웨이 내 시스템 등)의 자산을 우선 적용하고, 나머지는 단기간(예 30일) 내에 패치를 적용해야 하는 등급.", "sub": ""}, {"t": "c", "term": "중간 리스크(Medium Risk)", "def": "리스크가 높은 환경의 자산을 우선 적용하고, 나머지는 중기간(예 75일) 내에 개선책을 적용해야 하는 등급.", "sub": ""}, {"t": "c", "term": "낮은 리스크(Low Risk)", "def": "취약점이 식별된 시점부터 장기간(예 180일) 이내에 개선책을 적용해야 하는 등급.", "sub": ""}]}, {"title": "점검 완료 소스코드 관리", "items": [{"t": "c", "term": "운영 시스템 소스 저장 금지", "def": "소스 프로그램은 운영 시스템에 저장하지 않고 운영 시스템은 실행 프로그램만 저장하며, 운영 시스템에서 컴파일이 필요하면 실행 프로그램 생성 후 소스를 삭제.", "sub": ""}, {"t": "c", "term": "소스 프로그램 접근 통제", "def": "모든 관련자에 대해 프로그램 소스 보관 장소 접근을 제어하고 접근 기록 로그를 반드시 남김.", "sub": ""}, {"t": "c", "term": "소스 프로그램 버전 통제", "def": "소스 프로그램에 대한 버전 통제가 반드시 이루어져야 함.", "sub": ""}]}]}]}], "count": 145}, {"id": "04", "title": "네트워크 보안 운영", "notes": ["학습모듈: 네트워크 보안 솔루션을 운영·개선하고, 신규 위협에 대응하며, 솔루션 업데이트를 적용한다."], "units": [{"title": "학습 1. 네트워크 보안 솔루션 운영하기", "sections": [{"title": "1-1. 네트워크 보안 요구사항 분석", "groups": [{"title": "네트워크 보안 요구사항 (보안 4요소 측면)", "items": [{"t": "c", "term": "기밀성 측면", "def": "허용된 트래픽만 통신 허용, 유해 IP·URL·악성 패킷 차단, 중요 정보 송수신 시 암호화, 비인가 사용자 접근 불가.", "sub": ""}, {"t": "c", "term": "무결성 측면", "def": "송·수신자 간 전송 과정에서 패킷의 위조·변조가 발생하지 않아야 함.", "sub": ""}, {"t": "c", "term": "가용성 측면", "def": "패킷이 적절한 시간에 도달하도록 대역폭 보장, DoS 등 비정상 패킷 증가 상황에서도 정상 서비스 제공.", "sub": ""}, {"t": "c", "term": "부인 방지 측면", "def": "종단 간 주소(IP)와 통신 포트(port)가 식별되고, 종단 간 메시지 전송을 보장.", "sub": ""}]}, {"title": "네트워크 장비 보안 요구사항", "items": [{"t": "c", "term": "식별 및 인증", "def": "디폴트 관리자 패스워드 설정 금지, 안전한 패스워드 설정, 인증 실패 횟수 초과 시 대응, 패스워드 마스킹, 인증 정보 평문 저장 금지.", "sub": ""}, {"t": "c", "term": "자체 보안 관리", "def": "ACL 규칙 트래픽 제어, SNMP 모니터링·관리, 관리 콘솔 접속 IP 제한, 주기적 자체 시험, 설정값·실행 코드 무결성 검사, 펌웨어 무결성 검증.", "sub": ""}, {"t": "c", "term": "세션 관리 및 접근 통제", "def": "무활동 시 세션 잠금/종료, 동시 원격 세션 제한, 웹 UI 인증 정보 재사용 방지, 사용자·그룹별 접근 권한 설정, 운영 모드 제공.", "sub": ""}, {"t": "c", "term": "전송 데이터 보호", "def": "원격 관리 콘솔·외부 서버 연동 시 SSL/TLS·HTTPS·SSH·IPSEC 등 사용.", "sub": ""}, {"t": "c", "term": "감사 기록", "def": "감사 시작·종료, 인증 성공·실패 기록, 설정 변경·보안 기능 수행 내역, 사건 발생 일시·유형 제공, 감사 증적 용량 초과 시 처리방안.", "sub": ""}]}, {"title": "네트워크 보안 취약점 유형 (진단 대상 기반)", "items": [{"t": "c", "term": "네트워크 기반 취약점", "def": "전체 네트워크를 대상으로 진단을 수행하며 네트워크 관리자가 먼저 수행해야 하는 진단으로, 높은 위험을 가진 취약점을 즉시 파악하고 잘못된 방화벽 설정·취약한 정보시스템을 쉽게 탐지(Nexpose·Nessus·OpenVas 등 도구 사용).", "sub": ""}, {"t": "c", "term": "호스트 기반 취약점", "def": "특정 호스트를 대상으로 점검을 수행하며 클라이언트-서버 모델에서 클라이언트가 스캔 후 관리자에게 결과를 전송, 분석 결과가 점검 방법에 의존적.", "sub": ""}]}, {"title": "네트워크 장비 보안 기능 상세 요구사항", "items": [{"t": "c", "term": "안전한 비밀 번호 설정 기능", "def": "비밀번호는 9자리 이상 입력 가능해야 하며 숫자·영문자 대소문자·특수문자의 조합으로 구성할 수 있어야 함.", "sub": ""}, {"t": "c", "term": "인증 실패 대응 기능", "def": "지정된 횟수(기본값 5회 이하) 이상 인증 실패 시 일정 시간(기본값 5분 이상) 장비 접속을 제한하는 기능.", "sub": ""}, {"t": "c", "term": "인증 데이터 보호 기능", "def": "비밀번호를 대칭 키 암호·해시 함수 등으로 안전하게 저장하고, 장비에 저장된 모든 비밀 정보(비밀번호·사전 공유 키·대칭 키·개인 키 등)를 읽거나 유추할 수 없어야 함.", "sub": ""}, {"t": "c", "term": "암호 사용(보안 강도)", "def": "암호화 및 해시 알고리즘의 보안 강도는 112bit급 이상(해시 SHA-224/256 등, 대칭 키 SEED·ARIA, 공개 키 RSA 2048, 전자 서명 RSA-PSS·ECDSA 등)을 만족해야 함.", "sub": ""}, {"t": "c", "term": "ACL 기능(장비 계층별)", "def": "L3 장비는 IP 주소(Source·Destination), L4 장비는 IP 주소+포트, L5 이상 장비는 IP 주소+포트+프로토콜로 트래픽을 제어.", "sub": ""}, {"t": "c", "term": "원격 관리 기능", "def": "원격 관리 서비스(SSH·HTTP/HTTPS·FTP·TELNET·SNMP 등)는 디폴트 비활성화하며, SNMP 지원 시 V3 이상을 지원해야 함.", "sub": ""}, {"t": "c", "term": "오류 검사 기능", "def": "장비 구동 시(Power On) CPU·메모리·플래시·네트워크 인터페이스 등 주요 하드웨어와 펌웨어 로딩 후 주요 프로세스의 오류를 확인하는 자체 검사 기능.", "sub": ""}, {"t": "c", "term": "안전한 암호 통신 프로토콜", "def": "원격 접속 시 신뢰된 채널을 제공하며 TLS는 1.2(RFC 5246) 이상, SSH는 v2(RFC 4251~4254) 이상을 지원해야 함.", "sub": ""}]}]}, {"title": "1-2. 네트워크 보안 솔루션 운영", "groups": [{"title": "네트워크 개념", "items": [{"t": "c", "term": "통신의 3개 에이전트", "def": "애플리케이션(전자메일·파일 다운로드 등), 컴퓨터, 네트워크.", "sub": ""}, {"t": "c", "term": "네트워크 프로토콜", "def": "2대 이상의 컴퓨터 통신을 위한 통신 규약. 대표적으로 ISO에서 개발한 OSI(Open System Interconnection) 모델.", "sub": ""}, {"t": "c", "term": "응용 계층(application)", "def": "사용자가 OSI 환경에 접근하여 상호작용. 통신에 사용할 프로토콜 타입을 결정하고 파일 전송·DB 접근·전자메일 등 프로토콜 제공.", "sub": "OSI 7 계층"}, {"t": "c", "term": "표현 계층(presentation)", "def": "데이터 타입을 전송 형식과 무관한 구문(syntax)으로 변환하고 암호화 수행.", "sub": "OSI 7 계층"}, {"t": "c", "term": "세션 계층(session)", "def": "애플리케이션·프로세스 간 접속 설정·관리·종료 제어.", "sub": "OSI 7 계층"}, {"t": "c", "term": "전송 계층(transport)", "def": "종단 간(end-to-end) 데이터 전송에 신뢰성을 제공. 에러 복구·흐름 제어.", "sub": "OSI 7 계층"}, {"t": "c", "term": "네트워크 계층(network)", "def": "경로 선택·중계 기능 수행, 데이터 크기를 적절히 분할(하나의 전송 링크 관리).", "sub": "OSI 7 계층"}, {"t": "c", "term": "데이터 링크 계층(data link)", "def": "물리적 링크 간 신뢰성 있는 정보 제공. 프레임 단위 전송, 순차 번호로 에러 검사·순서화.", "sub": "OSI 7 계층"}, {"t": "c", "term": "물리 계층(physical)", "def": "비트 레벨 통신. 전송 매체 간 인터페이스의 기계적·전기적 기능 정의.", "sub": "OSI 7 계층"}]}, {"title": "네트워크의 종류 (규모·전송 거리에 따라)", "items": [{"t": "c", "term": "근거리 통신망(LAN)", "def": "한 건물 또는 수 km 이내, 100Mbps 이내. 단일 기관 소유로 고속·저에러율. (이더넷-CSMA/CD, 토큰링, FDDI-광섬유 등)", "sub": ""}, {"t": "c", "term": "도시 간 통신망(MAN)", "def": "LAN들을 연결한 LAN보다 크고 WAN보다 작은 도시 규모 네트워크.", "sub": ""}, {"t": "c", "term": "광대역 통신망(WAN)", "def": "국가·대륙 등 넓은 지역을 연결하는 원거리 통신망.", "sub": ""}, {"t": "c", "term": "개인 통신망(PAN)", "def": "10m 범위의 개인 영역 IT 장치 간 네트워크.", "sub": ""}, {"t": "c", "term": "부가 가치 통신망(VAN)", "def": "정보에 부가 가치를 첨가하여 불특정 다수에게 제공하는 네트워크.", "sub": ""}]}, {"title": "네트워크 보안 솔루션 종류와 개념", "items": [{"t": "c", "term": "네트워크 보안 솔루션 종류와 개념", "def": "네트워크상의 데이터·기기에 대한 기밀성·무결성·가용성을 향상하기 위한 솔루션.", "sub": ""}, {"t": "c", "term": "방화벽(Firewall)", "def": "외부→내부 접근 시 반드시 방화벽을 통과하도록 하여 내부 자원·정보를 보호하는 시스템. 관리자가 허용하는 패킷만 통과. 구성 요소: 네트워크 정책, 사용자 인증 시스템, 패킷 필터링, 응용 계층 게이트웨이.", "sub": ""}, {"t": "c", "term": "스크리닝 라우터", "def": "프로토콜 형태·송수신지 주소·포트 번호를 분석해 진입을 허가/거절하는 라우터. OSI 3·4계층(IP·TCP·UDP 헤더)에서 동작.", "sub": ""}, {"t": "c", "term": "베스천 호스트", "def": "보호된 네트워크에서 유일하게 외부 공격에 노출된 시스템. 내·외부 네트워크 간 게이트웨이 역할로 철저한 감시 필요.", "sub": ""}, {"t": "c", "term": "가상 사설 네트워크(VPN)", "def": "정보를 암호화하여 공중망으로 전송, 가로채기를 당해도 데이터 유출을 차단하는 솔루션.", "sub": ""}, {"t": "c", "term": "침입 탐지 시스템(IDS)", "def": "공격 형태를 분석해 사전 규칙(signature)을 만들고, 이상 패킷 유입 시 실시간 탐지·대응.", "sub": ""}, {"t": "c", "term": "기초 자료 종류에 따른 분류", "def": "단일 호스트 기반, 다중 호스트 기반, 네트워크 기반.", "sub": ""}, {"t": "c", "term": "침입 행위 기준에 따른 분류", "def": "정상적인 행위의 탐지(프로파일 기준 이탈 탐지), 잘못된 행위의 탐지(알려진 취약점 공격 프로파일 탐지).", "sub": ""}, {"t": "c", "term": "침입 방지 시스템(IPS)", "def": "IDS에 방지 기능까지 자동 수행. 트래픽 모니터링으로 유해 트래픽 차단·세션 종료 등 능동적으로 네트워크를 보호.", "sub": ""}]}, {"title": "LAN 세부 종류", "items": [{"t": "c", "term": "이더넷(ethernet)", "def": "제어 방식으로 CSMA/CD 표준안을 사용, 동축 케이블과 LAN 카드가 필요하며 노드 수가 많으면 전체 성능 저하 발생.", "sub": ""}, {"t": "c", "term": "토큰링(token-ring)", "def": "16Mbps 이하의 고속 전송이 가능하고 노드 수가 많아도 전송 속도 차이가 없으며, 리피터를 사용해 장거리 전송 시 에러가 없음.", "sub": ""}, {"t": "c", "term": "FDDI(fiber distributed data interface)", "def": "ANSI가 표준화한 네트워크 규격으로 광섬유 케이블을 사용하며 100Mbps의 고속 전송이 가능.", "sub": ""}]}, {"title": "네트워크 보안 운영 수립 절차", "items": [{"t": "c", "term": "네트워크 위험 분석", "def": "대형 네트워크는 전체 운영 차원의 보안 수준 결정에 앞서 위험 분석을 수행하고, 개별 시스템·네트워크 관리자는 추가 보안 수준 결정을 위해 위험 분석을 수행.", "sub": ""}, {"t": "c", "term": "의견 수렴", "def": "효과적인 보안 방침은 조직 관리층과 해당 방침을 사용할 조직원들의 의견을 수렴해 수립할 때 효과를 발휘.", "sub": ""}, {"t": "c", "term": "보안 역할 및 책임 정의", "def": "네트워크·분산 환경에서는 보안 책임이 사용자 전체에 있으므로 관리자·사용자 차원의 역할과 책임을 정의하고 관련 교육을 시행.", "sub": ""}, {"t": "c", "term": "보안 정책 정의", "def": "자산이 외부에 노출될 수 있음을 인식하고 네트워크 특성에 적합한 보안 정책을 정의(공격 발생 시 대응 방안 포함).", "sub": ""}]}, {"title": "공개 서버 및 원격 운영 보안", "items": [{"t": "c", "term": "DMZ(Demilitarized Zone)", "def": "웹 서버 등 공개 서버를 내부 네트워크와 분리해 설치하는 영역으로, 침입 차단 시스템 등 보안 솔루션을 통해 보호.", "sub": ""}, {"t": "c", "term": "원격 운영 보안 대책", "def": "원격지 네트워크 관리는 원칙적으로 금지하되 부득이한 경우 정보보호 최고 책임자 승인·접속 단말 및 사용자 인증·한시적 접근 권한 부여·전송 구간 암호화(VPN)·접속 단말 보안·지속적인 모니터링이 필요.", "sub": ""}]}]}]}, {"title": "학습 2. 네트워크 보안 솔루션 운영 개선하기", "sections": [{"title": "2-1. 네트워크 보안 솔루션 운영 개선 방안 수립", "groups": [{"title": "네트워크 보안 솔루션 개선 계획 절차", "items": [{"t": "c", "term": "네트워크 보안 솔루션 개선 계획 절차", "def": "다양한 보안 솔루션 운영 시 운영 인력 전문성 결여 등으로 취약점이 존재하므로 이를 보완할 개선 계획이 필요.", "sub": ""}, {"t": "c", "term": "절차", "def": "① 네트워크 구성 분석(구성 요소·운영 중 솔루션 도출) → ② 보안 위협 도출(위협 타깃 설정, 위협 분석 모델링) → ③ 보안 취약점 진단(점검 항목 개발·진단) → ④ 개선 방안 수립(솔루션 패치 적용 등 조치·계획).", "sub": ""}]}, {"title": "네트워크 위협 및 취약점 진단 유형", "items": [{"t": "c", "term": "네트워크 진단", "def": "원격 접속·네트워크 침입 흔적 등의 내용으로 네트워크 보안 취약점을 체계적으로 진단하여 종합적인 보안 대책을 수립.", "sub": ""}, {"t": "c", "term": "모의 해킹 진단", "def": "외부에서 웹 환경을 이용해 내부망 공격을 시도하여 침투 가능성·안전성을, 내부에서는 파일명 변경 등을 통해 유출 가능성·안정성을 테스트하는 취약점 진단 기법.", "sub": ""}]}, {"title": "네트워크 보안 솔루션 점검 체크리스트", "items": [{"t": "c", "term": "솔루션 SW/HW 관리", "def": "솔루션 인증 여부, 최신 패치 적용 여부, 불필요한 서비스 제거.", "sub": ""}, {"t": "c", "term": "계정 관리", "def": "default password 변경, 관리자 패스워드 주기적 변경.", "sub": ""}, {"t": "c", "term": "네트워크 원격 관리", "def": "관리자 원격 관리 접근 통제, 원격 관리 시 idle 발생 시 접속 종료.", "sub": ""}, {"t": "c", "term": "정책 관리", "def": "정책 중복 점검, 정책 변경 통제 절차, 변경 요청 룰의 기술적 검토, 침입 탐지 정책 검토.", "sub": ""}, {"t": "c", "term": "로그 관리", "def": "로그 데이터의 저장, 정기적인 로그 점검.", "sub": ""}]}]}, {"title": "2-2. 네트워크 보안 솔루션 운영 개선", "groups": [{"title": "네트워크 보안 취약점 분석 절차 (7단계)", "items": [{"t": "c", "term": "대상 시스템 결정", "def": "목표 시스템의 IP를 확인.", "sub": ""}, {"t": "c", "term": "가동 시스템 탐색", "def": "핑거프린팅 기술로 살아 있는 호스트를 탐색.", "sub": ""}, {"t": "c", "term": "서비스 목록 탐색", "def": "살아 있는 호스트에 포트 스캐닝 수행(취약 포트·서비스 식별, 가장 중요한 단계).", "sub": ""}, {"t": "c", "term": "서비스 인식", "def": "열린 포트의 서비스를 시그니처 응답값 분석으로 확인.", "sub": ""}, {"t": "c", "term": "애플리케이션 확인", "def": "서비스의 유형·벤더를 정확히 파악(취약점 진단 시 타 앱 영향·충돌 확인).", "sub": ""}, {"t": "c", "term": "네트워크 취약점 확인", "def": "액티브 구성 조사 후 취약점 진단 및 커스텀 공격 실행.", "sub": ""}, {"t": "c", "term": "발견된 취약점 보고", "def": "위험도 여부와 보안 대책을 기술한 보고서 작성.", "sub": ""}]}, {"title": "네트워크 보안 취약점 진단에 사용되는 포트", "items": [{"t": "c", "term": "FTP(21)", "def
