방하는 적극적 보안 행위. 가용성·무결성을 보장하는 보안 운영 기법.", "sub": ""}, {"t": "c", "term": "보안 취약성 진단 및 조치", "def": "운영 환경에 맞게 진단 주기를 적정 수준으로 조정해 지속 관리.", "sub": ""}, {"t": "c", "term": "위협 인지 및 대응", "def": "단순 공격 탐지가 아니라 취약성을 파악한 후 공격을 탐지하고 영향분석(impact analysis) 수행.", "sub": ""}, {"t": "c", "term": "최근 공격 경향 분석", "def": "최신 보안 취약성과 공격 여부를 분석하고, 자사 시스템 존재 여부·탐지·대응 방법을 파악.", "sub": ""}]}, {"title": "정보보호 관리체계", "items": [{"t": "c", "term": "정보보호 관리체계", "def": "일회성·단편적 정보보호에서 벗어나 조직적·종합적 정보보호 대책을 수립해 관리 수준 전반을 향상시키는 체계.", "sub": ""}, {"t": "c", "term": "ISO 27001", "def": "정보보호 관리를 경영 관리 시스템의 한 부분으로 인식하고, 위험관리 기반으로 정보보호의 수립·구현·운영·검토·개선을 하는 시스템. ISO27001:2022 기준 4개 도메인(조직 37·사람 8·물리적 14·기술적 34) 93개 통제 항목.", "sub": ""}, {"t": "c", "term": "ISMS-P 인증", "def": "인증 심사 필수 항목으로, 위협·취약성 변화에 대응하기 위해 지속 유지되는 순환주기 형태.", "sub": ""}, {"t": "c", "term": "정책 수립 단계", "def": "상위 수준 정보보호 정책 수립, 책임 설정, 법적·규제 요건과 위험 관리 기술.", "sub": ""}, {"t": "c", "term": "범위 설정 단계", "def": "ISMS 범위 내 정보 자산 식별·목록화(형태·소유자·관리자 등).", "sub": ""}, {"t": "c", "term": "위험 관리 단계", "def": "위험 관리 전략·계획 수립, 위협·취약성·위험 식별 및 영향 분석.", "sub": ""}, {"t": "c", "term": "구현 단계", "def": "정보보호 계획에 따라 대책을 구현하고 교육·훈련 진행.", "sub": ""}, {"t": "c", "term": "사후 관리 단계", "def": "상시 모니터링, 정기 내부 감사로 정책 준수 확인 및 개선.", "sub": ""}]}, {"title": "ISMS-P 인증 기준 영역", "items": [{"t": "c", "term": "ISMS-P 인증 기준 3대 영역", "def": "관리체계 수립 및 운영, 보호 대책 요구사항, 개인정보 처리 단계별 요구사항.", "sub": ""}, {"t": "c", "term": "관리체계 수립 및 운영 영역", "def": "관리체계 기반 마련, 위험 관리, 관리체계 운영, 관리체계 점검 및 개선으로 구성.", "sub": ""}, {"t": "c", "term": "보호 대책 요구사항 영역", "def": "정책·조직·자산 관리, 인적 보안, 외부자 보안, 물리 보안, 인증 및 권한관리, 접근통제, 암호화 적용, 정보시스템 도입·개발 보안, 시스템·서비스 운영/보안관리, 사고 예방 및 대응, 재해 복구로 구성.", "sub": ""}, {"t": "c", "term": "개인정보 처리 단계별 요구사항 영역", "def": "개인정보 수집·보유 및 이용·제공·파기 시 보호조치와 정보주체 권리보호로 구성.", "sub": ""}]}, {"title": "침해 사고 조사 및 복구", "items": [{"t": "c", "term": "사고 조사 과정", "def": "\"누가·무엇을·언제·어디서·어떻게·왜\"를 결정하는 활동으로, 데이터 수집 단계와 자료 분석 단계로 나뉨.", "sub": ""}, {"t": "c", "term": "네트워크 기반 침해 사고 증거", "def": "IDS 로그, 허락받은 네트워크 모니터링 기록, ISP 가입자 이용 기록 장치/감시 장치 로그, 라우터 로그, 방화벽 로그, 인증 서버 로그를 포함.", "sub": ""}, {"t": "c", "term": "디지털 포렌식", "def": "증거의 적법성과 무결성을 유지하면서 기술적 데이터를 획득하고 체계적으로 침해 사고를 분석하는 기술.", "sub": ""}, {"t": "c", "term": "휘발성 데이터 분석", "def": "네트워크 접속 조사·악의적인 코드 식별 등 휘발성 데이터를 대상으로 수행하는 분석.", "sub": ""}, {"t": "c", "term": "침해 사고 보고서 작성 원칙", "def": "데이터 획득·보관·분석 과정을 6하 원칙에 따라 명백·객관적으로 서술하고, 의사결정자가 이해하기 쉽게 디지털 포렌식 기법으로 수집한 객관적 증거를 바탕으로 작성.", "sub": ""}, {"t": "c", "term": "네트워크 보안 침해 복구 조치", "def": "위험 우선순위 식별, 사건 본질 기술, 근원적·조직적 원인 파악, 침해 컴퓨터 복구, 밝혀진 취약점 조치(IDS·access control·firewall), 개선 책임자 지명·추적, 복구 과정·대책의 유용성 검증, 보안 정책 개선.", "sub": ""}]}]}]}, {"title": "학습 4. 네트워크 보안 솔루션 업데이트 적용하기", "sections": [{"title": "4-1. 네트워크 보안 솔루션 업데이트 계획 수립", "groups": [{"title": "패치 관리 시스템(PMS: Patch Management System)", "items": [{"t": "c", "term": "패치 관리 시스템(PMS: Patch Management System)", "def": "서버 등 정보 자산에 설치되지 않은 윈도우 보안 패치 등을 검색하여 자동으로 설치하는 프로그램/솔루션.", "sub": ""}, {"t": "n", "text": "구성 :"}, {"t": "c", "term": "패치 프라이머리 서버", "def": "패치 파일·배포 정보를 보관·전달, 배포 서버로부터 로그 수집, 웹 기반 어드민 페이지 제공.", "sub": ""}, {"t": "c", "term": "패치 배포 서버", "def": "배포 대상 솔루션에 패치 파일·정보를 전달하고 로그를 수집.", "sub": ""}, {"t": "c", "term": "패치 관리 시스템 보안 가이드", "def": "APT 공격이 PMS 특징을 악용하므로(취약 시 연결된 다수 PC 감염), 초기 비밀번호 변경, 패스워드 복잡도, 중요정보 파일 미보관, 관리자 계정 최소화·임시계정 제거, 계정 공용 금지, 최소 IP·독립 네트워크 구성, 불필요 서비스·프로그램 제거, 로그 주기 확인, 공유 폴더 미사용, 이동식 매체 자동실행 차단, 최신 버전·백신 유지, 화면 보호기 10분 이내 설정 등.", "sub": ""}]}]}, {"title": "4-2. 네트워크 보안 솔루션 업데이트 적용", "groups": [{"title": "솔루션 업데이트 체계", "items": [{"t": "c", "term": "솔루션 업데이트 체계", "def": "솔루션 업데이트는 배포된 SW의 기능 개선·버그·보안 취약점 수정을 위해 개발사가 내놓는 프로그램. 업데이트 체계는 최신 버전을 검색·다운로드·설치하는 체계로, 업데이트 서버·업데이트 클라이언트·통신 채널로 구성.", "sub": ""}, {"t": "n", "text": "솔루션 업데이트 유형 :"}, {"t": "c", "term": "방식별", "def": "수동 업데이트(사용자가 직접 다운로드·설치), 자동 업데이트(정해진 일정에 검사·다운로드·설치). 최근에는 자동 업데이트가 일반적.", "sub": ""}, {"t": "c", "term": "중요도별", "def": "중요 업데이트(보안 취약점·개인정보보호·버그 수정 등 필수), 선택 업데이트(작업 환경 향상·드라이버·신규 SW 등 선택 설치).", "sub": ""}, {"t": "c", "term": "동작 구조", "def": "① 설정정보 다운로드(최신 버전 번호·파일 URL 목록) → ② 업데이트 파일 다운로드(최신이 아니면 URL 목록으로 다운로드) → ③ 업데이트 대상 파일 설치.", "sub": ""}]}, {"title": "네트워크 보안 솔루션 백업·복구", "items": [{"t": "c", "term": "특정 파일·폴더 백업", "def": "솔루션의 특정 파일 또는 폴더를 별도 저장장치에 백업.", "sub": ""}, {"t": "c", "term": "초기(전체) 백업", "def": "솔루션이 설치된 장비의 출하 시 이미지 전체를 백업.", "sub": ""}, {"t": "c", "term": "변경 사항 백업", "def": "시스템에 변경한 사항을 백업해 스냅 샷 형태로 시스템 복구 지점을 생성.", "sub": ""}, {"t": "c", "term": "백업 주기 선정", "def": "정기적으로 백업할지, 소프트웨어·하드웨어를 추가하거나 광범위하게 수정하기 전에 백업할지 대상 유형에 따라 선택.", "sub": ""}, {"t": "c", "term": "업데이트 적용 시점", "def": "조직의 네트워크 트래픽을 고려해 부하가 적은 시점에 적용하며, 이중화 장비는 단계적으로 패치 적용 후 이상 발생 시 즉시 중단하고 복구 조치를 수행.", "sub": ""}]}]}]}], "count": 133}, {"id": "05", "title": "시스템 보안 운영", "notes": ["학습모듈: 시스템 보안 솔루션을 운영·개선하고, 신규 위협에 대응하며, 솔루션 업데이트를 적용한다."], "units": [{"title": "학습 1. 시스템 보안 솔루션 운영하기", "sections": [{"title": "1-1. 시스템 보안 솔루션 요구사항 분석", "groups": [{"title": "시스템 보안 운영의 범위", "items": [{"t": "c", "term": "서버 보안", "def": "정보·자원이 저장된 서버의 보안 운영(서버 보안, DB 보안, 세션 로깅 등).", "sub": ""}, {"t": "c", "term": "PC 보안", "def": "사용자 단말 PC에 대한 보안 운영(통합 PC 보안, 오피스 PC 보안, 시큐어 프린터 등).", "sub": ""}, {"t": "c", "term": "보안 관리", "def": "관리적 보안에 활용되는 보안 운영(스토리지 암호화, 디가우저 등).", "sub": ""}]}, {"title": "시스템 보안 운영의 요구사항 수집 대상 및 항목", "items": [{"t": "c", "term": "수집 대상", "def": "① 정보화 사업 관련 법령·훈령·지침·정책, ② 기업의 정보보호 규정 및 보안 정책, ③ 발주 기업 제안서 내 보안 요구사항.", "sub": ""}, {"t": "c", "term": "수집 항목", "def": "보안 운영 정책, 통제 영역·통제 항목, 통제 항목별 통제 수준, 정책·목적 달성을 위한 세부 지침.", "sub": ""}, {"t": "c", "term": "정보 보안 규정", "def": "외부 누출 금지 영업 비밀·내부 정보에 대해 준수해야 하는 규칙을 정한 문서. 보안 조직 구성·총책임자(대표자) 선정·부서별 담당자 채택으로 엄격한 보안 관리.", "sub": ""}]}, {"title": "시스템 보안 운영상 보안 솔루션의 개념 및 역할", "items": [{"t": "c", "term": "보안 솔루션의 개념", "def": "보안상 발생하는 기술적 위험 요소를 방어하기 위한 솔루션. 기술 레벨에 따라 구성 요소를 선별 적용.", "sub": ""}, {"t": "c", "term": "보안 솔루션의 역할", "def": "기업 내 보안 담당 인원이 1~2명으로 운영·보안 겸직 등 인력이 부족하여 보안 솔루션 의존도가 높음. 따라서 효율적 운영을 위해 솔루션에 대한 정확한 이해와 운영 노하우가 필요.", "sub": ""}]}, {"title": "시스템 보안 솔루션별 보안 기능", "items": [{"t": "c", "term": "기업 보안 관리(ESM)", "def": "다양한 보안 시스템과 보안 장비를 연동하여 운영하는 통합 보안 관리 시스템.", "sub": ""}, {"t": "c", "term": "위협 관리 시스템(TMS)", "def": "사이버 공격을 예측하고 판단하여 대응할 수 있는 체계적인 위협 관제 및 대응 시스템.", "sub": ""}, {"t": "c", "term": "보안 스마트 카드", "def": "핸드폰이나 PC에 삽입해 전자 결제 시 신원 인증에 사용하는 인증 제품.", "sub": ""}, {"t": "c", "term": "H/W 토큰", "def": "전자 서명 생성 및 검증 등이 가능한 보안 하드웨어 장치.", "sub": ""}, {"t": "c", "term": "일회용 비밀번호(OTP)", "def": "로그인 시 새로운 패스워드를 생성하는 보안 시스템.", "sub": ""}, {"t": "c", "term": "바이러스 백신", "def": "바이러스·웜 등 악성 프로그램을 탐지·치료하는 프로그램.", "sub": ""}, {"t": "c", "term": "안티 스파이웨어", "def": "스파이웨어를 탐지·치료하는 프로그램.", "sub": ""}, {"t": "c", "term": "스팸 차단 S/W", "def": "스팸 메일을 차단하는 솔루션.", "sub": ""}, {"t": "c", "term": "Secure OS(보안 운영 체제)", "def": "운영 체제의 보안 결함으로 인한 해킹을 방지하기 위해 보안 기능이 추가된 운영 체제.", "sub": ""}, {"t": "c", "term": "PC 보안(제품)", "def": "PC 방화벽·암호화·매체 제어 기능 등을 통합한 PC 보안 제품.", "sub": ""}, {"t": "c", "term": "DB 보안", "def": "허가받지 않은 사용자의 DB 접근을 제한하고 내부자에 의한 DB 유출에 대비해 접근 제어·암호화·감사를 수행하는 솔루션.", "sub": ""}, {"t": "c", "term": "DRM", "def": "디지털 콘텐츠에 대한 저작권을 보호하는 솔루션.", "sub": ""}, {"t": "c", "term": "NAC", "def": "비인가 사용자 및 단말의 내부 네트워크 접근을 제한하는 솔루션.", "sub": ""}, {"t": "c", "term": "SSO", "def": "한 번의 인증만으로 전 시스템을 하나의 시스템처럼 사용할 수 있는 시스템.", "sub": ""}, {"t": "c", "term": "EAM", "def": "정보 자원에 대한 접근 인증과 접근 권한을 관리하는 통합 인증 관리 솔루션.", "sub": ""}, {"t": "c", "term": "IAM", "def": "ID/PW를 종합적으로 관리해 주는 역할 기반의 사용자 계정 관리 솔루션.", "sub": ""}, {"t": "c", "term": "지문 인식", "def": "개인마다 다른 지문 정보를 이용하여 신분을 확인하는 바이오 인식 기법.", "sub": ""}, {"t": "c", "term": "정맥 인식", "def": "손바닥·손목 등의 혈관 패턴을 이용하여 신분을 확인하는 바이오 인식 기법.", "sub": ""}, {"t": "c", "term": "얼굴 인식", "def": "카메라로 입력된 얼굴 영상과 DB 얼굴 영상을 비교하여 신분을 확인하는 기법.", "sub": ""}, {"t": "c", "term": "다중 인식", "def": "여러 인식 기술을 함께 사용하여 인식 성능을 향상시키고 신뢰도를 높이는 인식 기법.", "sub": ""}]}]}, {"title": "1-2. 시스템 보안 솔루션 운영", "groups": [{"title": "시스템 보안 솔루션 운영 업무의 어려움", "items": [{"t": "c", "term": "시스템 보안 솔루션 운영 업무의 어려움", "def": "다양한 솔루션 운영으로 일관성·체계성·전문성 확보가 어려움. ① 복잡·비일관 정보 조치 어려움, ② 운영 정보의 체계적 관리 어려움, ③ 개별 평가로는 전체 통일된 보안 수준 평가 어려움, ④ 솔루션별 전문 인력 필요하나 인력 부족·비용 발생.", "sub": ""}]}, {"title": "시스템 보안 솔루션 안정적 운영 업무 프로세스 방법론", "items": [{"t": "c", "term": "정보보안 프레임워크의 정의", "def": "기업 업무 연속성을 위한 네트워크·시스템 등 주요 인프라의 위협 요인을 사전 분석·예방하고, 발생 시 적절히 대응하기 위한 정책·프로세스·기술적 요인의 관계를 나타낸 것.", "sub": ""}, {"t": "c", "term": "정보보안 프레임워크의 구성", "def": "기술적 보안(시스템 보안)에 관리적 보안·물리적 보안 요소를 함께 적용.", "sub": ""}, {"t": "c", "term": "프레임워크 필요성", "def": "관리적 측면(전사 일관 정책·이벤트 연관 관계 파악), 재무적 측면(중복 투입 방지·통합 운영 비용 절감), 성능적 측면(개별 솔루션의 딜레이·로드 한계 극복).", "sub": ""}, {"t": "c", "term": "정보 보안 운영 프로세스", "def": "① 정보보호 대상 현황 파악(우선순위 분석) → ② 예방 대응(예방 정량 지표 분석·조치) → ③ 탐지 대응(탐지 지표 책정·매뉴얼 대응) → ④ 업무 정량화(관리 지표 측정·지속 개선).", "sub": ""}]}, {"title": "정보 보안 관리 시스템 인증 (ISO 17799)", "items": [{"t": "c", "term": "정보 보안 관리 시스템 인증 (ISO 17799)", "def": "영국 BSI가 제정한 BS7799 기반의 국제 정보 보안 표준이자 인증 체계로 정보 보안 관리의 베스트 프랙티스를 정의.", "sub": ""}, {"t": "c", "term": "Part 1", "def": "정보 보안 관리 실행 지침(보안 정책·조직·인적 보안 등 10개 분야, 127개 통제 항목).", "sub": ""}, {"t": "c", "term": "Part 2", "def": "ISMS 규격(비즈니스 위험 접근 기반으로 정보 보안을 수립·구현·운영·검토·개선하는 시스템).", "sub": ""}]}, {"title": "시스템 보안 솔루션 운영 절차상 보안 대책", "items": [{"t": "c", "term": "원격 운영 보안 대책", "def": "원격지 정보 시스템 관리는 원칙적으로 금지하되, 필요 시 정보보호 최고 책임자 승인·접속 단말 및 사용자 인증·한시적 접근 권한 부여·전송 구간 암호화(VPN)·접속 단말 보안·지속적 모니터링 대책을 마련.", "sub": ""}, {"t": "c", "term": "DMZ(Demilitarized Zone)", "def": "공개 서버를 내부 네트워크와 분리하여 설치하고 침입 차단 시스템 등 보안 솔루션으로 보호하는 영역.", "sub": ""}]}]}]}, {"title": "학습 2. 시스템 보안 솔루션 운영 개선하기", "sections": [{"title": "2-1. 시스템 보안 솔루션 운영 개선 방안 수립", "groups": [{"title": "시스템 보안 솔루션 개선 방안 도출 프로세스", "items": [{"t": "c", "term": "시스템 보안 솔루션 개선 방안 도출 프로세스", "def": "보안 솔루션도 SW 기반이라 허점이 존재하고, 다수 운영 시 인력 전문성 결여로 취약점이 발생하므로 개선 방안 도출이 필요.", "sub": ""}, {"t": "c", "term": "절차", "def": "① 시스템 구성 분석 → ② 보안 위협 도출(STRIDE 등 위협 모델링) → ③ 보안 취약점 진단(점검 항목 개발·진단) → ④ 개선 방안 수립(패치 적용·윈백 등).", "sub": ""}, {"t": "c", "term": "STRIDE 위협 유형", "def": "Spoofing(위장), Tampering(변조), Repudiation(부인), Information disclosure(정보 노출), Denial of service(서비스 거부), Elevation of privilege(권한 상승).", "sub": ""}, {"t": "c", "term": "8단계 리스크 계산 — DREAD", "def": "취약성 5가지에 점수를 할당해 위협 우선순위를 결정.", "sub": ""}, {"t": "c", "term": "damage potential", "def": "악용 시 피해 정도를 수치화.", "sub": ""}, {"t": "c", "term": "reproducibility", "def": "공격 재현 난이도를 점수화.", "sub": ""}, {"t": "c", "term": "exploit-ability", "def": "실제 공격까지 요구되는 시간·노력을 수치화.", "sub": ""}, {"t": "c", "term": "affected users", "def": "예상 피해 사용자 수 비율을 수치화.", "sub": ""}, {"t": "c", "term": "discover-ability", "def": "약점 발견 난이도를 수치화.", "sub": ""}, {"t": "c", "term": "9단계 공격 보안 대책 수립 — 위협 트리(threat tree)", "def": "루트 노드가 최종 공격 목표, 하위 노드는 상위 공격 달성에 필요한 전제 조건. 우선순위 공격에 경감책을 수립해 이전 개발 단계에 반영.", "sub": ""}]}, {"title": "정보 자산의 식별 및 가치 평가", "items": [{"t": "c", "term": "자산 식별", "def": "전자 정보·SW·HW·종이 문서·부대설비 등 모든 정보 자산을 대상으로, 분류 기준을 정의해 중복·누락 최소화(정보·문서·인력·소프트웨어·설비·기타 5~6개로 분류).", "sub": ""}, {"t": "c", "term": "자산 평가", "def": "비밀성·무결성·가용성 3가지 측면을 고(3)·중(2)·저(1)로 평가하고, 합계를 3~5등급으로 세분화.", "sub": ""}]}, {"title": "보안 취약성 진단 방법론 및 절차", "items": [{"t": "c", "term": "Combined Approach 방법론", "def": "ISO/IEC 1335 TR(GMITS)에서 권고하는 보안 취약성 진단 방법론.", "sub": ""}, {"t": "c", "term": "ISO/IEC 27001", "def": "파일럿 테스트를 활용한 자가 진단으로 보안 수준을 측정하고 점검 우선순위를 결정하는 데 참고하는 국제 보안 표준 규격.", "sub": ""}, {"t": "c", "term": "시스템 위협·취약점 진단 유형", "def": "시스템 진단·웹 애플리케이션 진단·모의 해킹의 3가지 형태로 진행.", "sub": ""}, {"t": "c", "term": "시스템 보안 진단 절차(5단계)", "def": "대상 식별 → 인벤토리 스캐닝 → 취약점 점검 → 상세 취약점 점검 → 보고서 작성.", "sub": ""}, {"t": "c", "term": "대상 식별", "def": "외부 접근에 노출되어 침해 위험성이 높은 공개 서버 등 정보 자산과 이를 보호하는 운영 중인 보안 솔루션을 분석 대상으로 선정하는 단계.", "sub": ""}, {"t": "c", "term": "인벤토리 스캐닝(inventory scanning)", "def": "보안 취약점 진단 대상 서버의 IP address 등 개략적 정보를 확인하는 단계.", "sub": ""}, {"t": "c", "term": "상세 취약점 점검", "def": "시스템 파일 취약점 및 보안 솔루션의 설정 오류 등을 이용해 루트 권한 획득 등의 취약점을 점검하는 단계.", "sub": ""}, {"t": "c", "term": "모의 해킹 진단", "def": "외부에서 웹 환경을 이용해 내부망 공격을 시도하여 침투 가능성·안전성을 테스트하고, 내부에서는 파일명 변경 등으로 유출 가능성·안정성을 테스트하는 취약점 진단 기법.", "sub": ""}]}, {"title": "위험도 측정 및 위험 처리", "items": [{"t": "c", "term": "기준 위험도(C)", "def": "위협 점수(A)에 취약성 양호(1점)를 곱한 값.", "sub": ""}, {"t": "c", "term": "실제 위험도(D)", "def": "위협 점수(A)에 취약성 점수(B)를 곱한 값으로, 기준 위험도보다 점수가 높을수록 보안 취약성·위험도가 높음.", "sub": ""}, {"t": "c", "term": "위험 수준 결정(DoA, degree of assurance)", "def": "비용 대비 효율성·조직 상황을 고려해 관련 부서·담당자와 협의하여 수용 가능한 위험 수준을 결정하는 것. 실제 위험도가 DoA를 초과하는 항목에 대해서만 보안 대책을 강구.", "sub": ""}, {"t": "c", "term": "위험 처리", "def": "위험도 측정 후 중요 자산 보호를 위해 위험 수용·위험 회피·위험 전이·위험 감소 등의 대응 전략을 수립.", "sub": ""}]}, {"title": "단계별 보안 대책(보안 마스터플랜)", "items": [{"t": "c", "term": "1단계(전사적 정보보안 환경 조성)", "def": "정보보호 관리체계 구축을 위해 기술적 대책 구현 전 관리적 부문을 중심으로 보안 정책·조직·교육·정기 감사 등 보안 대책을 우선 수립.", "sub": ""}, {"t": "c", "term": "2단계(전사적인 보안 시스템 구축)", "def": "기본 보안 인프라 위에 방화벽 도입·물리적 보안 강화·PC 보안 등 기술적 대응책을 분야별로 구현해 조직의 보안 경영 체계를 완성.", "sub": ""}, {"t": "c", "term": "3단계(보안 감사 및 유지 관리)", "def": "추진된 과제를 지속적으로 유지·점검·관리하며 모니터링·정기 보안 감사·침해 사고 예방 대응 활동을 수행.", "sub": ""}]}, {"title": "개선 방안 실효성 검증", "items": [{"t": "c", "term": "ISMS-P", "def": "한국인터넷진흥원의 정보보호 및 개인정보보호 관리체계 운용 기준으로, 개선 상황 점검 시 보안 감사 적용 기준으로 활용.", "sub": ""}, {"t": "c", "term": "데이터 품질 5요건", "def": "완전성·유효성·정확성·유일성·일관성을 중심으로 데이터 품질을 점검.", "sub": ""}, {"t": "c", "term": "기능 테스트", "def": "솔루션별 단위 테스트·PC 성능 영향도 점검·솔루션 간 충돌 검증 등 보안 기능을 검증하는 테스트.", "sub": ""}, {"t": "c", "term": "시스템 통합 테스트", "def": "솔루션의 통합·연동성과 보안 운영 정책 정합성을 검증하여 기존 시스템과의 상호 운용성을 확인하는 테스트.", "sub": ""}, {"t": "c", "term": "파일럿 테스트", "def": "현업 TFT 요원이 수행하여 운영 환경을 사전 검증하는 테스트.", "sub": ""}, {"t": "c", "term": "SLA 지표", "def": "개선 방안 도입에 대한 성과를 측정하는 데 활용하는 운영 성과 지표.", "sub": ""}]}]}, {"title": "2-2. 시스템 보안 솔루션 운영 개선", "groups": [{"title": "취약점 평가", "items": [{"t": "c", "term": "취약점 평가", "def": "위협과 마찬가지로 취약점도 평가하며, 정보 자산에 악영향을 끼치는 위험 평가에 활용.", "sub": ""}, {"t": "c", "term": "취약점 평가 기준(4단계)", "def": "매우 취약(VH, 복구 불가/피해 큼), 비교적 취약(H, 복구 가능하나 피해 큼), 보통(M, 보고 필요), 취약하지 않음(L, 보고 불필요).", "sub": ""}, {"t": "c", "term": "발생 가능도", "def": "취약성과 위협을 결합해 모호함·중복성을 제거한 취약점 평가 등급. 정보 자산 가치를 고려하며 높음·중간·낮음 세 등급으로 구분.", "sub": ""}]}, {"title": "보안 위험 분석 방법론", "items": [{"t": "c", "term": "베이스라인 접근법", "def": "모든 시스템에 보호 기본 수준을 정하고 보호 대책을 선택. 장점-시간·비용 절약, 단점-조직 특성 미반영·수준 초과/미달.", "sub": ""}, {"t": "c", "term": "비정형 접근법", "def": "전문가의 지식·경험으로 위험 분석. 장점-시간·비용 절약·소규모 적합, 단점-구조화 불가·합리적 도출 불가·사후 관리 제한.", "sub": ""}, {"t": "c", "term": "상세 위험 분석 접근법", "def": "자산 가치·위험·취약성을 분석해 위험 정도를 결정. 장점-적절한 보안 수준 마련, 단점-전문 지식 필요·시간·비용 소모 큼.", "sub": ""}, {"t": "c", "term": "복합 접근법", "def": "상세 위험 분석+베이스라인 복합 적용. 장점-빠른 전략 구축·효율적, 단점-적용 대상 설정 어려움·자원 낭비. 위험도 높은 대상은 상세 분석, 낮은 대상은 베이스라인 적용.", "sub": ""}]}, {"title": "운영 환경 모니터링", "items": [{"t": "c", "term": "SIEM", "def": "중요 정보 자산의 보안 위험을 주기적으로 모니터링하기 위해 도입할 수 있는 통합 모니터링 솔루션.", "sub": ""}]}]}]}, {"title": "학습 3. 시스템 보안 신규 위협 대응하기", "sections": [{"title": "3-1. 시스템 보안 위협 식별 및 차단", "groups": [{"title": "보안 솔루션 관리 및 보호", "items": [{"t": "c", "term": "보안 취약성 진단의 개념", "def": "정보 시스템의 보안상 문제점을 파악하고 내·외부 침해로 발생 가능한 위험 수준을 진단하는 작업.", "sub": ""}, {"t": "c", "term": "보안 취약성 진단의 목적", "def": "안티바이러스(사후 조치)와 달리 사전에 침해사고를 예방하는 적극적 보안 행위. 가용성·무결성을 보장하는 보안 운영 기법.", "sub": ""}, {"t": "c", "term": "보안 취약성 진단 및 조치", "def": "운영 환경에 맞게 진단 주기를 적정 수준으로 조정해 지속 관리.", "sub": ""}, {"t": "c", "term": "위협 인지 및 대응", "def": "단순 공격 탐지가 아니라 취약성 파악 후 공격을 탐지하고 임팩트 분석(impact analysis) 수행.", "sub": ""}, {"t": "c", "term": "최근 공격 경향 분석", "def": "최신 취약성·공격 여부를 분석하고 자사 존재 여부·탐지·대응 방법 파악.", "sub": ""}]}, {"title": "보안 위협 차단을 위한 시스템 보안 강화", "items": [{"t": "c", "term": "불필요한 서비스 제거", "def": "원격에서 루트 권한을 취득할 수 있는 popd·imapd·rpc.cmsd 등의 서비스나 rsh·rlogin·rexec 등 'r' 명령어를 필요하지 않으면 제거하고, /etc/inetd.conf 등에서 불필요한 데몬을 주석 처리하는 보안 조치.", "sub": ""}, {"t": "c", "term": "setuid·setgid 설정 감사", "def": "setuid·setgid를 이용한 루트 권한 취득 해킹이 가능하므로 해당 권한이 설정된 파일을 찾아 비인가된 사용 여부를 확인하는 파일 시스템 보안 조치.", "sub": ""}, {"t": "c", "term": "원격지 루트 접속 제한", "def": "리눅스는 /etc/ e Shell)", "def": "원격 단말 접속·명령 실행·파일 전송을 안전하게 해 주는 프로토콜. 텔넷·rsh·rlogin을 대체, 암호화로 기밀성 유지.", "sub": ""}, {"t": "c", "term": "S/MIME", "def": "전자 우편 내용 보호를 위한 수단으로 SMTP를 대체. 디지털 서명과 메시지 암호화 기능 제공.", "sub": ""}]}, {"title": "웹 애플리케이션 취약점 점검 항목", "items": [{"t": "c", "term": "디렉터리 인덱싱 노출 취약점", "def": "웹 애플리케이션 경로를 직접 입력해 접근 시 웹 서버 디렉터리·파일 목록이 출력되면 존재하는 취약점.", "sub": ""}, {"t": "c", "term": "관리자 페이지 노출 취약점", "def": "admin·manager·webmaster 등 추측 가능한 관리자 페이지 경로로 직접 접근 시 관리자 페이지에 접속되면 존재하는 취약점.", "sub": ""}, {"t": "c", "term": "위치 공개 취약점", "def": "추측 가능한 백업 파일명이나 디렉터리 인덱싱을 통해 백업 파일이 노출되면 존재하는 취약점.", "sub": ""}, {"t": "c", "term": "웹 서비스 메소드 설정 공격", "def": "delete·put 등 악의적으로 사용할 수 있는 메소드 요청이 허용되면 존재하는 취약점.", "sub": ""}]}]}]}, {"title": "학습 2. 애플리케이션 보안 솔루션 운영 개선하기", "sections": [{"title": "2-1. 애플리케이션 보안 솔루션 운영 개선 방안 수립", "groups": [{"title": "애플리케이션 보안 솔루션 (종류)", "items": [{"t": "c", "term": "방화벽(Firewall)", "def": "서로 다른 네트워크를 지나는 패킷을 허용/거부하는 HW 또는 SW.", "sub": ""}, {"t": "c", "term": "침입 차단 시스템(IPS)", "def": "외부→내부 유입 패킷 중 악의적 패킷을 찾아 제어하는 HW/SW.", "sub": ""}, {"t": "c", "term": "가상 사설망(VPN)", "def": "전용 회선을 조직 내부 사용자를 드러내지 않고 공유하기 위한 사설 통신망.", "sub": ""}, {"t": "c", "term": "네트워크 접근 통제(NAC)", "def": "내부망 호스트가 네트워크 접근 시 보안 정책에 따라 접속을 제어·통제하는 HW/SW.", "sub": ""}, {"t": "c", "term": "시스템 접근 제어", "def": "시스템(서버)에 접근 권한·경로·실시간 감시를 위한 HW/SW.", "sub": ""}, {"t": "c", "term": "DB 암호화", "def": "DB 저장 데이터의 기밀성 유지를 위해 암·복호화를 수행하는 HW/SW.", "sub": ""}, {"t": "c", "term": "자료 유출 방지(DLP)", "def": "내부 정보 유출을 차단하고 개인정보를 보호하는 HW/SW.", "sub": ""}, {"t": "c", "term": "안티바이러스", "def": "일반적으로 백신 프로그램으로 알려진 SW.", "sub": ""}]}, {"title": "보안 취약점", "items": [{"t": "c", "term": "보안 취약점", "def": "HW·SW의 결함이나 설계상 허점으로 권한 이상의 명령·정보 열람을 허용할 수 있는 약점.", "sub": ""}, {"t": "c", "term": "CVE(Common Vulnerabilities and Exposures)", "def": "알려진 보안 취약점 정보를 공유·대처하기 위해 미국 MITRE 재단이 제공하는 취약점 목록 체계.", "sub": ""}, {"t": "c", "term": "시큐어 코딩", "def": "개발 과정에서 휴먼 오류·논리적 오류로 발생 가능한 보안 취약점을 최소화하는 사전 예방 활동(국내 2012년 SW개 보시스템 자원을 고갈시켜 서비스 불가 상태로 만드는 공격.", "sub": ""}, {"t": "c", "term": "애플리케이션 보안 취약점 7대 유형", "def": "입력 데이터 검증 및 표현(SQL 인젝션·XSS), 보안 기능(부적절한 인가·취약한 암호화), 시간 및 상태(제어문 없는 재귀함수), 에러 처리(오류 메시지 통한 정보 노출), 코드 오류(타입 변환·자원 반환 오류, 널 포인터 역참조), 캡슐화(잘못된 세션에 의한 정보 노출), API 오용(DNS lookup 의존 보안 결정).", "sub": ""}]}, {"title": "애플리케이션 보안 취약점 점검 도구", "items": [{"t": "c", "term": "Nikto", "def": "Perl 기반의 널리 알려진 무료 웹 취약점 스캐너.", "sub": ""}, {"t": "c", "term": "Paros", "def": "JAVA 기반으로 HTTP·HTTPS를 지원하며 Proxy·XSS·SQL Injection 점검과 HTML 리포트를 제공하는 Proxy 도구.", "sub": ""}, {"t": "c", "term": "Wikto", "def": "Nikto의 윈도우 버전으로 Google API를 제공하는 점검 도구.", "sub": ""}, {"t": "c", "term": "Absinthe", "def": "Blind SQL Injection을 점검하는 SQL Injection 스캐너.", "sub": ""}, {"t": "c", "term": "AD 주입 도구", "def": "링크를 따라가며 취약한 페이지를 확인하는, 비교적 정확한 결과를 얻는 SQL Injection 스캐너.", "sub": ""}, {"t": "c", "term": "NBSI", "def": "SQL Injection 공격 도구.", "sub": ""}, {"t": "c", "term": "nmap", "def": "포트가 열려 있는지 점검할 수 있는 오픈소스 포트 점검 도구.", "sub": ""}]}, {"title": "네트워크 기반 위협 식별", "items": [{"t": "c", "term": "망 분리", "def": "외부망과 내부망을 구분하여 구성함으로써 악의적 공격으로부터 보호 영역과 노출 영역을 식별하는 것.", "sub": ""}]}]}, {"title": "3-2. 복구 및 문서화", "groups": [{"title": "애플리케이션 보안 취약점 확인 (취약점 정보 체계)", "items": [{"t": "c", "term": "CVE(Common Vulnerabilities and Exposures)", "def": "알려진 보안 취약점 목록 체계. 'CVE-연도-등록번호' 형식(2015년부터 자릿수 제한 없음). MITRE 제공.", "sub": ""}, {"t": "c", "term": "CWE(Common Weakness Enumeration)", "def": "일반적 취약점을 열거해 SW 취약점 유형을 정형화한 목록을 개발자·보안 관계자에게 제공. MITRE 제공.", "sub": ""}, {"t": "c", "term": "CWE/SANS Top25", "def": "CWE 중 치명적 약점을 정리한 목록. 프로그래밍·설계·아키텍처 오류 자료를 제공해 사전 예방.", "sub": ""}, {"t": "c", "term": "OWASP Top 10", "def": "MITRE·PCI DSS·DISA·FTC 등이 참여해 애플리케이션 보안 위험 상위 10개를 선정·발표.", "sub": ""}, {"t": "c", "term": "2021년 Top10", "def": "A1 취약한 접근 제어, A2 잘못된 암호(Cryptographic failures), A3 인젝션, A4 안전하지 않은 설계, A5 보안 설정 오류, A6 취약하고 오래된 컴포넌트, A7 식별 및 인증 실패, A8 소프트웨어 및 데이터 무결성 실패, A9 보안 로깅·모니터링 실패, A10 서버 사이드 요청 변조(SSRF).", "sub": ""}]}, {"title": "OWASP Top 10 연도별 변화", "items": [{"t": "c", "term": "2013년 Top10", "def": "A1 인젝션, A2 인증 및 세션 관리 취약점, A3 크로스 사이트 스크립팅(XSS), A4 취약한 직접 객체 참조, A5 보안 설정 오류, A6 민감 데이터 노출, A7 기능 수준의 접근 통제 누락, A8 크로스 사이트 요청 변조(CSRF), A9 알려진 취약점이 있는 컴포넌트 사용, A10 검증되지 않은 리다이렉트 및 포워드.", "sub": ""}, {"t": "c", "term": "2017년 Top10", "def": "A1 인젝션, A2 취약한 인증, A3 민감한 데이터 노출, A4 XML 외부 개체(XXE), A5 취약한 접근 통제, A6 잘못된 보안 구성, A7 크로스 사이트 스크립팅(XSS), A8 안전하지 않은 역직렬화, A9 알려진 취약점이 있는 컴포넌트 사용, A10 불충분한 로깅 및 모니터링.", "sub": ""}]}]}]}, {"title": "학습 4. 애플리케이션 보안 솔루션 업데이트 적용하기", "sections": [{"title": "4-1. 애플리케이션 보안 솔루션 업데이트 계획 수립", "groups": [{"title": "애플리케이션 보안 솔루션 업데이트 분류", "items": [{"t": "c", "term": "보안 기능 향상을 위한 업데이트", "def": "웹 방화벽·유해 사이트 차단 시스템 등은 신규 공격 패턴·악성 URL 추가 시마다 주기적 업데이트 필요.", "sub": ""}, {"t": "c", "term": "운영 SW 오류 및 보안 취약점 제거", "def": "솔루션 구현 SW의 오류·취약점이 발견되면 공격자가 악용·우회할 수 있으므로 최신 버전으로 업데이트.", "sub": ""}]}, {"title": "애플리케이션 보안 솔루션 업데이트 방식", "items": [{"t": "c", "term": "제조업체 패치서버를 통한 온라인 업데이트", "def": "제조업체 전용 패치서버로 온라인 업데이트(방화벽 접근 통제 권장). 안전·신속하나 서버 해킹·무결성 미확인 시 모든 사용자 피해 우려.", "sub": ""}, {"t": "c", "term": "제조사 홈페이지 등을 통한 오프라인 업데이트", "def": "홈페이지·메일로 패치파일을 별도 제공받아 업데이트. 다소 불편하나 무결성 검증 후 적용해 더 안전. 솔루션이 여러 개면 PMS로 업데이트 가능.", "sub": ""}]}, {"title": "패치 관리", "items": [{"t": "c", "term": "PMS(Patch Management System)", "def": "안전하게 검증된 패치파일을 조직 내 여러 개의 보안 솔루션에 적용·업데이트할 수 있는 패치관리시스템.", "sub": ""}, {"t": "c", "term": "패치 관리 절차", "def": "신규 업데이트 정보 수집 → 애플리케이션 보호 대상 목록 작성 → 보안 솔루션 목록·벤더 패치 방법 정리 → 최신 보안 취약성·패치 확인 → 시스템 환경 분석 → 패치 적용 계획 수립 → 패치 테스트 → 패치 적용 → 이상 현상 모니터링의 일련의 절차.", "sub": ""}]}]}, {"title": "4-2. 애플리케이션 보안 솔루션 업데이트 적용", "groups": [{"title": "애플리케이션 보안 솔루션 업데이트 체계", "items": [{"t": "c", "term": "애플리케이션 보안 솔루션 업데이트 체계", "def": "솔루션 SW의 기능 개선·버그·취약점 수정을 위해 벤더사가 내놓는 프로그램. 업데이트 체계는 취약점 확인→수정 SW 검색·다운로드→설치의 과정. 구성: 업데이트 중앙 서버(벤더), 업데이트 관리 서버(기관), 클라이언트 장치.", "sub": ""}, {"t": "n", "text": "업데이트 유형 :"}, {"t": "c", "term": "온라인/오프라인", "def": "수동 업데이트(오프라인, 직접 다운로드·설치), 자동 업데이트(온라인, 일정에 따라 검사·다운로드·설치). 최근 자동 업데이트가 일반적.", "sub": ""}, {"t": "c", "term": "중요도", "def": "중요 업데이트(취약점 패치·중대 문제 개선 등 필수), 선택적 업데이트(작업 환경 향상·드라이버·신규 SW 등 선택).", "sub": ""}, {"t": "c", "term": "자동 업데이트 동작 구조", "def": "① 중앙 서버→관리 서버로 패치 정보(버전·URL 목록) 송신 → ② 최신이 아니면 파일 다운로드 → ③ 패치 전 설정값 등 중요 정보 백업 → ④ 업데이트 대상 파일 설치.", "sub": ""}]}, {"title": "업데이트 적용·복구", "items": [{"t": "c", "term": "업데이트 사전 테스트", "def": "실제 운영 환경과 동일한 환경(개발 환경·테스트 시스템)에서 업데이트를 미리 적용해 오류 발생·정상 작동 여부를 확인하는 것.", "sub": ""}, {"t": "c", "term": "롤백(rollback)", "def": "업데이트가 정상적으로 적용되지 않을 경우 사전에 백업한 데이터를 이용해 이전 상태로 되돌리는 작업.", "sub": ""}]}]}]}], "count": 81}, {"id": "07", "title": "보안로그 분석", "notes": ["학습모듈: 보안시스템 로그를 분석하고, 보안로그 상관분석을 수행하며, 탐지패턴을 개발·최적화한다."], "units": [{"title": "학습 1. 보안시스템 로그 분석하기", "sections": [{"title": "1-1. 보안로그 확인", "groups": [{"title": "보안로그", "items": [{"t": "c", "term": "로그(Log)의 개념", "def": "특정 사건(Event) 발생 시 발생 시점·내용·발생 주체 등의 정보를 기록한 것. 정책에 해당/위반되는 사건이나 장애 등 목표한 사건의 상세 내역을 기록.", "sub": ""}, {"t": "c", "term": "보안로그(Security Log)의 정의", "def": "로그 중 \"보안사건에 해당하는 로그\". 보안정책에 해당하는 사건에 대한 기록으로, 주체·객체·발생 시간·행위·영향 범위 등의 정보를 포함.", "sub": ""}]}, {"title": "사이버 공격", "items": [{"t": "c", "term": "사이버 공격", "def": "인터넷을 통해 이루어지는 외부의 인가되지 않은 공격으로, 내부 중요 정보가 변조·삭제·유출되는 현상.", "sub": ""}, {"t": "c", "term": "사이버 공격 유형", "def": "홈페이지 악성코드 유포, 홈페이지 변조, DDoS, 피싱(Phishing), 파밍(Pharming), 스미싱(Smishing).", "sub": ""}, {"t": "c", "term": "사이버공격 발생 순서", "def": "자산(가치+강점/취약점 동시 존재) 인지 → 자산 특성 조사·정보 수집 → 취약점 확인 → 악용 도구(Tool) 확보 → 취약점 공격.", "sub": ""}, {"t": "c", "term": "사이버공격 사례(자산별 취약점·위협)", "def": "NW Service(Socket Buffer의 한계→DDoS 공격), 중요 전자문서(권한 획득 시 File 접근→Ransomware 공격), 범용 Site(누구나 신뢰하는 평판→Phishing Server 변환·악성코드 유포), Smartphone(소형·분실 용이→분실 시 악용), 공인 인증서(File 형태→Dictionary 공격으로 인증서 비밀번호 획득), 사용자의 관심(URL 선택→해당 Server 접근·Smishing).", "sub": ""}]}, {"title": "침해대응 절차", "items": [{"t": "c", "term": "침해대응 절차", "def": "침해(보안)사고 발생 시 대응하는 일련의 과정과 수행 행동. 사고 유형별 세부 대응 지침 마련 필요.", "sub": ""}, {"t": "c", "term": "수립 목적", "def": "이해관계자별 역할·책임 명시로 신속한 업무 복구 유도, 조치 업무 순서·책임 범위 규정.", "sub": ""}, {"t": "c", "term": "침해사고 대응 절차", "def": "사고 전 준비 → 사고 탐지(이상 징후·정탐/오탐 확인) → 초기 대응(세부사항 기록·관련 부서 통지) → 대응 전략 수립(전파·후속 공격 차단) → 사고 조사(데이터 수집·분석·복구) → 종료(보고서 작성·개선안 도출).", "sub": ""}]}]}, {"title": "1-2. 보안로그 분석", "groups": [{"title": "보안사건 판단", "items": [{"t": "c", "term": "보안사건 판단", "def": "침해사고 발생 시 해당 접근이 악의적 공격인지 정상 접근인지를 분석하는 행위.", "sub": ""}, {"t": "c", "term": "보안사건 탐지", "def": "정책(규칙)과 일치 여부 확인 → 일치 시 '탐지', 불일치 시 '미탐지'. 규칙에 없으나 악의적 공격이면 Zero-day 공격으로 분류해 담당자가 직접 차단.", "sub": ""}, {"t": "n", "text": "보안사건 탐지 분류 :"}, {"t": "c", "term": "정탐", "def": "정해진 규칙에 따라 보안사고를 정상 탐지(침해 사건을 보안사고로 판정, 비침해를 비사고로 판정).", "sub": ""}, {"t": "c", "term": "오탐", "def": "탐지 오류(보안사고가 아닌데 사고로 판정, 침해사건을 비사고로 판정).", "sub": ""}, {"t": "n", "text": "오탐 유형 :"}, {"t": "c", "term": "FAR(False Acceptance Ratio)", "def": "악의적 공격을 정상 접근으로 판단하는 오탐. 규칙 부재·과도한 예외처리 시 발생, 보안 요구사항 높은 조직에서 발생.", "sub": ""}, {"t": "c", "term": "FRR(False Reject Ratio)", "def": "정상 접근을 보안 사건으로 판단하는 오탐. 규칙 오설정·예외처리 미적용 시 발생, 보안 요구사항 낮은 조직에서 발생.", "sub": ""}, {"t": "c", "term": "ERR(Equal Error Rate, =CER)", "def": "FRR과 FAR이 동일하여 탐지 효율이 가장 높은 상태.", "sub": ""}]}, {"title": "IP Packet", "items": [{"t": "c", "term": "IP(Internet Protocol) 개념", "def": "인터넷상의 한 컴퓨터에서 다른 컴퓨터로 데이터를 보내는 프로토콜. OSI 7계층 중 Layer 3의 대표 프로토콜.", "sub": ""}, {"t": "c", "term": "IP Packet 구조", "def": "L2 Header(LAN용, Ethernet/IPX) + L3 Header(WAN용, 논리적 식별자·라우팅, IPv4/IPv6) + L4 Header(네트워크 제어·세션, TCP/UDP/ICMP) + Data(실제 사용자 데이터).", "sub": ""}, {"t": "c", "term": "구조 이해의 의미", "def": "IP Packet은 가장 많이 사용되는 프로토콜이므로 악의적 공격도 이를 사용. 각 Layer의 공격 기법·원리 이해가 필요.", "sub": ""}, {"t": "c", "term": "IP 버전 종류", "def": "IPv5(Internet Stream Protocol, 동일 IPv4 Header 사용), IPv6(128bit 주소체계·약 3.4×10^38개), IPv7(64bit Address·Admin Domain+Network+Host 주소), IPv8(계층적 주소체계), IPv9(TUBA·일종의 IPv6 Util 역할), IPv10~14(Unassigned), IPv15(Reserved).", "sub": ""}]}, {"title": "보안로그 분석 항목", "items": [{"t": "c", "term": "탐지 시간", "def": "침해사고를 탐지한 시간으로, 탐지 내역에 대한 로그를 생성·저장하는 시간.", "sub": "보안로그 조회 항목"}, {"t": "c", "term": "공격 유형(보안로그)", "def": "침해사고의 공격 유형 분류로, BOF·DOS·DDOS·Scan·Injection 등 중 하나로 표기.", "sub": "보안로그 조회 항목"}, {"t": "c", "term": "공격 주체", "def": "공격을 수행하는 Source IP Address. 공격 유형에 따라 공격 주체가 복수일 수 있음.", "sub": "보안로그 조회 항목"}, {"t": "c", "term": "공격 대상", "def": "공격을 당하는 Destination IP Address. 공격 유형에 따라 공격 대상이 복수일 수 있음.", "sub": "보안로그 조회 항목"}, {"t": "c", "term": "공격 내용", "def": "실제 공격 내용으로 공격 경로(Routing 경로·지역 정보), 공격 원리(인지한 OSI 7 Layer 계층), 공격 Packet(Dump Packet), 조치 사항(자동 대응 이력), 공격 상세 설명, 공격 중요도(위험도), Comment를 포함.", "sub": "보안로그 조회 항목"}, {"t": "c", "term": "CVE Code(Common Vulnerabilities and Exposures)", "def": "공격이 발생하게 된 취약점의 표준 명칭 및 상세 설명 Link.", "sub": "보안로그 조회 항목"}, {"t": "c", "term": "BOF(Buffer Over Flow) 공격", "def": "Web Server 등의 Buffer Over Flow를 이용한 공격으로, 공격 성공 시 Server Memory 소진으로 Server Down이 발생.", "sub": "보안로그 조회 항목"}, {"t": "c", "term": "Log Group", "def": "검색된 보안로그를 논리적으로 통합해 생성한 하나의 로그 묶음으로, 기본정보 분석 순서를 결정하고 조회 항목별로 Mapping함.", "sub": "보안로그 추출·분석"}, {"t": "c", "term": "IP 추출 기법", "def": "Log에서 확인된 IP Address를 Copy & Paste 하는 등의 방법으로 공격자 IP를 추출하고, 추출된 IP의 적정성(IP Address 규칙 부합) 여부를 검사.", "sub": "보안로그 추출·분석"}, {"t": "c", "term": "패킷 저장 규칙", "def": "사건과의 연관성 확인을 위해 사건 번호·공격 방식·일시 등을 File 이름에 포함하는 규칙(예: [공격 유형]_[공격자 IP].pktdmp).", "sub": "보안로그 추출·분석"}]}]}]}, {"title": "학습 2. 보안로그 상관분석하기", "sections": [{"title": "2-1. 시스템별 보안로그 분석", "groups": [{"title": "보안시스템 선별", "items": [{"t": "c", "term": "보안로그 기록", "def": "대부분의 정보시스템은 보안사고 여부와 무관하게 로그를 기록하며, 그중 보안사건에 해당하면 보안로그로 간주.", "sub": ""}, {"t": "n", "text": "보안시스템 유형 :"}, {"t": "c", "term": "네트워크", "def": "방화벽(정책 기반 트래픽 허용/차단·URL 차단·정보유출 차단), VPN(암호키 관리·암복호화·Replay 감지), IPS/IDS(악성코드 탐지·차단·격리), NAC(인증·비인가 시스템 차단).", "sub": ""}, {"t": "c", "term": "Platform", "def": "Vaccine(악성코드 탐지·차단·복구), PMS(OS 패치·비인가 SW 탐지), 키보드 보안(키 입력 암호화), SecureOS(자원 비인가 접근 차단·비정상 프로세스 탐지).", "sub": ""}, {"t": "c", "term": "Application", "def": "DRM·DLP(전자문서 생성/수정/출력 통제), USB 보안(분실·장착 식별·데이터 삭제), PKI(인증서 발행/폐기/갱신).", "sub": ""}, {"t": "n", "text": "보안로그 기록 방식 :"}, {"t": "c", "term": "저장 Type", "def": "File(저장 용량 최소화·저용량 시 검색 속도↑), Database(저장 공간 증대·대용량 시 검색 속도↑·암호화·통합 저장).", "sub": ""}, {"t": "c", "term": "저장 위치", "def": "Local Storage(내부 File System 활용, 장치 고장 시 활용 불가), 통합 로그 서버(네트워크로 다수 시스템 로그를 한 서버에 저장·연관 분석·수평 확장 가능).", "sub": ""}, {"t": "c", "term": "Platform별 보안로그", "def": "운영체제·로그 종류에 따라 저장 방식(File/Text, File/Binary)·조회 방법(제어판, GUI, Shell)이 상이.", "sub": ""}]}, {"title": "사이버공격 판별", "items": [{"t": "c", "term": "사이버공격 탐지 방법", "def": "보안 침해 사고의 탐지, 인가되지 않은 정보의 변경·유출·변조, 정보시스템의 활용 불가능 상태 확인 등.", "sub": ""}, {"t": "c", "term": "사이버공격 판정 기준", "def": "단일/복수 정보시스템에서의 비인가 행위 탐지·차단, 인가되지 않은 정보의 변경·유출·변조 확인, 악의적 행위로 발생한 정보시스템 장애 확인, 악성코드 추정 SW의 설치·동작 확인, 복수 시스템의 동시 다발적 보안 침해사고로 판단되는 행위의 탐지 등.", "sub": ""}]}]}, {"title": "2-2. 상관분석", "groups": [{"title": "공격경로 확인 기법", "items": [{"t": "c", "term": "공격경로의 개념", "def": "외부 악의적 행위자가 내부 시스템에 실행한 공격의 경로를 확인·도식화하는 행위. 공격 기법·도구·지원 시스템·플랫폼도 함께 조사.", "sub": ""}, {"t": "c", "term": "기본 공격경로 확인 기법", "def": "공격 주체 확인, 단순 Routing 경로·Tracerouting 확인(1차 공격지까지 경로). 공격 주체 검증은 어려움.", "sub": ""}, {"t": "c", "term": "상세 공격경로 확인 기법", "def": "공격 주체 시스템에 직접 접속해 로그·행위 분석. 실제 공격 주체 여부·경로 시스템 여부 검증, 공격 기법·취약점 확인 가능.", "sub": ""}, {"t": "c", "term": "확인 시 주의사항", "def": "제2~3국 공격 주체 확인은 수사 협조 필요(미협조 시 국제법 위반), 주체 특정 검증은 Terminal Service·Relay Tool·계정 도용 여부까지 반복 검증.", "sub": ""}]}, {"title": "피해분석 범위", "items": [{"t": "c", "term": "피해분석의 개념", "def": "침해사고로 인한 내부 전체 자산의 피해 정도를 확인하는 행위. 물리적 피해뿐 아니라 논리적 피해·복구 비용을 포괄.", "sub": ""}, {"t": "c", "term": "피해분석 범위 유형", "def": "직접적 피해(물리적 피해-시스템 손상·교체, 논리적 피해-연계·지원 정도 대상), 간접적 피해(보안솔루션 도입 비용, 소송 대응·보상 등).", "sub": ""}, {"t": "c", "term": "피해분석 범위의 특징", "def": "직접적 피해 복구비용은 예상 가능하나 간접적 피해 복구비용은 예상이 사실상 불가능. 단기적으로는 직접적 피해 복구비용이 높을 수 있으나 장기적으로는 간접적 피해 복구비용이 높음.", "sub": ""}]}, {"title": "상관분석", "items": [{"t": "c", "term": "상관분석의 개념", "def": "보안 솔루션/시스템에서 발생한 다수의 보안 Event 발생의 관계를 분석하고, 각 보안사건에 대한 대응 방안을 수립하는 행위.", "sub": ""}, {"t": "c", "term": "상관분석 목적", "def": "Minor한 보안사건 간 연관관계 확인 → 종합적 사고 발생 범위·경위 조사 → 전체 보안사건에 대한 통합 대응방안 도출 → 예방·재발 방지 대책 도출.", "sub": ""}, {"t": "c", "term": "상관분석 개념도", "def": "단일 보안사건 간 연관관계를 조사·분석해 전체적으로 하나의 통합 보안사건으로 간주하고 거시적 대응방안을 수립·적용.", "sub": ""}, {"t": "c", "term": "상관분석 사례", "def": "침해 주체/경로로 평가받는 국가발 웹 접속 단순 탐지 이벤트가 방화벽에서 발생한 직후 IPS에서 BOF 공격이 탐지되고 BOF 출발지가 방화벽 탐지 국가와 동일하면, 두 이벤트를 '악의적 공격'으로 간주해 즉각 차단·방어 조치 수행.", "sub": ""}]}, {"title": "공격경로 분석·히스토리", "items": [{"t": "c", "term": "Trace Routing", "def": "공격경로 분석에 사용하는 명령(예: Windows의 tracert -d [IP address]). 실행 결과를 바탕으로 공격 경로를 확인하고 도식화함.", "sub": ""}, {"t": "c", "term": "공격 경로 도식화", "def": "전체 Flow를 도출하고 Flow의 Node를 도출한 뒤 각 Node 항목과 Action·특이사항을 입력해 공격 경로를 정리하는 작업.", "sub": ""}, {"t": "c", "term": "공격 히스토리 분석", "def": "경로분석 결과의 Node(출발지 IP·Subnet, 경로상 국가·지역 Node)를 과거 침해사고 이력의 경로분석 결과와 대조해 유사/동일 공격 존재 여부를 확인하고 공격 동향을 판정.", "sub": ""}]}]}]}, {"title": "학습 3. 탐지패턴 개발하기", "sections": [{"title": "3-1. 탐지패턴 개발", "groups": [{"title": "탐지패턴 개발", "items": [{"t": "c", "term": "개발 목적", "def": "새롭게 발견된 공격이 재발할 경우 즉각 탐지·차단하기 위해 탐지패턴을 개발·적용.", "sub": ""}, {"t": "n", "text": "탐지 모형 :"}, {"t": "c", "term": "이상 탐지", "def": "정보·정보 유입 순서가 규칙에 부합하는지 확인, 규칙 위반 시 보안사건으로 간주(예: 규칙 i=정수인데 i=\"A\"이면 이상 행위).", "sub": ""}, {"t": "c", "term": "오용 탐지", "def": "정보 활용 정도를 확인, 접근/반복 시도가 임계치를 초과하면 위반으로 간주(예: 규칙 1Gbps인데 5Gbps 유입이면 오용 행위).", "sub": ""}, {"t": "n", "text": "탐지패턴 개발 프로세스 :"}, {"t": "c", "term": "공격 기법 분석", "def": "공격의 유니크한 특징 도출(공격 순서·메카니즘 분석, 영향받는 시스템·SW 식별, 피해 정도 산정).", "sub": ""}, {"t": "c", "term": "탐지패턴 개발", "def": "적용 보안시스템 선정, 적용 가능한 규칙(정규식 등) 선정, 공격 특징 표현, 보안시스템에 적용.", "sub": ""}, {"t": "c", "term": "탐지패턴 검증", "def": "동일·유사 공격으로 정탐률·오탐률 검사, 반복 수행으로 최적화.", "sub": ""}, {"t": "c", "term": "탐지패턴 배포", "def": "동일·유사 보안시스템에 전달·적용.", "sub": ""}, {"t": "c", "term": "탐지패턴 개발 도구", "def": "보안로그(출발지/경유지 IP·국가·Port·프로토콜·Packet 내용 도출), 공격도구(공격 Sequence·메카니즘 확보).", "sub": ""}, {"t": "c", "term": "공격도구 분석 항목", "def": "공격도구(Tool) 분석을 통해 공격 유형·공격 기법/기술·공격 대상의 취약점·공격 Sequence(순서)를 도출.", "sub": ""}, {"t": "c", "term": "탐지패턴 표현식", "def": "탐지패턴은 정형·비정형으로 모두 표현 가능하며 동일 공격 발생 시 항상 탐지하도록 개발. 정형·비정형 표현에 'Regular Expression(정규표현식)'을 가장 많이 사용.", "sub": ""}, {"t": "c", "term": "탐지패턴 효율", "def": "개발된 탐지패턴은 정탐 기준으로 공격을 차단하는 것이 목적이나 정상 Traffic도 차단하는 오탐 가능성이 있으므로 효율성·효과성을 적절히 분석해야 함.", "sub": ""}, {"t": "c", "term": "탐지패턴 적용 보안시스템", "def": "개발된 탐지패턴을 탑재·적용할 수 있는 시스템(IDS, IPS, Vaccine, UTM, 기타 행위기반 탐지 기능 제공 시스템). 일반적으로 Blacklist 방식으로 동작해 일치하는 공격을 차단.", "sub": ""}, {"t": "c", "term": "UTM(Unified Threat Management)", "def": "개발된 탐지패턴을 적용할 수 있는 통합위협관리 보안시스템.", "sub": ""}, {"t": "c", "term": "탐지패턴 대응행동", "def": "탐지 및 차단(이력 기록 후 해당·추가 공격 차단), 탐지 Only(이력만 기록, 공격 정보 수집 시 사용), 미탐지(탐지 공격의 효과성이 없을 경우 무시).", "sub": ""}, {"t": "c", "term": "탐지 Field", "def": "탐지패턴(정규 표현식)을 구성하는 항목으로 출발지/목적지 IP Address(Dot.Decimal), 출발지/목적지 Port(Integer), Protocol(TEXT), Data Field(Offset·Field Expression/HEXA·TEXT)로 구성.", "sub": ""}]}]}, {"title": "3-2. 탐지패턴 최적화", "groups": [{"title": "탐지패턴 최적화", "items": [{"t": "c", "term": "최적화 목적", "def": "오탐률 최소화·정탐률 증가, 탐지 Resource 소모 최소화·속도 증가, 업무 지속성 보장·외부 공격 차단의 개선 과정.", "sub": ""}, {"t": "n", "text": "탐지패턴 최적화 프로세스 :"}, {"t": "c", "term": "탐지패턴 적용", "def": "개발된 패턴을 보안시스템에 업로드·적용(Monitoring만 적용 가능).", "sub": ""}, {"t": "c", "term": "탐지율 평가", "def": "인위적으로 동일 침해사고를 발생시켜 탐지 여부 확인, 정상·유사 접속으로 오탐 확인(최소 1일 이상 지속 평가).", "sub": ""}, {"t": "c", "term": "원인 분석", "def": "패턴 분석·업무 시스템 환경 분석·오탐 Traffic과 현행 패턴의 Gap 분석.", "sub": ""}, {"t": "c", "term": "탐지패턴 개선", "def": "탐지 범위·표현식 변경 및 재적용.", "sub": ""}, {"t": "c", "term": "최적화 주의사항", "def": "초기 패턴은 Monitoring만 적용(업무 지장 방지), 탐지 범위 과대 설정 시 오탐↑, 과소 설정 시 미탐↑, 표현식 오류 시 Resource 과소모·성능 저하.", "sub": ""}]}, {"title": "탐지 성능 개선", "items": [{"t": "c", "term": "배경", "def": "개발 직후 탐지패턴은 오탐률·Resource 소모량이 높아 효율이 떨어짐.", "sub": ""}, {"t": "c", "term": "목적", "def": "탐지 범위·방법을 변경하여 탐지 효율·성능을 높임.", "sub": ""}, {"t": "n", "text": "탐지 성능 개선 기법 :"}, {"t": "c", "term": "탐지 범위 조정", "def": "범위 축소(미탐률↓·오탐률↑), 범위 확대(정탐률↑·Resource 사용↑).", "sub": ""}, {"t": "c", "term": "탐지 표현식 변경", "def": "Converting 과정을 최소화하여 탐지 효율을 높임.", "sub": ""}, {"t": "c", "term": "탐지 순서 변경", "def": "조합 패턴을 동시 매칭/단일 패턴으로 변경해 성능 향상.", "sub": ""}, {"t": "c", "term": "탐지 적용 대상 변경", "def": "가변 범위를 모두 포함한 패턴으로 변경해 Skip 과정에 의한 성능 저하 방지.", "sub": ""}]}, {"title": "탐지패턴 적용 효과 평가", "items": [{"t": "c", "term": "탐지패턴 적용 효과 평가 기준", "def": "탐지패턴 적용 후 오탐률·정탐률·리소스(Resource) 사용률·탐지 성능에 대한 만족 기준을 수립해 평가(예: 오탐률 전체 탐지의 1% 이하, 정탐률 동일/유사 탐지의 95% 이상, 리소스 사용률·탐지 성능 현행 수준 ±1% 유지).", "sub": ""}, {"t": "c", "term": "탐지패턴 지속 적용 결정", "def": "탐지패턴과 연관된 이해관계 부서·영향 업무 범위·업무 효과를 조사하고, 이해관계자를 소집해 적용에 따른 영향과 연관관계를 설명한 뒤 지속 적용 또는 개선 여부를 결정.", "sub": ""}]}]}]}], "count": 82}, {"id": "08", "title": "정보 시스템 진단", "notes": ["학습모듈: 정보 시스템 진단 기준을 마련하고, 진단 결과를 도출하며, 대응책을 마련한다."], "units": [{"title": "학습 1. 정보 시스템 진단 기준 마련하기", "sections": [{"title": "1-1. 정보 시스템 진단 준비 및 취약점 정보 파악", "groups": [{"title": "정보 시스템의 개요", "items": [{"t": "c", "term": "정보 시스템의 개요", "def": "정보 시스템은 기업이 다양한 의사 결정을 내리는 데 필요한 정보를 수집하고 그것을 목적에 따라 가공하며, 그 결과를 의사 결정자에게 제공하는 구조이다.", "sub": ""}, {"t": "n", "text": "정보 시스템의 관리 요소(10가지) :"}, {"t": "c", "term": "구성 및 변경 관리", "def": "HW·SW의 구성 현황·이력·구성 파일·파라미터·구성도를 관리하고 변경 사항을 효율적으로 관리하는 업무.", "sub": ""}, {"t": "c", "term": "운영 상태 관리", "def": "구성 요소의 운영 상태를 관리해 이상 징후를 발견·기록·분류·통지하여 가용성을 향상.", "sub": ""}, {"t": "c", "term": "성능 관리", "def": "효율·응답 속도를 최적 상태로 유지하기 위해 낮은 성능 요소를 찾아 개선.", "sub": ""}, {"t": "c", "term": "장애 관리", "def": "SW·HW·DB·네트워크의 고장·장애·서비스 불능을 관찰·진단·보고·제어·처리하는 과정.", "sub": ""}, {"t": "c", "term": "보안 관리", "def": "정보 자산의 정보 보호 활동·절차를 체계적으로 관리해 기밀성·무결성·가용성을 확보하고 불법 유출·파괴·변경으로부터 보호.", "sub": ""}, {"t": "c", "term": "백업 관리", "def": "장애·재해로 정보 소실·손상에 대비해 데이터를 별도 매체에 예비 저장하여 정보 시스템의 영속성을 보장.", "sub": ""}, {"t": "c", "term": "사용자 지원 관리", "def": "운영 지침서 수정·보완, 교육, 요구 처리 등으로 최종 사용자 만족도를 향상.", "sub": ""}, {"t": "c", "term": "전산실 관리", "def": "전산실 접근 통제와 건물·설비 관리로 전산 시스템 운용의 안전성·신뢰성을 보장.", "sub": ""}, {"t": "c", "term": "운영 아웃소싱 관리", "def": "효율적·체계적 운영을 위해 외부 기관으로부터 운영 서비스를 획득하는 절차.", "sub": ""}, {"t": "c", "term": "예산 관리", "def": "운영 예산 소요를 예측하고 예산을 계획·집행·통제하는 절차와 지침.", "sub": ""}]}, {"title": "위험의 정의", "items": [{"t": "c", "term": "위험의 정의", "def": "위험(risk)은 원하지 않는 사건이 발생하여 손실 또는 부정적 영향을 미칠 가능성. 손실 사건 발생 가능성과 발생 손실 정도에 비례.", "sub": ""}, {"t": "c", "term": "위험 평가 산식", "def": "위험 = 발생 가능성 × 손실의 정도.", "sub": ""}, {"t": "c", "term": "위험 평가 함수", "def": "위험 = f(자산, 위협, 취약성).", "sub": ""}]}, {"title": "위험의 구성 요소", "items": [{"t": "c", "term": "자산(Asset)", "def": "조직이 보호해야 할 대상(정보·HW·SW, 인력 등 무형 자산 포함). 데이터·문서·SW·HW·물리적·인적 자산 등으로 구분. 위험 분석 시 보안 사고 발생 시의 손실(loss)을 파악.", "sub": ""}, {"t": "c", "term": "위협(Threats)", "def": "자산에 손실을 초래할 수 있는 원치 않는 사건의 잠재적 원인. 환경적 요인(자연재해·장비 고장)과 인간에 의한 위협(의도적/우연적)으로 분류. 핵심 속성은 발생 가능성(연간 발생 횟수). 위협의 발생 가능성과 성공 가능성은 다를 수 있음.", "sub": ""}, {"t": "c", "term": "취약성(Vulnerability)", "def": "자산의 잠재적 속성으로 위협의 이용 대상, 또는 정보 보호 대책의 미비. 자산과 위협 사이의 관계를 맺어 주는 특성.", "sub": ""}, {"t": "c", "term": "취약성 속성", "def": "모든 자산에 잠재, 그 자체로는 위협을 초래하지 않고 위협에 이용될 때만 위험 발생, 대응책이 늘수록 감소, 대응책 자체도 취약성을 가져 0이 될 수 없음.", "sub": ""}, {"t": "c", "term": "취약성 유형 분류", "def": "관리적 측면(정책·조직·인사), 물리적 측면(건물·시설물), 기술적 측면(네트워크·시스템·DB·PC·응용 프로그램).", "sub": ""}]}, {"title": "자산 평가 및 위협 분석", "items": [{"t": "c", "term": "영향도 파악", "def": "자산 가치 산정 시 단기적 손실과 장기적 영향을 포함하여 자산의 중요도 또는 사고 발생 시 미칠 수 있는 영향의 규모를 파악하는 것.", "sub": ""}, {"t": "c", "term": "자산 중요도 산정", "def": "자산의 기밀성·무결성·가용성 점수를 합친 점수로 중요도 등급을 평가하며, 정성적 기준(기밀성·무결성·가용성)과 정량적 기준(구매 비용·침해 사고 피해 금액)을 사용.", "sub": ""}, {"t": "c", "term": "자산 중요도 등급 전환 기준", "def": "자산의 중요성이 사용 용도·규모·업무 중요도에 따라 변경되므로 자산 중요도 등급의 변경 기준을 미리 설정해 두는 것.", "sub": ""}, {"t": "c", "term": "위협 시나리오", "def": "파악되지 않은 위협을 발견하기 위해 위협 환경을 설정하고 발생 가능한 위협을 유추하여 작성하는 시나리오.", "sub": ""}, {"t": "c", "term": "위협 발생 빈도", "def": "위협이 얼마나 자주 발생하는지를 나타내며, 통계 자료가 없는 경우 발생 가능성을 유추해 산정(피해 규모가 작아도 지속 발생 시 영향이 커질 수 있음).", "sub": ""}, {"t": "c", "term": "피해 규모", "def": "위협이 자산에 미치는 손실의 크기로, 손실 정도와 업무 중단 여부에 따라 낮음·중간·높음·매우 높음으로 구분.", "sub": ""}]}]}, {"title": "1-2. 정보 시스템 위험 평가 방법 및 보호 대책 파악", "groups": [{"title": "위험 평가 방법론", "items": [{"t": "c", "term": "위험 관리", "def": "자산의 위험을 수용 가능한 수준으로 유지하기 위해 위험을 분석하고 보호 대책을 마련하는 과정.", "sub": ""}, {"t": "c", "term": "기준선 접근법(Baseline)", "def": "모든 정보 자산에 보호 기본 수준을 정하고 보호 대책을 적용. 시간·비용 적게 들지만 부서별 보안 수준이 과대/과소할 수 있음.", "sub": ""}, {"t": "c", "term": "비정형 접근법(Informal)", "def": "전문가의 지식·경험으로 위험 분석(전문가 판단법). 작은 조직에 효과적이나 위험 평가·비용 도출이 어렵고 사후 관리 제한.", "sub": ""}, {"t": "c", "term": "상세 위험 분석(Detail Risk Analysis)", "def": "자산 가치·위협·취약성을 분석해 위험 정도를 결정. 적절한 보안 수준 마련 가능하나 전문 지식·시간·노력 소요.", "sub": ""}, {"t": "c", "term": "정성적 위험 평가", "def": "손실·위험을 개략적 크기로 비교, 상황 설명으로 묘사.", "sub": ""}, {"t": "c", "term": "정량적 위험 평가", "def": "위험을 손실액 등 숫자값으로 표현. 연간 기대 손실 = 위협 성공 시 예상 손실액 × 발생률.", "sub": ""}, {"t": "c", "term": "복합 접근법(Combined)", "def": "위험이 높은 시스템은 상세 위험 분석, 그 외는 기준선 접근법 적용. 신속한 보안 전략 수립·효율적.", "sub": ""}]}, {"title": "위험 처리 방법", "items": [{"t": "c", "term": "위험 수용", "def": "현재의 위험을 받아들이고 잠재적 손실 비용을 감수(일정 수준 이하 위험 인정).", "sub": ""}, {"t": "c", "term": "위험 감소", "def": "위험을 감소시키는 대책을 채택·구현. 비용 효과 분석으로 양(+)의 효과를 갖는 대책 선택(보호 대책 효과 = 원래 ALE − 대책 구현 후 ALE − 연간 대책 비용).", "sub": ""}, {"t": "c", "term": "위험 회피", "def": "위험이 존재하는 사업을 수행하지 않고 포기.", "sub": ""}, {"t": "c", "term": "위험 전가", "def": "보험·외주 등으로 잠재적 위험 비용을 제3자에게 이전.", "sub": ""}]}, {"title": "정보 보호 관리 체계", "items": [{"t": "c", "term": "정보 보호 관리 체계", "def": "조직 자산을 효율적으로 보호하도록 기술적·물리적·관리적·조직적 보호 대책을 구현하고 지속 관리·운영하는 종합적 체계. 기밀성·무결성·가용성·준거성 달성을 위해 위험을 평가하고 대책을 수립·운영.", "sub": ""}, {"t": "c", "term": "관리 과정(5단계)", "def": "정보 보호 정책 수립 → 정보 보호 관리 체계 범위 설정 → 위험 관리 → 구현 → 사후 관리.", "sub": ""}]}, {"title": "위험도 평가 및 위험 처리 전략", "items": [{"t": "c", "term": "자산 그룹화", "def": "위험 분석을 위한 자산 분석 과정에서 보안 특성과 중요도가 동일한 같은 종류의 자산을 하나의 그룹으로 묶는 것.", "sub": ""}, {"t": "c", "term": "침투 시험", "def": "기술적 취약성 점검 및 침투 시험을 수행하여 정보 시스템이 비인가된 논리적 접근 또는 사용자 신분 위장에 어느 정도 취약한지를 평가하는 것.", "sub": ""}, {"t": "c", "term": "위험도 평가", "def": "자산 중요도와 발생 가능성에 따라 3단계(높음·중간·낮음) 또는 5단계(매우 높음~매우 낮음)로 평가하며, 위험도는 곧 대응해야 할 우선순위를 의미.", "sub": ""}, {"t": "c", "term": "수용 가능 위험(DoA, Degree of Assurance)", "def": "조직의 사업·업무 특성과 경영진 특성에 따라 결정되는 수용 가능한 목표 위험 수준으로, 기술적으로 결정될 수 없고 최고 경영진이 의사 결정해야 하는 사항.", "sub": ""}, {"t": "c", "term": "목표 위험 수준", "def": "위험을 체계적으로 관리하기 위해 설정하는 기준 수준으로, 이보다 낮은 위험은 수용하고 그 이상의 위험은 목표 수준 달성을 위한 장기 계획을 수립해 대응.", "sub": ""}, {"t": "c", "term": "위험 처리 전략", "def": "위험을 식별한 뒤 위험도가 목표 위험 수준 이하면 수용, 비용 효과적 대책이 존재하면 감소, 적절한 보험·전가 대상이 존재하면 전가, 그렇지 않으면 회피하는 절차.", "sub": ""}]}]}]}, {"title": "학습 2. 정보 시스템 진단 결과 도출하기", "sections": [{"title": "2-1. 정보 시스템 취약점 진단 방법 파악", "groups": [{"title": "서버 취약점", "items": [{"t": "c", "term": "계정 관리", "def": "root 계정 원격 접속 제한, root 계정 전환(su) 제한(무작위 대입·추측 공격 방지), root 외 동일 UID 금지.", "sub": ""}, {"t": "c", "term": "파일 및 디렉터리 관리", "def": "root 홈·PATH 권한 설정(PATH에 \".\" 포함 시 비의도적 명령 실행), 파일·디렉터리 소유자 설정, UMASK 설정 관리, 숨겨진 파일·디렉터리 검색·제거.", "sub": ""}, {"t": "c", "term": "서비스 관리", "def": "r 계열 서비스 비활성화, automountd 제거(RPC 악용 방지), DoS 취약 서비스 비활성화, RPC 서비스 확인(버퍼 오버플로 취약).", "sub": ""}]}, {"title": "네트워크 취약점", "items": [{"t": "c", "term": "계정 관리", "def": "패스워드 복잡성 설정(무작위 대입 방지), 초기 설정 패스워드 변경.", "sub": ""}, {"t": "c", "term": "접근 관리", "def": "불필요한 보조 입출력 포트 사용 금지, vty 접속 시 안전한 프로토콜 사용(Telnet은 평문 전송으로 스니핑에 노출).", "sub": ""}, {"t": "c", "term": "패치 관리", "def": "최신 보안 패치 및 벤더 권고 적용.", "sub": ""}, {"t": "c", "term": "로그 관리", "def": "정책에 따른 로깅 설정, 로깅 버퍼 크기 설정(초과 시 로그 손실).", "sub": ""}, {"t": "c", "term": "기능 관리", "def": "SNMP 서비스 확인(UDP 기반 공격 취약), Spoofing 방지 필터링 적용.", "sub": ""}]}, {"title": "애플리케이션 취약점", "items": [{"t": "c", "term": "부적절한 에러 처리", "def": "다양한 에러를 유발해 에러 결괏값으로 웹 프로그램 구조·환경 설정을 추측해 공격.", "sub": ""}, {"t": "c", "term": "SQL 인젝션", "def": "입력값 유효성 검증 누락 시 조작된 SQL 쿼리로 인증 우회·정보 유출·시스템 명령 실행.", "sub": ""}, {"t": "c", "term": "불충분한 인증", "def": " const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];

/* ---------- 개념 평탄화 & 진도 ---------- */
function conceptsOf(si){
  const out=[]; const s=STUDY_DATA.subjects[si];
  s.units.forEach((u,ui)=>u.sections.forEach((sec,xi)=>sec.groups.forEach((g,gi)=>g.items.forEach(it=>{
    if(it.t==="c") out.push({term:it.term,def:it.def,sub:it.sub,unit:u.title,sec:sec.title,group:g.title,
      id:s.id+"|"+ui+"|"+xi+"|"+gi+"|"+it.term});
  }))));
  return out;
}
const PKEY="secstudy_progress_v1";

const saveP=()=>localStorage.setItem(PKEY,JSON.stringify(progress));
const isLearned=id=>!!progress[id];
function toggleLearned(id){progress[id]?delete progress[id]:progress[id]=1;saveP();}
/* 학습 통계 */
const SKEY="secstudy_stats_v1";
let stats=JSON.parse(localStorage.getItem(SKEY)||"null")||{};
stats.practice=stats.practice||{total:0,correct:0};
stats.flashq=stats.flashq||{total:0,correct:0};
stats.exams=stats.exams||[];
const saveS=()=>localStorage.setItem(SKEY,JSON.stringify(stats));
function recPractice(ok){stats.practice.total++;if(ok)stats.practice.correct++;saveS();}
function recFlash(ok){stats.flashq.total++;if(ok)stats.flashq.correct++;saveS();}
function recExam(rec){stats.exams.unshift(rec);stats.exams=stats.exams.slice(0,20);saveS();}

/* ---------- 렌더 라우터 ---------- */
function render(){

  const isLanding=noSel||state.mode==="landing";
  $$(".tab").forEach(t=>{t.classList.toggle("active",!noSel&&t.dataset.mode===state.mode);t.classList.toggle("disabled",noSel);});
  if(isLanding){ renderLanding(noSel); return; }
  $("#subjTitle").textContent = state.sel.length===1?STUDY_DATA.subjects[state.sel[0]].title:`${state.sel.length}개 과목 선택`;
  if(state.mode==="concept"){
    $("#content").innerHTML='<div class="wrap"><div id="catbar"></div><div id="view"></div></div>';
    renderCatBar(); renderBrowse();
  }else{
    $("#content").innerHTML='<div class="wrap"><div id="drillbar"></div><div id="view"></div></div>';
    renderDrillBar(); renderDrill();
  }
}

/* ---------- 읽기 ---------- */
function hl(text){ if(!state.query)return esc(text);
  const re=new RegExp("("+state.query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
  return esc(text).replace(re,'<mark>$1</mark>'); }
function esc(t){return t.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function renderBrowse(){
  const q=state.query.toLowerCase();
  const match=(a,b)=>!q||(a+ " "+b).toLowerCase().includes(q);
  const ids=(state.catFilter>=0&&state.sel.includes(state.catFilter))?[state.catFilter]:selIdx();
  const multi=selIdx().length>1;
  let html="";
  ids.forEach(si=>{
    const s=STUDY_DATA.subjects[si]; let shtml="";
    if(s.notes.length && !q && !multi) shtml+=`<div class="meta-notes">${s.notes.map(n=>`<span>${esc(n)}</span>`).join("")}</div>`;
    s.units.forEach((u,ui)=>{
      let usec="";
      u.sections.forEach((sec,xi)=>{
        let grp="";
        sec.groups.forEach((g,gi)=>{
          let cur="",rows="",cnt=0;
          g.items.forEach(it=>{
            if(it.t==="n"){ if(!q) rows+=`<div class="note">${esc(it.text)}</div>`; return; }
            if(!match(it.term,it.def)) return; cnt++;
            if(it.sub && it.sub!==cur){cur=it.sub;rows+=`<div class="sub">${esc(it.sub)}</div>`;}
            const id=s.id+"|"+ui+"|"+xi+"|"+gi+"|"+it.term;
            rows+=`<div class="c ${isLearned(id)?'learned':''}" data-id="${id}">
              <button class="mark" title="학습 표시">${isLearned(id)?'✅':'⬜'}</button>
              <div class="term">${hl(it.term)}</div><div class="def">${hl(it.def)}</div></div>`;
          });
          if(rows.trim()) grp+=`<div class="group"><h4>${esc(g.title)||'개념'} <span class="pill">${cnt}</span></h4>${rows}</div>`;
        });
        if(grp) usec+=`<div class="section">${sec.title?`<h3>${esc(sec.title)}</h3>`:""}${grp}</div>`;
      });
      if(usec) shtml+=`<div class="unit"><h2>${esc(u.title)}</h2>${usec}</div>`;
    });
    if(shtml) html+= multi?`<div class="subjblock"><div class="subjh">📁 ${esc(s.title)}</div>${shtml}</div>`:shtml;
  });
  $("#view").innerHTML=html||'<div class="empty">검색 결과가 없습니다.</div>';
  $$(".c .mark").forEach(b=>b.onclick=e=>{e.stopPropagation();const c=b.closest(".c");toggleLearned(c.dataset.id);
    c.classList.toggle("learned");b.textContent=c.classList.contains("learned")?'✅':'⬜';});
}

function buildDeck(){fc.deck=shuffle(poolByScope());fc.pos=0;fc.flip=false;fc.subj=selSig();fc.ses={ok:0,total:0};}

/* 카드 내용만 in-place 갱신 (전체 재렌더 없이 깜빡임 방지) */
function updateCard(){
  const cs=poolByScope(); if(!cs.length)return;
  const c=fc.deck[fc.pos], memo=fc.mode==="memo", t2d=fc.dir==="t2d";
  const done=cs.filter(x=>isLearned(x.id)).length;
  $$("[data-fcm]").forEach(b=>b.classList.toggle("active",b.dataset.fcm===fc.mode));

  $("#fcFTag").textContent=memo?(t2d?"용어":"정의"):(t2d?"용어 (정의를 떠올리세요)":"정의 (용어를 떠올리세요)");
  $("#fcFront").textContent=t2d?c.term:c.def;
  $("#fcHint").textContent=memo?(t2d?"카드를 클릭하면 정의가 보입니다":"카드를 클릭하면 용어가 보입니다"):"생각한 뒤 카드를 클릭/스페이스로 확인";
  $("#fcFCrumb").textContent=c.sub||c.group||"";
  $("#fcBTerm").textContent=c.term;
  $("#fcBDef").textContent=c.def;
  $("#fcBCrumb").textContent=`${c.unit||""} · ${c.sec||""}`;
  $("#fcCounter").textContent=`${fc.pos+1} / ${fc.deck.length} · 암기표시 ${done}/${cs.length}`+(memo?"":` · 이번 세션 ${fc.ses.ok}/${fc.ses.total}`);
  $("#fcHelp").textContent=memo?"스페이스=뒤집기 · ←/→ 이동":"스페이스=확인 · 맞음/틀림으로 채점";
  $("#card").classList.toggle("flipped",fc.flip);
  updateActions();
}
function updateActions(){
  const c=fc.deck[fc.pos], memo=fc.mode==="memo", a=$("#fcActions"); if(!a)return;
  if(memo){
    a.innerHTML=`<button class="btn" id="prev">← 이전</button>`+
      `<button class="btn ${isLearned(c.id)?'ok':''}" id="learn">${isLearned(c.id)?'✅ 외움':'외움 표시'}</button>`+
      `<button class="btn primary" id="next">다음 →</button>`;
    $("#prev").onclick=()=>{fc.pos=(fc.pos-1+fc.deck.length)%fc.deck.length;fc.flip=false;updateCard();};
    $("#next").onclick=()=>{fc.pos=(fc.pos+1)%fc.deck.length;fc.flip=false;updateCard();};
    $("#learn").onclick=()=>{toggleLearned(c.id);updateCard();};
  }else{
    a.innerHTML=fc.flip
      ? `<button class="btn bad" id="wrong">✘ 틀림</button><button class="btn ok" id="rightq">✔ 맞음</button>`
      : `<button class="btn primary" id="reveal">정답 확인 (스페이스)</button>`;
    const rev=$("#reveal"); if(rev)rev.onclick=()=>{fc.flip=true;$("#card").classList.toggle("flipped",true);updateActions();};
    const grade=ok=>{fc.ses.total++;if(ok){fc.ses.ok++;}else{fc.deck.push(c);} recFlash(ok);
      fc.pos++; if(fc.pos>=fc.deck.length)fc.pos=0; fc.flip=false; updateCard();};
    const rg=$("#rightq"); if(rg)rg.onclick=()=>grade(true);
    const wr=$("#wrong"); if(wr)wr.onclick=()=>grade(false);
  }

/* ---------- 퀴즈 (정보보안산업기사 1차/2차 대비) ---------- */
/* 모든 문항은 개념정리(폴더 자료)의 용어·정의를 '그대로' 사용해 생성한다. */
const EXAMS={
  "1":{name:"1차 (필기·객관식/주관식)",
    types:[["mc_d2t","4지택일"],["ox","진위형 O/X"],["match","연결형"],["short","단답형"]],
    info:"1차 대비: 모든 문항은 '설명 → 용어' 방향 · 전체 개념 출제 · 합격 40%"},
  "2":{name:"2차 (실기·필답형)",
    types:[["bank","보기 골라쓰기"]],
    info:"2차 대비: 설명을 보고 보기에서 알맞은 용어 선택 · 전체 개념 출제 · 합격 60%"}
};
let quiz={exam:"1",type:"mc_d2t",len:10,set:[],idx:0,summary:false,_sig:""};
const QUIZ_LENS=[10,20,30];
function quizPool(){return poolByScope();}
function resetQuiz(){quiz.set=[];quiz.idx=0;quiz.summary=false;quiz._sig="";}
function qsig(){return quiz.exam+"|"+quiz.type+"|"+selSig()+"|"+quiz.len;}
function pick(pool,n,exclude){return shuffle(pool.filter(c=>!exclude||(c.term!==exclude.term&&c.def!==exclude.def))).slice(0,n);}
/* 보기(오답) 생성: 같은 섹션→같은 단원→전체 순으로 주제가 가까운 것을 우선,
   정답과 용어·정의 중복 및 보기 간 용어 중복을 배제 */
function pickDistractors(pool,n,c){
  const used=new Set([c.term]); const out=[];
  const add=arr=>{for(const x of shuffle(arr)){if(out.length>=n)break;
    if(x.term===c.term||x.def===c.def||used.has(x.term))continue;used.add(x.term);out.push(x);}};
  add(pool.filter(x=>x.sec&&x.sec===c.sec));
  if(out.length<n) add(pool.filter(x=>x.unit&&x.unit===c.unit));
  if(out.length<n) add(pool);
  return out;
}
function makeQ(type,c,pool){
  if(type==="match"){
    const grp=pool.filter(x=>x.sec&&x.sec===c.sec);
    const set=grp.length>=4?shuffle(grp).slice(0,4):shuffle([c,...pickDistractors(pool,3,c)]).slice(0,4);
    return{type,kind:"match",set,order:shuffle(set.map((_,i)=>i)),sel:{},done:false};}
  if(type==="ox"){const t=Math.random()<0.5;let shown=c;
    if(!t){const o=pickDistractors(pool,1,c)[0];if(o)shown={term:c.term,def:o.def};else return makeQ(type,c,pool);}
    return{type,kind:"ox",concept:c,shown,isTrue:t,done:false};}
  if(type==="bank"){const opts=shuffle([c,...pickDistractors(pool,9,c)]);return{type,kind:"bank",concept:c,options:opts,answer:opts.indexOf(c),done:false};}
  if(type==="short"||type==="fill"){return{type,kind:"short",concept:c,done:false};}
  const opts=shuffle([c,...pickDistractors(pool,3,c)]);return{type,kind:"mc",concept:c,options:opts,answer:opts.indexOf(c),done:false};
}
function genSet(){
  const pool=quizPool(), uniq=shuffle(pool);
  quiz.len=uniq.length;
  quiz.set=[]; quiz.idx=0; quiz.summary=false;
  for(let i=0;i<quiz.len;i++){quiz.set.push(makeQ(quiz.type,uniq[i],pool));}
  quiz._sig=qsig();
}
function quizScore(){const d=quiz.set.filter(q=>q.done);return{answered:d.length,correct:d.filter(q=>q.correct).length};}
function renderQuiz(){
  const pool=quizPool();
  const ex=EXAMS[quiz.exam];
  if(!ex.types.some(t=>t[0]===quiz.type)) quiz.type=ex.types[0][0];
  const need = quiz.type==="match"?4:(quiz.type==="bank"||quiz.type==="fill"?6:(quiz.type==="short"?1:4));
  const typeseg = ex.types.length>1
    ? `<div class="seg typeseg">${ex.types.map(t=>`<button data-type="${t[0]}" class="${quiz.type===t[0]?'active':''}">${t[1]}</button>`).join("")}</div>`
    : "";
  const head=`<div class="quiz-head">${typeseg}
    <div class="examinfo" style="margin:0;flex:1">📋 ${ex.info}</div></div>`;
  if(pool.length<need){
    $("#view").innerHTML=`<div class="quiz">${head}<div class="empty">이 유형에는 개념이 ${need}개 이상 필요합니다. 좌측에서 과목을 더 선택하세요.</div></div>`;
    bindQuizControls();return;
  }
  if(quiz._sig!==qsig()||!quiz.set.length) genSet();
  if(quiz.summary){ renderQuizSummary(head); return; }
  const q=quiz.set[quiz.idx], sc=quizScore();
  let body="";
  if(q.kind==="mc") body=qMC(q);
  else if(q.kind==="ox") body=qOX(q);
  else if(q.kind==="match") body=qMatch(q);
  else if(q.kind==="short") body=qShort(q);
  else if(q.kind==="bank") body=qBank(q);
  const counter=`<div class="qcounter">문항 <b>${quiz.idx+1}</b> / ${quiz.len} · 정답 ${sc.correct}/${sc.answered}</div>`;
  const nav=`<div class="qnav">
    <button class="btn" id="qprev" ${quiz.idx===0?'disabled':''}>← 이전</button>
    <button class="btn" id="newset">🔀 새 세트</button>
    <button class="btn primary" id="qnext">${quiz.idx===quiz.len-1?'결과 보기 →':'다음 →'}</button></div>`;
  $("#view").innerHTML=`<div class="quiz">${head}<div class="qcard">${body}
    <div class="explain" id="explain">${q.done?explainHTML(q):''}</div></div>${counter}${nav}</div>`;
  bindQuizControls(); bindQ(q); bindNav();
}
function renderQuizSummary(head){
  const sc=quizScore(), pct=quiz.len?Math.round(sc.correct/quiz.len*100):0, pass=pct>=60;
  $("#view").innerHTML=`<div class="quiz">${head}
    <div class="scorebanner"><div class="pct" style="color:${pass?'var(--ok)':'var(--bad)'}">${pct}점</div>
      <div>${sc.correct} / ${quiz.len} 정답 (응답 ${sc.answered})</div>
      <div class="pf ${pass?'pass':'fail'}">${pass?'✅ 60점 이상':'❌ 60점 미만'}</div></div>
    <div class="qnav"><button class="btn" id="reviewset">← 문제 다시 보기</button><button class="btn primary" id="newset">🔀 새 세트 시작</button></div></div>`;
  bindQuizControls();
  $("#reviewset").onclick=()=>{quiz.summary=false;quiz.idx=0;renderQuiz();};
  $("#newset").onclick=()=>{genSet();renderQuiz();};
}
function bindQuizControls(){
  $$("[data-type]").forEach(b=>b.onclick=()=>{quiz.type=b.dataset.type;resetQuiz();renderQuiz();});
}
function bindNav(){
  const p=$("#qprev"),n=$("#qnext"),ns=$("#newset");
  if(p)p.onclick=()=>{if(quiz.idx>0){quiz.idx--;renderQuiz();}};
  if(n)n.onclick=()=>{if(quiz.idx<quiz.len-1){quiz.idx++;renderQuiz();}else{quiz.summary=true;renderQuiz();}};
  if(ns)ns.onclick=()=>{genSet();renderQuiz();};
}
function explainHTML(q){
  const c=q.concept;
  if(q.kind==="match") return q.correct?'✅ 모두 정답!':'❌ 일부 오답 — 오른쪽 정답 번호를 확인하세요.';
  if(q.kind==="ox") return (q.correct?'✅ 정답! ':'❌ 오답. ')+(q.isTrue?`옳은 설명: <b>${esc(c.term)}</b> — ${esc(c.def)}`:`틀린 설명. <b>${esc(q.shown.term)}</b>의 올바른 정의: ${esc(c.def)}`);
  return (q.correct?'✅ 정답! ':'❌ 오답. ')+`<b>${esc(c.term)}</b> — ${esc(c.def)}`;
}
/* --- 문항 뷰 (q.done이면 채점 결과 표시) --- */
function qMC(q){
  const d2t=q.type==="mc_d2t";
  const opts=q.options.map((o,i)=>{let cls="opt";
    if(q.done){if(i===q.answer)cls+=" correct";else if(i===q.chosen)cls+=" wrong";}
    return `<button class="${cls}" data-i="${i}" ${q.done?'disabled':''}><span class="k">${"ABCDEFGH"[i]}</span><span>${esc(d2t?o.term:o.def)}</span></button>`;}).join("");
  const prompt=d2t?`<div class="qtag">다음 설명에 해당하는 용어는?</div><div class="qtext">${esc(q.concept.def)}</div>`
    :`<div class="qtag">다음 용어의 올바른 정의는?</div><div class="qtext">${esc(q.concept.term)}</div>`;
  return prompt+`<div class="opts">${opts}</div>`;
}
function qBank(q){
  const opts=q.options.map((o,i)=>{let cls="opt bankopt";
    if(q.done){if(i===q.answer)cls+=" correct";else if(i===q.chosen)cls+=" wrong";}
    return `<button class="${cls}" data-i="${i}" ${q.done?'disabled':''}>${esc(o.term)}</button>`;}).join("");
  return `<div class="qtag">다음 설명에 해당하는 용어를 보기에서 고르시오.</div><div class="qtext">${esc(q.concept.def)}</div><div class="bank">${opts}</div>`;
}
function qOX(q){
  const mk=v=>{let cls="opt ox";
    if(q.done){if((v===1)===q.isTrue)cls+=" correct";else if(q.chosen===v)cls+=" wrong";}
    return `<button class="${cls}" data-ox="${v}" ${q.done?'disabled':''}><span class="k">${v?'O':'X'}</span><span>${v?'옳음':'틀림'}</span></button>`;};
  return `<div class="qtag">다음 설명이 옳으면 O, 틀리면 X.</div>
    <div class="qtext"><b>${esc(q.shown.term)}</b> : ${esc(q.shown.def)}</div>
    <div class="opts oxopts">${mk(1)}${mk(0)}</div>`;
}
function qShort(q){
  const fill=q.type==="fill";
  const tag=fill?"다음 설명의 빈칸에 들어갈 용어를 쓰시오.":"다음 설명에 해당하는 용어를 직접 쓰시오.";
  const bc=q.done?(q.correct?'var(--ok)':'var(--bad)'):'var(--line)';
  return `<div class="qtag">${tag}</div><div class="qtext">${esc(q.concept.def)}</div>
    <div class="shortbox"><input class="search shortin" id="shortin" style="border-color:${bc}" value="${esc(q.input||'')}" placeholder="정답 용어 입력 후 Enter" ${q.done?'disabled':''} autocomplete="off">
    <button class="btn primary" id="submitShort" ${q.done?'disabled':''}>제출</button></div>`;
}
function qMatch(q){
  const rights=q.order.map((oi,n)=>`<div class="mrow"><span class="mnum">${n+1}</span><span>${esc(q.set[oi].def)}</span></div>`).join("");
  const lefts=q.set.map((c,i)=>{
    const opts=q.order.map((_,n)=>`<option value="${n}" ${q.sel[i]==n?'selected':''}>${n+1}</option>`).join("");
    let res="";
    if(q.done){const correctOrder=q.order.indexOf(i);res=(q.sel[i]===correctOrder)?'✅':'❌ → '+(correctOrder+1);}
    return `<div class="mrow"><span class="mkey">${"㉠㉡㉢㉣"[i]}</span><span class="mterm">${esc(c.term)}</span>
      <select data-left="${i}" ${q.done?'disabled':''}><option value="">?</option>${opts}</select>
      <span class="mres">${res}</span></div>`;}).join("");
  return `<div class="qtag">왼쪽 용어에 맞는 설명 번호를 선택해 연결하시오.</div>
    <div class="match"><div class="mcol"><div class="mhead">용어</div>${lefts}</div>
    <div class="mcol"><div class="mhead">설명</div>${rights}</div></div>
    ${q.done?'':'<button class="btn primary" id="gradeMatch" style="margin-top:14px">채점하기</button>'}`;
}
/* --- 채점 바인딩 --- */
function bindQ(q){
  if(q.done) return;
  if(q.kind==="mc"||q.kind==="bank"){
    $$(".opt[data-i]").forEach(b=>b.onclick=()=>{q.done=true;q.chosen=+b.dataset.i;q.correct=(q.chosen===q.answer);recPractice(q.correct);renderQuiz();});
  }else if(q.kind==="ox"){
    $$("[data-ox]").forEach(b=>b.onclick=()=>{q.done=true;q.chosen=+b.dataset.ox;q.correct=((q.chosen===1)===q.isTrue);recPractice(q.correct);renderQuiz();});
  }else if(q.kind==="short"){
    const submit=()=>{const val=$("#shortin").value.trim();if(!val)return;q.input=val;q.done=true;q.correct=checkAnswer(val,q.concept.term);recPractice(q.correct);renderQuiz();};
    $("#submitShort").onclick=submit;
    $("#shortin").addEventListener("keydown",e=>{if(e.key==="Enter")submit();});
    $("#shortin").focus();
  }else if(q.kind==="match"){
    $$("select[data-left]").forEach(s=>s.onchange=()=>{q.sel[+s.dataset.left]=s.value===""?undefined:+s.value;});
    $("#gradeMatch").onclick=()=>{let allok=true;q.set.forEach((c,i)=>{if(q.sel[i]!==q.order.indexOf(i))allok=false;});q.done=true;q.correct=allok;recPractice(allok);renderQuiz();};
  }
}
function checkAnswer(input,term){
  const norm=s=>s.toLowerCase().replace(/\s+/g,'').replace(/[()\[\]{}·.,/_\-—:：]/g,'');
  const set=new Set();
  set.add(norm(term));
  set.add(norm(term.replace(/\(.*?\)/g,'')));
  const m=term.match(/\(([^)]+)\)/); if(m)set.add(norm(m[1]));
  set.add(norm(term.split(/[(（]/)[0]));
  return set.has(norm(input));
}

/* ---------- 모의고사 (공식 문항수 이상 생성 → 채점 → 풀이보기) ---------- */
let exam={exam:"1",count:50,started:false,submitted:false,qs:[],ans:{},result:null};
const EXAM_COUNTS={"1":[40,50,60],"2":[20,30,40]};
const TYPE_LABEL={mc_d2t:"4지택일",mc_t2d:"4지택일",ox:"진위형 O/X",short:"단답형",bank:"보기선택",fill:"괄호채우기"};
function renderExam(){
  if(!EXAM_COUNTS[exam.exam].includes(exam.count)) exam.count=EXAM_COUNTS[exam.exam][1];
  if(!exam.started) return renderExamSetup();
  if(exam.submitted) return renderExamReview();
  return renderExamSheet();
}
function renderExamSetup(){
  const counts=EXAM_COUNTS[exam.exam];
  $("#view").innerHTML=`<div class="exam-setup"><div class="card-box">
    <h2 style="margin:0 0 6px">🧪 모의고사</h2>
    <p style="color:var(--muted);font-size:13px;margin:0 0 14px">개념정리 자료에서 자동 출제됩니다. 공식(1차 40·2차 20)보다 많이 풀 수 있고, 제출하면 점수와 풀이를 볼 수 있습니다.</p>
    <div class="seg" style="display:inline-flex;margin-bottom:6px">
      <button data-ex="1" class="${exam.exam==='1'?'active':''}">1차 모의(객관식+단답)</button>
      <button data-ex="2" class="${exam.exam==='2'?'active':''}">2차 모의(필답형)</button></div>
    <div class="opt-row">문항수 ${counts.map(c=>`<button class="chip ${exam.count===c?'active':''}" data-cnt="${c}">${c}문항</button>`).join("")}</div>
    <div style="font-size:12px;color:var(--muted);margin:4px 0 14px">출제 범위: 좌측에서 선택한 ${selIdx().length}개 과목 · 개념 ${poolByScope().length}개 · 60점 이상이 합격선</div>
    <button class="btn primary" id="startExam">시험 시작 →</button></div></div>`;
  $$("[data-ex]").forEach(b=>b.onclick=()=>{exam.exam=b.dataset.ex;renderExam();});
  $$("[data-cnt]").forEach(b=>b.onclick=()=>{exam.count=+b.dataset.cnt;renderExam();});
  $("#startExam").onclick=()=>{genExam();exam.started=true;exam.submitted=false;renderExam();};
}
function genExam(){
  const pool=shuffle(poolByScope());
  const n=Math.min(exam.count,pool.length);
  const types=exam.exam==="1"?["mc_d2t","ox","short"]:["bank"];
  exam.qs=[];exam.ans={};
  for(let i=0;i<n;i++){
    const c=pool[i], type=types[i%types.length];
    if(type==="mc_d2t"||type==="mc_t2d"){const opts=shuffle([c,...pickDistractors(pool,3,c)]);exam.qs.push({type,c,opts,ans:opts.indexOf(c)});}
    else if(type==="ox"){let t=Math.random()<0.5;let shown=c;if(!t){const o=pickDistractors(pool,1,c)[0];if(o)shown={term:c.term,def:o.def};else t=true;}exam.qs.push({type,c,shown,isTrue:t});}
    else if(type==="bank"){const opts=shuffle([c,...pickDistractors(pool,7,c)]);exam.qs.push({type,c,opts,ans:opts.indexOf(c)});}
    else exam.qs.push({type,c});
  }
}
function gradeExamQ(q,i){
  const a=exam.ans[i];
  if(q.type==="ox") return a===(q.isTrue?1:0);
  if(q.type==="short"||q.type==="fill") return a!=null&&a!==""&&checkAnswer(String(a),q.c.term);
  return a===q.ans;
}
function examOpts(q,i,review,labFn){
  return `<div class="opts">`+q.opts.map((o,oi)=>{
    let cls="opt";
    if(review){if(oi===q.ans)cls+=" correct";else if(exam.ans[i]===oi)cls+=" wrong";}
    else if(exam.ans[i]===oi)cls+=" sel";
    return `<button class="${cls}" data-eqi="${i}" data-oi="${oi}" ${review?'disabled':''}><span class="k">${"ABCDEFGH"[oi]}</span><span>${esc(labFn(o))}</span></button>`;
  }).join("")+`</div>`;
}
function examOX(q,i,review){
  const sel=exam.ans[i];
  const mk=v=>{let cls="opt ox";
    if(review){if((v===1)===q.isTrue)cls+=" correct";else if(sel===v)cls+=" wrong";}
    else if(sel===v)cls+=" sel";
    return `<button class="${cls}" data-eqi="${i}" data-ox="${v}" ${review?'disabled':''}><span class="k">${v?'O':'X'}</span></button>`;};
  return `<div class="opts oxopts">${mk(1)}${mk(0)}</div>`;
}
function reviewFlag(q,i){
  const ok=gradeExamQ(q,i), a=exam.ans[i];
  let your;
  if(q.type==="short"||q.type==="fill") your=(a&&a!=="")?`내 답: ${esc(String(a))}`:'미응답';
  else if(q.type==="ox") your=(a==null)?'미응답':`내 답: ${a?'O':'X'}`;
  else your=(a==null)?'미응답':`내 답: ${"ABCDEFGH"[a]}`;
  return `<span class="review-flag" style="color:${ok?'var(--ok)':'var(--bad)'}">${ok?'✅':'❌'}</span> <small style="color:var(--muted)">${your}</small>`;
}
function examQHTML(q,i,review){
  const no=`<div class="qno">${i+1}번 <span class="badge">${TYPE_LABEL[q.type]}</span> ${review?reviewFlag(q,i):''}</div>`;
  let body="";
  if(q.type==="mc_d2t") body=`<div class="qtext">${esc(q.c.def)}</div>`+examOpts(q,i,review,o=>o.term);
  else if(q.type==="bank") body=`<div class="qtext">${esc(q.c.def)}</div>`+examOpts(q,i,review,o=>o.term);
  else if(q.type==="mc_t2d") body=`<div class="qtext"><b>${esc(q.c.term)}</b></div>`+examOpts(q,i,review,o=>o.def);
  else if(q.type==="ox") body=`<div class="qtext"><b>${esc(q.shown.term)}</b> : ${esc(q.shown.def)}</div>`+examOX(q,i,review);
  else{const v=exam.ans[i]||"";body=`<div class="qtext">${esc(q.c.def)}</div><input class="search" style="width:100%;margin-top:8px" data-eqi="${i}" value="${esc(String(v))}" ${review?'disabled':''} placeholder="정답 용어 입력">`;}
  const exp=review?`<div class="explain" style="margin-top:10px">정답: <b>${esc(q.c.term)}</b> — ${esc(q.c.def)}</div>`:"";
  return no+body+exp;
}
function renderExamSheet(){
  const answered=exam.qs.filter((q,i)=>exam.ans[i]!=null&&exam.ans[i]!=="").length;
  const sticky=`<div class="exam-sticky"><div class="prog">진행 <b>${answered}</b> / ${exam.qs.length} · ${exam.exam}차 모의</div>
    <button class="btn" id="cancelExam">취소</button><button class="btn primary" id="submitExam">제출 및 채점</button></div>`;
  $("#view").innerHTML=sticky+`<div class="exam-list">${exam.qs.map((q,i)=>`<div class="eq">${examQHTML(q,i,false)}</div>`).join("")}</div>`;
  $$('[data-oi]').forEach(b=>b.onclick=()=>{exam.ans[+b.dataset.eqi]=+b.dataset.oi;renderExamSheet();});
  $$('[data-ox]').forEach(b=>b.onclick=()=>{exam.ans[+b.dataset.eqi]=+b.dataset.ox;renderExamSheet();});
  $$('input[data-eqi]').forEach(inp=>inp.oninput=()=>{exam.ans[+inp.dataset.eqi]=inp.value;});
  $("#submitExam").onclick=()=>{
    if(answered<exam.qs.length && !confirm(`미응답 ${exam.qs.length-answered}문항이 있습니다. 제출할까요?`))return;
    submitExam();};
  $("#cancelExam").onclick=()=>{exam.started=false;renderExam();};
}
function submitExam(){
  let correct=0; exam.qs.forEach((q,i)=>{if(gradeExamQ(q,i))correct++;});
  exam.result={correct,total:exam.qs.length};
  recExam({date:new Date().toISOString().slice(0,10),exam:exam.exam,scope:(selIdx().length===STUDY_DATA.subjects.length?'all':selIdx().length+'과목'),correct,total:exam.qs.length});
  exam.submitted=true; renderExam(); $(".content").scrollTop=0;
}
function renderExamReview(){
  const r=exam.result, pct=r.total?Math.round(r.correct/r.total*100):0, pass=pct>=60;
  const banner=`<div class="scorebanner"><div class="pct" style="color:${pass?'var(--ok)':'var(--bad)'}">${pct}점</div>
    <div>${r.correct} / ${r.total} 정답</div>
    <div class="pf ${pass?'pass':'fail'}">${pass?'✅ 합격선(60점) 통과':'❌ 합격선(60점) 미달'}</div></div>`;
  const list=exam.qs.map((q,i)=>`<div class="eq ${gradeExamQ(q,i)?'correct':'wrong'}">${examQHTML(q,i,true)}</div>`).join("");
  $("#view").innerHTML=banner+`<div class="exam-list">${list}</div>
    <div class="opt-row" style="margin:16px 0"><button class="btn primary" id="retry">새 모의고사 →</button></div>`;
  $("#retry").onclick=()=>{exam.started=false;exam.submitted=false;renderExam();};
}

/* ---------- 진도 대시보드 ---------- */
/* ---------- 유틸 ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
/* ---------- 이벤트 ---------- */
$$(".tab").forEach(t=>t.onclick=()=>{if(state.sel.length===0)return;state.mode=t.dataset.mode;render();});
$("#search").oninput=e=>{state.query=e.target.value.trim();if(state.sel.length===0)return;if(state.mode!=="concept"){state.mode="concept";}render();};
$("#menuBtn").onclick=()=>{state.mode="landing";render();};
$("#resetBtn").onclick=()=>{if(confirm("학습 진도를 모두 초기화할까요?")){progress={};saveP();render();}};
const THEMEKEY="secstudy_theme";
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);
  $("#themeBtn").textContent=t==="dark"?"☀️ 라이트":"🌙 다크";localStorage.setItem(THEMEKEY,t);}
$("#themeBtn").onclick=()=>applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");
applyTheme(localStorage.getItem(THEMEKEY)||"light");
document.addEventListener("keydown",e=>{
  if(state.mode==="drill"&&state.drill==="flash"){
    if(e.target.tagName==="INPUT")return;
    if(e.code==="Space"){e.preventDefault();$("#card")?.click();}
    else if(e.key==="ArrowLeft")$("#prev")?.click();
    else if(e.key==="ArrowRight")$("#next")?.click();
  }
});
render();
</script>
